<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Store | تسجيل الدخول</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: {
                        primary: {
                            50: '#ECFEFF',
                            100: '#CFFAFE',
                            500: '#06B6D4',
                            600: '#0891B2',
                            700: '#0E7490'
                        },
                        secondary: {
                            50: '#FFFBEB',
                            500: '#F59E0B',
                            600: '#D97706'
                        },
                        success: {
                            50: '#F0FDF4',
                            100: '#DCFCE7',
                            500: '#22C55E',
                            600: '#16A34A'
                        },
                        error: {
                            50: '#FEF2F2',
                            100: '#FEE2E2',
                            500: '#EF4444',
                            600: '#DC2626'
                        }
                    }
                }
            }
        };
    </script>

    <style>
        body {
            background:
                radial-gradient(circle at top right, rgba(6, 182, 212, 0.14), transparent 28rem),
                radial-gradient(circle at bottom left, rgba(245, 158, 11, 0.10), transparent 24rem),
                linear-gradient(135deg, #F8FAFC 0%, #FFFFFF 48%, #F0FDFF 100%);
        }

        @keyframes shrinkProgress {
            from { width: 100%; }
            to { width: 0%; }
        }

        .animate-progress {
            animation: shrinkProgress 3s linear forwards;
        }
    </style>
</head>

<body class="min-h-screen overflow-x-hidden font-sans text-slate-800 antialiased">

    <script src="../../components/app-state.js"></script>
    <script src="../../components/ui-feedback.js"></script>

    <main class="flex min-h-screen items-center justify-center px-4 py-8 sm:px-6 lg:px-8">

        <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-3 pointer-events-none" aria-live="polite"></div>

        <section class="w-full max-w-md">

            <div class="mb-6 text-center">
                <a href="../../index.html" class="inline-flex items-center justify-center gap-3">
                    <span class="grid h-14 w-14 place-items-center rounded-2xl bg-primary-500 text-xl font-black text-white shadow-lg shadow-cyan-100">
                        S
                    </span>

                    <span class="text-3xl font-black tracking-tight text-slate-950">
                        Spider <span class="text-primary-500">Store</span>
                    </span>
                </a>

                <p class="mt-3 text-sm font-semibold text-slate-500">
                    سجّل دخولك لمتابعة الطلبات والسلة والمفضلة.
                </p>
            </div>

            <div class="rounded-3xl border border-slate-200 bg-white/95 p-5 shadow-2xl shadow-slate-200/70 backdrop-blur sm:p-7">

                <div class="mb-7 text-center">
                    <span class="mx-auto mb-4 grid h-14 w-14 place-items-center rounded-2xl bg-primary-50 text-primary-600">
                        <i class="fas fa-right-to-bracket text-xl"></i>
                    </span>

                    <h1 class="text-2xl font-black text-slate-950">
                        تسجيل الدخول
                    </h1>

                    <p class="mt-2 text-sm font-semibold text-slate-500">
                        مرحبًا بك مجددًا في Spider Store.
                    </p>
                </div>

                <div id="messageBox" class="mb-4 hidden rounded-xl border px-4 py-3 text-center text-sm font-black"></div>

                <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-5">

                    <div>
                        <label for="email" class="mb-2 block text-sm font-black text-slate-700">
                            البريد الإلكتروني
                        </label>

                        <div class="relative">
                            <input
                                type="email"
                                id="email"
                                required
                                autocomplete="email"
                                placeholder="example@email.com"
                                dir="ltr"
                                class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 pl-4 pr-11 text-left text-sm font-semibold outline-none transition focus:border-primary-500 focus:bg-white focus:ring-4 focus:ring-primary-50"
                            >

                            <span class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
                                <i class="fas fa-envelope"></i>
                            </span>
                        </div>
                    </div>

                    <div>
                        <div class="mb-2 flex items-center justify-between gap-3">
                            <label for="password" class="block text-sm font-black text-slate-700">
                                كلمة المرور
                            </label>

                            <a href="forgot-password.html" class="text-xs font-black text-primary-600 transition hover:text-primary-700">
                                نسيت كلمة المرور؟
                            </a>
                        </div>

                        <div class="relative">
                            <input
                                type="password"
                                id="password"
                                required
                                autocomplete="current-password"
                                placeholder="••••••••"
                                dir="ltr"
                                class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 pl-12 pr-11 text-left text-sm font-semibold outline-none transition focus:border-primary-500 focus:bg-white focus:ring-4 focus:ring-primary-50"
                            >

                            <span class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
                                <i class="fas fa-lock"></i>
                            </span>

                            <button
                                type="button"
                                id="togglePasswordBtn"
                                onclick="togglePasswordVisibility()"
                                class="absolute inset-y-0 left-0 flex items-center px-4 text-slate-400 transition hover:text-primary-600"
                                aria-label="إظهار كلمة المرور"
                            >
                                <i id="togglePasswordIcon" class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <button
                        type="submit"
                        id="submitBtn"
                        class="inline-flex h-12 w-full items-center justify-center gap-2 rounded-xl bg-primary-600 px-5 text-base font-black text-white shadow-lg shadow-cyan-100 transition hover:bg-primary-700 disabled:cursor-not-allowed disabled:opacity-60"
                    >
                        <i class="fas fa-sign-in-alt"></i>
                        تسجيل الدخول
                    </button>
                </form>

                <div class="mt-6 rounded-2xl border border-slate-200 bg-slate-50 p-4 text-center">
                    <p class="text-sm font-semibold text-slate-500">
                        ليس لديك حساب؟
                        <a href="register.html" class="font-black text-primary-600 transition hover:text-primary-700">
                            سجل الآن
                        </a>
                    </p>
                </div>
            </div>

            <p class="mt-5 text-center text-xs font-semibold text-slate-400">
                © Spider Store 2026
            </p>

        </section>
    </main>

    <script>
    (() => {
        const API_URL = '/api';
        let isSubmitting = false;

        const escapeHTML = value => String(value || '').replace(/[&<>'"]/g, char => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            "'": '&#39;',
            '"': '&quot;'
        }[char]));

        function getStoredToken() {
            if (window.AppState && typeof window.AppState.getToken === 'function') {
                return window.AppState.getToken();
            }

            return localStorage.getItem('spider_token') || localStorage.getItem('token');
        }

        function setStoredToken(token) {
            if (!token) return;

            if (window.AppState && typeof window.AppState.setToken === 'function') {
                window.AppState.setToken(token);
                return;
            }

            localStorage.setItem('spider_token', token);
        }

        function getLocalCart() {
            try {
                if (window.AppState && typeof window.AppState.getCart === 'function') {
                    return window.AppState.getCart();
                }

                return JSON.parse(localStorage.getItem('spider_cart') || '[]');
            } catch (error) {
                return [];
            }
        }

        function clearLocalCart() {
            if (window.AppState && typeof window.AppState.clearCart === 'function') {
                window.AppState.clearCart();
                return;
            }

            localStorage.removeItem('spider_cart');
        }

        function showToast(message, type = 'success') {
            if (window.AppUI && typeof window.AppUI.toast === 'function') {
                return window.AppUI.toast(message, type);
            }

            const container = document.getElementById('toast-container');
            if (!container) return;

            const isSuccess = type === 'success';
            const toast = document.createElement('div');

            toast.className = `pointer-events-auto relative overflow-hidden rounded-xl border-r-4 bg-white/95 p-4 shadow-xl transition-all duration-500 ${
                isSuccess ? 'border-success-500' : 'border-error-500'
            }`;

            toast.innerHTML = `
                <p class="text-sm font-bold ${isSuccess ? 'text-slate-800' : 'text-error-600'}">${escapeHTML(message)}</p>
                <div class="absolute bottom-0 left-0 h-1 w-full bg-slate-100">
                    <div class="h-full ${isSuccess ? 'bg-success-500' : 'bg-error-500'} animate-progress"></div>
                </div>
            `;

            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function showMessage(message, type = 'error') {
            const box = document.getElementById('messageBox');
            if (!box) return;

            const isSuccess = type === 'success';

            box.className = `mb-4 block rounded-xl border px-4 py-3 text-center text-sm font-black ${
                isSuccess
                    ? 'border-success-100 bg-success-50 text-success-600'
                    : 'border-error-100 bg-error-50 text-error-600'
            }`;

            box.innerHTML = `
                <i class="fas ${isSuccess ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i>
                ${escapeHTML(message)}
            `;
        }

        function hideMessage() {
            const box = document.getElementById('messageBox');
            if (box) box.classList.add('hidden');
        }

        function setButtonLoading(isLoading) {
            const button = document.getElementById('submitBtn');
            if (!button) return;

            isSubmitting = isLoading;

            if (isLoading) {
                button.dataset.originalHtml = button.innerHTML;
                button.disabled = true;
                button.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> جاري التحقق...';
                return;
            }

            button.disabled = false;
            button.innerHTML = button.dataset.originalHtml || '<i class="fas fa-sign-in-alt"></i> تسجيل الدخول';
        }

        async function fetchJson(url, options = {}) {
            const response = await fetch(url, options);
            const data = await response.json().catch(() => ({}));
            return { response, data };
        }

        function getTokenFromLoginResponse(data) {
            return data.token ||
                data.access_token ||
                (data.data && data.data.token) ||
                (data.data && data.data.access_token) ||
                '';
        }

        function normalizeEmail(value) {
            return String(value || '').trim().toLowerCase();
        }

        async function handleLogin(event) {
            event.preventDefault();

            if (isSubmitting) return;

            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');

            const email = normalizeEmail(emailInput.value);
            const password = passwordInput.value;

            hideMessage();

            if (!email) {
                showMessage('البريد الإلكتروني مطلوب');
                emailInput.focus();
                return;
            }

            if (!password) {
                showMessage('كلمة المرور مطلوبة');
                passwordInput.focus();
                return;
            }

            setButtonLoading(true);

            try {
                const { response, data } = await fetchJson(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const token = getTokenFromLoginResponse(data);

                if (!response.ok || data.success === false || !token) {
                    throw new Error(data.message || data.error || 'خطأ في البريد أو كلمة المرور');
                }

                setStoredToken(token);

                await syncGuestCart(token);

                showMessage('تم تسجيل الدخول بنجاح', 'success');
                showToast('تم تسجيل الدخول بنجاح', 'success');

                setTimeout(() => {
                    window.location.href = '../../index.html';
                }, 700);
            } catch (error) {
                console.error('Login error:', error);

                const message = error.message || 'خطأ في الاتصال بالسيرفر';
                showMessage(message, 'error');
                showToast(message, 'error');

                setButtonLoading(false);
            }
        }

        async function syncGuestCart(token) {
            const localCart = getLocalCart();

            if (!Array.isArray(localCart) || localCart.length === 0) return;

            for (const item of localCart) {
                const productId = Number(item.product_id || item.id);
                const quantity = Number(item.quantity || 1);

                if (!productId || quantity <= 0) continue;

                try {
                    await fetch(`${API_URL}/cart`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            Authorization: `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            product_id: productId,
                            quantity
                        })
                    });
                } catch (error) {}
            }

            clearLocalCart();
        }

        function togglePasswordVisibility() {
            const input = document.getElementById('password');
            const icon = document.getElementById('togglePasswordIcon');
            const button = document.getElementById('togglePasswordBtn');

            if (!input || !icon || !button) return;

            const showPassword = input.type === 'password';

            input.type = showPassword ? 'text' : 'password';
            icon.className = showPassword ? 'fas fa-eye-slash' : 'fas fa-eye';
            button.setAttribute('aria-label', showPassword ? 'إخفاء كلمة المرور' : 'إظهار كلمة المرور');
        }

        window.handleLogin = handleLogin;
        window.togglePasswordVisibility = togglePasswordVisibility;

        document.addEventListener('DOMContentLoaded', () => {
            if (getStoredToken()) {
                window.location.replace('../../index.html');
            }
        });
    })();
    </script>
</body>
</html>
