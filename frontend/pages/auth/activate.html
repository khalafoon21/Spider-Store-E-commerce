<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Store | تفعيل الحساب</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../styles/responsive.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: {
                        primary: {
                            50: '#ECFEFF',
                            100: '#CFFAFE',
                            500: '#06B6D4',
                            600: '#0891B2',
                            700: '#0E7490'
                        },
                        success: {
                            50: '#F0FDF4',
                            100: '#DCFCE7',
                            500: '#22C55E',
                            600: '#16A34A'
                        },
                        error: {
                            50: '#FEF2F2',
                            100: '#FEE2E2',
                            500: '#EF4444',
                            600: '#DC2626'
                        }
                    }
                }
            }
        };
    </script>

    <style>
        body {
            background:
                radial-gradient(circle at top right, rgba(6, 182, 212, 0.14), transparent 28rem),
                radial-gradient(circle at bottom left, rgba(245, 158, 11, 0.10), transparent 24rem),
                linear-gradient(135deg, #F8FAFC 0%, #FFFFFF 48%, #F0FDFF 100%);
        }
    </style>
</head>

<body class="min-h-screen overflow-x-hidden font-sans text-slate-800 antialiased">

    <main class="flex min-h-screen items-center justify-center px-4 py-8">
        <section class="w-full max-w-md rounded-3xl border border-slate-200 bg-white/95 p-7 text-center shadow-2xl shadow-slate-200/70 backdrop-blur">

            <a href="../../index.html" class="mb-6 inline-flex items-center justify-center gap-3">
                <span class="grid h-14 w-14 place-items-center rounded-2xl bg-primary-500 text-xl font-black text-white shadow-lg shadow-cyan-100">
                    S
                </span>

                <span class="text-3xl font-black tracking-tight text-slate-950">
                    Spider <span class="text-primary-500">Store</span>
                </span>
            </a>

            <div id="iconBox" class="mx-auto mb-5 grid h-16 w-16 place-items-center rounded-2xl bg-primary-50 text-primary-600">
                <i id="statusIcon" class="fas fa-circle-notch fa-spin text-2xl"></i>
            </div>

            <h1 id="statusTitle" class="text-2xl font-black text-slate-950">
                جاري تفعيل الحساب...
            </h1>

            <p id="statusMessage" class="mt-3 text-sm font-semibold leading-7 text-slate-500">
                برجاء الانتظار لحظات.
            </p>

            <a
                id="loginBtn"
                href="login.html"
                class="mt-6 hidden h-12 w-full items-center justify-center rounded-xl bg-primary-600 px-5 text-base font-black text-white shadow-lg shadow-cyan-100 transition hover:bg-primary-700"
            >
                تسجيل الدخول
            </a>

        </section>
    </main>

    <script>
    (() => {
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        const iconBox = document.getElementById('iconBox');
        const statusIcon = document.getElementById('statusIcon');
        const statusTitle = document.getElementById('statusTitle');
        const statusMessage = document.getElementById('statusMessage');
        const loginBtn = document.getElementById('loginBtn');

        function setState(type, title, message) {
            const isSuccess = type === 'success';

            iconBox.className = `mx-auto mb-5 grid h-16 w-16 place-items-center rounded-2xl ${
                isSuccess ? 'bg-success-50 text-success-600' : 'bg-error-50 text-error-600'
            }`;

            statusIcon.className = `fas ${isSuccess ? 'fa-circle-check' : 'fa-circle-xmark'} text-2xl`;
            statusTitle.textContent = title;
            statusMessage.textContent = message;

            loginBtn.classList.remove('hidden');
            loginBtn.classList.add('inline-flex');
        }

        async function activateAccount() {
            if (!token) {
                setState('error', 'رابط غير صحيح', 'رابط التفعيل لا يحتوي على رمز صالح.');
                return;
            }

            try {
                const response = await fetch(`/api/auth/activate?token=${encodeURIComponent(token)}`);
                const data = await response.json().catch(() => ({}));

                if (!response.ok || data.success === false) {
                    throw new Error(data.message || 'تعذر تفعيل الحساب');
                }

                setState('success', 'تم تفعيل الحساب بنجاح', 'يمكنك الآن تسجيل الدخول بحسابك.');

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2500);

            } catch (error) {
                setState(
                    'error',
                    'فشل تفعيل الحساب',
                    error.message || 'رابط التفعيل غير صحيح أو انتهت صلاحيته.'
                );
            }
        }

        activateAccount();
    })();
    </script>
</body>
</html>
