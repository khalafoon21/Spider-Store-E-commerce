<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Store | تفاصيل المنتج</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../styles/responsive.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#ECFEFF', 500: '#06B6D4', 600: '#0891B2', 700: '#0E7490' },
                        secondary: { 50: '#FFFBEB', 500: '#F59E0B' },
                        success: { 500: '#22C55E', 100: '#DCFCE7', 600: '#16A34A' },
                        error: { 500: '#EF4444', 100: '#FEE2E2', 600: '#DC2626' }
                    }
                }
            }
        }
    </script>
    <style> 
        body { background-color: #F8FAFC; } 
        .smooth-transition { transition: all 0.2s ease-out; } 
        .star-hover:hover ~ i { color: #D1D5DB !important; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes shrinkProgress { from { width: 100%; } to { width: 0%; } }
        .animate-progress { animation: shrinkProgress 3s linear forwards; }
    </style>
</head>
<body class="font-sans text-gray-800 antialiased flex flex-col min-h-screen">

    <script src="../../components/app-state.js"></script>
    <script src="../../components/ui-feedback.js"></script>
    <script src="../../components/main-navbar.js"></script>

    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-3 pointer-events-none" aria-live="polite"></div>

    <main class="mx-auto w-full max-w-[1440px] flex-1 px-3 py-4 sm:px-4 lg:px-6 lg:py-8">
        <a href="../../index.html" class="mb-4 inline-flex items-center gap-2 rounded-full bg-white px-4 py-2 text-sm font-bold text-slate-600 shadow-sm ring-1 ring-slate-200 transition hover:text-primary-600 sm:mb-6">
            <i class="fas fa-arrow-right ml-2"></i> العودة للمتجر
        </a>

        <div id="productContainer" class="mb-6 flex min-h-[420px] items-center justify-center overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm sm:mb-8">
            <div class="text-center py-12 text-gray-500">
                <i class="fas fa-spinner fa-spin text-4xl mb-3"></i>
                <p class="text-lg">جاري تحميل تفاصيل المنتج...</p>
            </div>
        </div>

        <div id="reviewsSection" class="mb-8 hidden rounded-2xl border border-slate-200 bg-white p-4 shadow-sm sm:p-6 md:p-8">
            <h2 class="text-2xl font-bold text-gray-900 mb-6 border-b pb-4">تقييمات العملاء</h2>

            <div id="addReviewContainer" class="mb-8 hidden bg-gray-50 p-6 rounded-xl border border-gray-200">
                <h3 class="font-bold text-gray-800 mb-4">أضف تقييمك للمنتج</h3>
                
                <div class="flex items-center gap-1 mb-4 flex-row-reverse justify-end" id="starRating">
                    <i class="fas fa-star text-3xl text-gray-300 cursor-pointer peer hover:text-yellow-400 transition" data-val="5"></i>
                    <i class="fas fa-star text-3xl text-gray-300 cursor-pointer peer hover:text-yellow-400 transition" data-val="4"></i>
                    <i class="fas fa-star text-3xl text-gray-300 cursor-pointer peer hover:text-yellow-400 transition" data-val="3"></i>
                    <i class="fas fa-star text-3xl text-gray-300 cursor-pointer peer hover:text-yellow-400 transition" data-val="2"></i>
                    <i class="fas fa-star text-3xl text-gray-300 cursor-pointer peer hover:text-yellow-400 transition" data-val="1"></i>
                </div>

                <textarea id="reviewComment" rows="3" placeholder="اكتب رأيك ومميزات أو عيوب المنتج..." class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-primary-500 outline-none mb-4"></textarea>
                <button type="button" onclick="submitReview()" id="submitReviewBtn" class="bg-secondary-500 hover:bg-yellow-500 text-white font-bold py-2 px-6 rounded-md shadow-sm transition-colors">
                    نشر التقييم
                </button>
            </div>

            <div id="reviewsList" class="space-y-6"></div>
        </div>

        <div id="relatedProductsSection" class="hidden">
            <h2 class="text-2xl font-bold text-gray-900 border-r-4 border-primary-500 pr-3 mb-6">منتجات ذات صلة</h2>
            <div id="relatedProductsGrid" class="xs-stack grid grid-cols-2 gap-3 sm:grid-cols-3 sm:gap-4 lg:grid-cols-4"></div>
        </div>
    </main>

    <footer class="bg-gray-900 text-white py-12 text-center mt-auto">
        <div class="container mx-auto px-4">
            <p class="text-gray-500 text-sm">© 2026 Spider Store. جميع الحقوق محفوظة.</p>
        </div>
    </footer>

    <script>
(() => {

        const API_URL = '/api';
        const BASE_SERVER = '';
        let currentProduct = null;
        let selectedQuantity = 1;
        let userRating = 0;
        let currentUserRole = null; 
        let wishlistProductIds = new Set();

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        const escapeHTML = str => String(str || '').replace(/[&<>'"]/g, tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag]));
        const safeNumber = value => Number.isFinite(Number(value)) ? Number(value) : 0;
        const safeId = value => encodeURIComponent(String(value || ''));
        const buildImageUrl = imagePath => {
            const cleanPath = String(imagePath || '').trim();
            if (!cleanPath) return 'https://via.placeholder.com/600?text=No+Image';
            return /^https?:\/\//i.test(cleanPath) ? cleanPath : `${BASE_SERVER}${cleanPath.startsWith('/') ? cleanPath : `/${cleanPath}`}`;
        };
        const normalizeProductImages = product => {
            const images = [];
            const pushImage = value => {
                const clean = String(value || '').trim();
                if (clean && !images.includes(clean)) images.push(clean);
            };

            pushImage(product.image_url || product.image);
            [product.images_array, product.images_list, product.images].forEach(value => {
                if (Array.isArray(value)) return value.forEach(pushImage);
                if (typeof value === 'string' && value.trim()) {
                    try {
                        const parsed = JSON.parse(value);
                        if (Array.isArray(parsed)) parsed.forEach(pushImage);
                        else pushImage(parsed);
                    } catch (error) {
                        value.split(/[,\n]/).forEach(pushImage);
                    }
                }
            });

            return images.length ? images : [''];
        };
        const calcFinalPrice = (price, discount) => {
            const basePrice = safeNumber(price);
            const discountValue = safeNumber(discount);
            return (discountValue > 0 && discountValue <= 100) ? (basePrice - (basePrice * discountValue / 100)).toFixed(0) : basePrice.toFixed(0);
        };

        function decodeTokenRole() {
            const token = window.AppState ? window.AppState.getToken() : localStorage.getItem('spider_token');
            if (!token) return null;
            try { return JSON.parse(atob(token.split('.')[1])).role; } catch(e) { return null; }
        }

        function decodeTokenUserId() {
            const token = window.AppState ? window.AppState.getToken() : localStorage.getItem('spider_token');
            if (!token) return null;
            try { return JSON.parse(atob(token.split('.')[1])).userId; } catch(e) { return null; }
        }

        async function fetchProductDetails() {
            if (!productId) { showError('لم يتم العثور على المنتج.'); return; }
            try {
                const response = await fetch(`${API_URL}/products/${safeId(productId)}`);
                const data = await response.json().catch(() => ({}));

                if (!response.ok || data.success === false) {
                    showError(data.message || 'تعذر تحميل تفاصيل المنتج.');
                    return;
                }

                currentProduct = data.data || data.product || null;
                
                if (currentProduct) {
                    await fetchWishlistState();
                    renderProduct(currentProduct);
                    document.getElementById('reviewsSection').classList.remove('hidden');
                    fetchReviews();
                    setupReviewForm();
                    
                    const categoryToSearch = currentProduct.category_id || currentProduct.category || null;
                    if(categoryToSearch) fetchRelatedProducts(categoryToSearch, currentProduct.id);
                } else {
                    showError('هذا المنتج غير موجود أو تم حذفه.');
                }
            } catch (error) {
                console.error(error);
                showError('تعذر الاتصال بالخادم. حاول مرة أخرى.');
            }
        }



        window.setMainProductImage = function(src, button) {
            const image = document.getElementById('mainProductImage');
            if (image) image.src = src;
            document.querySelectorAll('[data-gallery-thumb]').forEach(item => {
                item.classList.remove('border-primary-500', 'ring-2', 'ring-primary-100');
                item.classList.add('border-slate-200');
            });
            if (button) {
                button.classList.add('border-primary-500', 'ring-2', 'ring-primary-100');
                button.classList.remove('border-slate-200');
            }
        };

        function renderProduct(product) {
            const container = document.getElementById('productContainer');
            const price = safeNumber(product.price);
            const discount = safeNumber(product.discount);
            const stockQuantity = safeNumber(product.stock_quantity ?? product.stock);
            const isAvailable = stockQuantity > 0;
            const hasDiscount = discount > 0;
            const finalPrice = calcFinalPrice(price, discount);
            const imagesArray = normalizeProductImages(product);
            const mainImgUrl = buildImageUrl(imagesArray[0]);
            const avgValue = safeNumber(product.rating_average);
            const ratingCount = safeNumber(product.rating_count);
            const roundedRating = Math.max(0, Math.min(5, Math.round(avgValue)));
            const sellerName = product.seller_name || product.store_name || product.seller || product.vendor_name || '';
            const categoryName = product.category_name || product.category || '';
            const inWishlist = wishlistProductIds.has(Number(product.id));
            const wishlistIcon = inWishlist ? 'fas fa-heart' : 'far fa-heart';
            const wishlistClasses = inWishlist ? 'border-error-100 bg-error-50 text-error-500' : 'border-error-100 bg-white text-error-500 hover:bg-error-50';
            let breakdown = product.rating_breakdown || {};

            if (typeof breakdown === 'string') {
                try { breakdown = JSON.parse(breakdown); } catch (error) { breakdown = {}; }
            }

            const starsHtml = Array.from({ length: 5 }, (_, index) => {
                const star = index + 1;
                return `<i class="fas fa-star ${star <= roundedRating ? 'text-yellow-400' : 'text-slate-300'}"></i>`;
            }).join('');

            const thumbnailsHtml = imagesArray.map((img, index) => {
                const imageUrl = buildImageUrl(img);
                const active = index === 0 ? 'border-primary-500 ring-2 ring-primary-100' : 'border-slate-200';
                return `
                    <button type="button" data-gallery-thumb onclick="window.setMainProductImage(decodeURIComponent('${encodeURIComponent(imageUrl)}'), this)" class="h-16 w-16 shrink-0 overflow-hidden rounded-xl border bg-white p-1.5 transition hover:border-primary-500 sm:h-20 sm:w-20 lg:h-20 lg:w-20 ${active}">
                        <img src="${imageUrl}" alt="${escapeHTML(product.title)} thumbnail ${index + 1}" class="h-full w-full object-contain" onerror="this.src='https://via.placeholder.com/120?text=Image'">
                    </button>
                `;
            }).join('');

            const ratingBars = [5, 4, 3, 2, 1].map(star => {
                const count = safeNumber(breakdown[star] ?? breakdown[String(star)]);
                const percent = ratingCount ? Math.round((count / ratingCount) * 100) : 0;
                return `
                    <div class="grid grid-cols-[52px_1fr_34px] items-center gap-2 text-xs text-slate-500 sm:text-sm">
                        <span>${star} نجوم</span>
                        <div class="h-2 overflow-hidden rounded-full bg-slate-100">
                            <div class="h-full rounded-full bg-yellow-400" style="width:${percent}%"></div>
                        </div>
                        <span class="text-left">${count}</span>
                    </div>
                `;
            }).join('');

            container.innerHTML = `
                <div class="w-full">
                    <section class="grid gap-0 lg:grid-cols-[minmax(0,1fr)_430px]" dir="ltr">
                        <div class="grid gap-4 border-b border-slate-100 bg-white p-3 sm:p-5 lg:grid-cols-[92px_minmax(0,1fr)] lg:border-b-0 lg:border-r lg:p-6" dir="ltr">
                            <div class="order-2 flex gap-2 overflow-x-auto pb-1 lg:order-1 lg:max-h-[560px] lg:flex-col lg:overflow-y-auto lg:overflow-x-hidden">
                                ${thumbnailsHtml}
                            </div>
                            <div class="order-1 flex min-h-[300px] items-center justify-center rounded-2xl bg-slate-50 p-4 sm:min-h-[420px] lg:order-2 lg:min-h-[560px]">
                                <div class="relative w-full">
                                    ${hasDiscount ? `<span class="absolute left-2 top-2 z-10 rounded-full bg-error-500 px-3 py-1 text-xs font-black text-white shadow-sm">خصم ${discount}%</span>` : ''}
                                    <img id="mainProductImage" src="${mainImgUrl}" alt="${escapeHTML(product.title)}" class="mx-auto max-h-[280px] w-full object-contain transition duration-300 sm:max-h-[420px] lg:max-h-[520px]" onerror="this.onerror=null;this.src='https://via.placeholder.com/600?text=No+Image'">
                                </div>
                            </div>
                        </div>

                        <aside class="flex flex-col bg-white p-4 sm:p-6 lg:p-7" dir="rtl">
                            ${categoryName ? `<p class="mb-2 text-xs font-black uppercase text-primary-600">${escapeHTML(categoryName)}</p>` : ''}
                            <h1 class="text-2xl font-black leading-9 text-slate-950 sm:text-3xl">${escapeHTML(product.title)}</h1>

                            <div class="mt-4 flex flex-wrap items-center gap-2">
                                ${ratingCount ? `
                                    <span class="inline-flex items-center gap-1 rounded-full bg-yellow-50 px-3 py-1 text-sm font-black text-yellow-600">${avgValue.toFixed(1)} <i class="fas fa-star text-xs"></i></span>
                                    <span class="flex items-center gap-1 text-sm">${starsHtml}</span>
                                    <span class="text-sm font-semibold text-slate-500">(${ratingCount} تقييم)</span>
                                ` : `<span class="rounded-full bg-slate-100 px-3 py-1 text-sm font-bold text-slate-500">لا توجد تقييمات بعد</span>`}
                            </div>

                            <div class="mt-5 rounded-2xl border border-slate-200 bg-slate-50 p-4">
                                <div class="flex items-end gap-3">
                                    <p class="text-4xl font-black text-primary-600">${finalPrice} <span class="text-base font-bold text-slate-500">ج.م</span></p>
                                    ${hasDiscount ? `<p class="pb-1 text-lg font-bold text-slate-400 line-through">${price.toFixed(0)} ج.م</p>` : ''}
                                </div>
                                ${hasDiscount ? `<p class="mt-2 text-sm font-bold text-error-600">وفرت ${(price - Number(finalPrice)).toFixed(0)} ج.م</p>` : ''}
                            </div>

                            <div class="mt-5 grid gap-3 text-sm">
                                <div class="flex items-center justify-between rounded-xl border border-slate-200 px-4 py-3">
                                    <span class="font-bold text-slate-500">الحالة</span>
                                    ${isAvailable ? `<span class="font-black text-success-600"><i class="fas fa-check-circle ml-1"></i> متاح في المخزن</span>` : `<span class="font-black text-error-600"><i class="fas fa-times-circle ml-1"></i> غير متاح</span>`}
                                </div>
                                ${sellerName ? `
                                    <div class="flex items-center justify-between rounded-xl border border-slate-200 px-4 py-3">
                                        <span class="font-bold text-slate-500">البائع</span>
                                        <span class="font-black text-slate-900"><i class="fas fa-store ml-1 text-primary-600"></i>${escapeHTML(sellerName)}</span>
                                    </div>
                                ` : ''}
                            </div>

                            ${isAvailable ? `
                                <div class="sticky bottom-0 z-20 -mx-4 mt-6 border-t border-slate-200 bg-white/95 p-4 backdrop-blur sm:-mx-6 lg:static lg:mx-0 lg:border-t-0 lg:p-0">
                                    <div class="flex flex-col gap-3 sm:flex-row">
                                        <div class="flex h-12 items-center justify-between rounded-xl border border-slate-200 bg-white sm:w-36">
                                            <button type="button" onclick="event.preventDefault(); event.stopPropagation(); changeQty(1)" class="h-full w-12 text-slate-600 transition hover:text-primary-600"><i class="fas fa-plus"></i></button>
                                            <span id="qtyDisplay" class="font-black text-slate-950">1</span>
                                            <button type="button" onclick="event.preventDefault(); event.stopPropagation(); changeQty(-1)" class="h-full w-12 text-slate-600 transition hover:text-error-500"><i class="fas fa-minus"></i></button>
                                        </div>
                                        <button type="button" onclick="event.preventDefault(); event.stopPropagation(); addToCartFromDetails(this)" class="flex h-12 flex-1 items-center justify-center gap-2 rounded-xl bg-primary-500 px-6 text-base font-black text-white shadow-lg shadow-cyan-100 transition hover:bg-primary-600">
                                            <i class="fas fa-cart-plus pointer-events-none"></i> إضافة للسلة
                                        </button>
                                        <button id="productWishlistBtn" type="button" data-in-wishlist="${inWishlist ? '1' : '0'}" onclick="event.preventDefault(); event.stopPropagation(); toggleProductWishlist(this)" class="flex h-12 items-center justify-center rounded-xl border px-5 transition ${wishlistClasses}">
                                            <i class="${wishlistIcon}"></i>
                                        </button>
                                    </div>
                                </div>
                            ` : `
                                <div class="mt-6 rounded-xl bg-slate-100 p-4 text-center font-black text-slate-500">
                                    <i class="fas fa-box-open ml-2"></i> المنتج غير متاح حالياً
                                </div>
                            `}
                        </aside>
                    </section>

                    <section class="grid gap-4 border-t border-slate-100 bg-slate-50 p-4 sm:p-6 lg:grid-cols-[minmax(0,1fr)_360px]">
                        <div class="rounded-2xl border border-slate-200 bg-white p-5">
                            <h2 class="mb-3 text-xl font-black text-slate-950">وصف المنتج</h2>
                            <p class="whitespace-pre-line leading-8 text-slate-600">${escapeHTML(product.description) || 'لا يوجد وصف متاح لهذا المنتج حتى الآن.'}</p>
                        </div>
                        <div class="rounded-2xl border border-slate-200 bg-white p-5">
                            <div class="mb-4 flex items-center justify-between">
                                <h2 class="text-xl font-black text-slate-950">ملخص التقييمات</h2>
                                <span class="font-black text-primary-600">${ratingCount ? avgValue.toFixed(1) : '0.0'} ★</span>
                            </div>
                            ${ratingCount ? `<div class="space-y-2">${ratingBars}</div>` : '<p class="text-sm font-semibold text-slate-500">لا توجد تقييمات بعد</p>'}
                        </div>
                    </section>
                </div>
            `;
        }

        async function fetchRelatedProducts(categoryId, currentId) {
            try {
                const response = await fetch(`${API_URL}/products?category=${categoryId}`);
                const data = await response.json().catch(() => ({}));
                
                if (response.ok && data.success !== false && data.data) {
                    const related = data.data.filter(p => p.id != currentId).slice(0, 4);
                    if (related.length > 0) {
                        document.getElementById('relatedProductsSection').classList.remove('hidden');
                        renderRelatedProducts(related);
                    }
                }
            } catch (err) { console.error(err); }
        }

        function renderRelatedProducts(productsArray) {
            const container = document.getElementById('relatedProductsGrid');
            container.innerHTML = '';
            
            productsArray.forEach(product => {
                const productId = safeId(product.id);
                const imageUrl = buildImageUrl(product.image_url);
                const price = safeNumber(product.price);
                const discount = safeNumber(product.discount);
                const hasDiscount = discount > 0;
                const finalPrice = calcFinalPrice(price, discount);

                container.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-lg transition-all group flex flex-col h-full">
                        <div class="relative p-4 bg-gray-50 flex justify-center">
                            ${hasDiscount ? `<span class="absolute top-3 left-3 bg-error-500 text-white text-xs font-bold px-3 py-1 rounded-full z-10">خصم ${discount}%</span>` : ''}
                            <a href="product.html?id=${productId}">
                                <img src="${imageUrl}" class="w-full aspect-square object-contain group-hover:scale-110 transition-transform duration-500" alt="${escapeHTML(product.title)}">
                            </a>
                        </div>
                        <div class="p-5 flex flex-col flex-1">
                            <a href="product.html?id=${productId}" class="hover:text-primary-600 transition-colors">
                                <h3 class="product-card-title font-bold text-gray-800 mb-1 line-clamp-3 text-sm sm:line-clamp-2">${escapeHTML(product.title)}</h3>
                            </a>
                            <div class="mt-auto flex items-center justify-between pt-3">
                                <div class="flex flex-col">
                                    ${hasDiscount ? `<span class="text-gray-400 line-through text-xs">${price.toFixed(0)} ج.م</span>` : ''}
                                    <span class="text-primary-600 font-bold text-lg">${finalPrice} ج.م</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function setupReviewForm() {
            currentUserRole = decodeTokenRole();
            if (currentUserRole) { document.getElementById('addReviewContainer').classList.remove('hidden'); }
            const stars = document.querySelectorAll('#starRating i');
            stars.forEach(star => {
                star.addEventListener('click', (e) => {
                    userRating = parseInt(e.target.getAttribute('data-val'));
                    stars.forEach(s => {
                        const val = parseInt(s.getAttribute('data-val'));
                        s.className = val <= userRating ? 'fas fa-star text-3xl text-yellow-400 cursor-pointer peer' : 'fas fa-star text-3xl text-gray-300 cursor-pointer peer hover:text-yellow-400 transition';
                    });
                });
            });
        }

        async function fetchReviews() {
            const list = document.getElementById('reviewsList');
            try {
                const res = await fetch(`${API_URL}/reviews?product_id=${productId}`);
                const data = await res.json().catch(() => ({}));
                if (!res.ok || data.success === false) {
                    list.innerHTML = `<p class="text-error-500">${escapeHTML(data.message || 'تعذر تحميل التقييمات.')}</p>`;
                    return;
                }
                renderReviews(data.data || []);
            } catch (e) {
                list.innerHTML = '<p class="text-error-500">حدث خطأ في تحميل التقييمات.</p>';
            }
        }

        function renderReviews(reviews) {
            const list = document.getElementById('reviewsList');
            if (reviews.length === 0) {
                list.innerHTML = '<div class="text-center py-8 text-gray-500"><i class="far fa-comment-dots text-4xl mb-2"></i><p>لا توجد تقييمات حتى الآن. كن أول من يقيّم هذا المنتج!</p></div>';
                return;
            }
            let html = '';
            const currentUserId = decodeTokenUserId();
            reviews.forEach(rev => {
                let starsHtml = '';
                for(let i=1; i<=5; i++) starsHtml += `<i class="fas fa-star ${i <= rev.rating ? 'text-yellow-400' : 'text-gray-300'} text-sm"></i>`;
                
                let replyHtml = '';
                const canEditReview = currentUserRole === 'admin' || Number(rev.user_id) === Number(currentUserId);
                if (rev.reply) {
                    replyHtml = `<div class="mt-4 bg-primary-50 p-4 rounded-md border border-primary-100 mr-8">
                                    <p class="text-xs font-bold text-primary-700 mb-1"><i class="fas fa-store"></i> رد الإدارة:</p>
                                    <p class="text-sm text-gray-700">${escapeHTML(rev.reply)}</p>
                                    ${(currentUserRole === 'admin' || currentUserRole === 'seller') ? `<div class="mt-3"><textarea id="replyInput-${rev.id}" rows="1" class="w-full px-3 py-1.5 border border-gray-300 rounded text-sm mb-2 outline-none focus:ring-1 focus:ring-primary-500">${escapeHTML(rev.reply)}</textarea><button type="button" onclick="submitReply(${rev.id})" class="text-xs bg-gray-800 text-white px-3 py-1 rounded hover:bg-gray-700 transition-colors">تعديل الرد</button></div>` : ''}
                                 </div>`;
                } else if (currentUserRole === 'admin' || currentUserRole === 'seller') {
                    replyHtml = `<div class="mt-3 mr-8" id="replyBox-${rev.id}">
                                    <textarea id="replyInput-${rev.id}" rows="1" placeholder="اكتب ردك هنا..." class="w-full px-3 py-1.5 border border-gray-300 rounded text-sm mb-2 outline-none focus:ring-1 focus:ring-primary-500"></textarea>
                                    <button type="button" onclick="submitReply(${rev.id})" class="text-xs bg-gray-800 text-white px-3 py-1 rounded hover:bg-gray-700 transition-colors">إرسال الرد</button>
                                 </div>`;
                }
                html += `<div class="border-b border-gray-100 pb-6 last:border-0">
                            <div class="flex justify-between items-start mb-2">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center text-gray-600 font-bold"><i class="fas fa-user"></i></div>
                                    <div><h4 class="font-bold text-gray-800 text-sm">${escapeHTML(rev.customer_name) || 'عميل'}</h4><div class="flex gap-1 mt-1">${starsHtml}</div></div>
                                </div>
                            </div>
                            <p id="reviewText-${rev.id}" class="text-gray-600 text-sm mt-3 leading-relaxed pl-12">${escapeHTML(rev.comment)}</p>
                            ${canEditReview ? `<div class="mt-3 pl-12"><textarea id="reviewEdit-${rev.id}" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded text-sm mb-2 outline-none focus:ring-1 focus:ring-primary-500">${escapeHTML(rev.comment)}</textarea><button type="button" onclick="updateReview(${rev.id}, ${rev.rating})" class="text-xs bg-primary-600 text-white px-3 py-1 rounded hover:bg-primary-700 transition-colors">تعديل التقييم</button></div>` : ''}
                            ${replyHtml}
                        </div>`;
            });
            list.innerHTML = html;
            enhanceReviewControls(reviews);
        }

        function enhanceReviewControls(reviews) {
            reviews.forEach(rev => {
                const legacyEdit = document.getElementById(`reviewEdit-${rev.id}`);
                if (!legacyEdit) return;
                const legacyWrap = legacyEdit.parentElement;
                if (legacyWrap) legacyWrap.classList.add('hidden');

                const commentText = document.getElementById(`reviewText-${rev.id}`);
                if (!commentText || document.getElementById(`reviewActions-${rev.id}`)) return;

                commentText.insertAdjacentHTML('afterend', `
                    <div id="reviewActions-${rev.id}" class="mt-3 flex gap-2 pl-12">
                        <button type="button" onclick="startReviewEdit(${rev.id}, ${Number(rev.rating)}, decodeURIComponent('${encodeURIComponent(rev.comment || '')}'))" class="inline-flex items-center gap-1 rounded-lg bg-primary-50 px-3 py-1.5 text-xs font-black text-primary-600 transition hover:bg-primary-100">
                            <i class="fas fa-pen"></i> تعديل
                        </button>
                        <button type="button" onclick="deleteReview(${rev.id})" class="inline-flex items-center gap-1 rounded-lg bg-red-50 px-3 py-1.5 text-xs font-black text-red-600 transition hover:bg-red-100">
                            <i class="fas fa-trash"></i> حذف
                        </button>
                    </div>
                    <div id="reviewEditBox-${rev.id}" class="mt-3 hidden pl-12"></div>
                `);
            });
        }

        async function submitReview() {
            if (userRating === 0) { showToast('يرجى اختيار التقييم بالنجوم', 'error'); return; }
            const comment = document.getElementById('reviewComment').value.trim();
            if (!comment) { showToast('يرجى كتابة تعليقك', 'error'); return; }

            const token = window.AppState ? window.AppState.getToken() : localStorage.getItem('spider_token');
            const btn = document.getElementById('submitReviewBtn');
            btn.disabled = true; btn.innerText = 'جاري النشر...';

            try {
                const res = await fetch(`${API_URL}/reviews`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ product_id: productId, rating: userRating, comment: comment })
                });
                
                if (res.ok) {
                    showToast('تم نشر التقييم بنجاح!');
                    document.getElementById('reviewComment').value = '';
                    userRating = 0;
                    document.querySelectorAll('#starRating i').forEach(s => s.className = 'fas fa-star text-3xl text-gray-300 cursor-pointer peer hover:text-yellow-400 transition');
                    fetchReviews();
                    fetchProductDetails();
                } else {
                    const data = await res.json();
                    showToast(data.message || 'حدث خطأ', 'error');
                }
            } catch (e) { showToast('تأكد من الاتصال بالسيرفر', 'error'); }
            finally { btn.disabled = false; btn.innerText = 'نشر التقييم'; }
        }

        async function submitReply(reviewId) {
            const replyText = document.getElementById(`replyInput-${reviewId}`).value.trim();
            if (!replyText) return;
            const token = window.AppState ? window.AppState.getToken() : localStorage.getItem('spider_token');

            try {
                const res = await fetch(`${API_URL}/reviews/${reviewId}/reply`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ reply: replyText })
                });
                if (res.ok) {
                    showToast('تم إضافة الرد بنجاح');
                    fetchReviews();
                }
            } catch(e) { showToast('حدث خطأ أثناء الرد', 'error'); }
        }

        function startReviewEdit(reviewId, rating, comment) {
            const box = document.getElementById(`reviewEditBox-${reviewId}`);
            if (!box) return;
            box.classList.remove('hidden');
            box.dataset.rating = String(rating);
            box.innerHTML = `
                <div class="rounded-xl border border-slate-200 bg-slate-50 p-3">
                    <div class="mb-3 flex gap-1" id="reviewEditStars-${reviewId}">
                        ${[1, 2, 3, 4, 5].map(star => `<button type="button" data-edit-rating="${star}" onclick="setReviewEditRating(${reviewId}, ${star})" class="text-xl ${star <= rating ? 'text-yellow-400' : 'text-gray-300'}"><i class="fas fa-star"></i></button>`).join('')}
                    </div>
                    <textarea id="reviewEditComment-${reviewId}" rows="3" class="mb-3 w-full rounded-lg border border-gray-300 px-3 py-2 text-sm outline-none focus:ring-1 focus:ring-primary-500">${escapeHTML(comment)}</textarea>
                    <div class="flex gap-2">
                        <button type="button" onclick="updateReview(${reviewId})" class="rounded-lg bg-primary-600 px-4 py-2 text-xs font-black text-white transition hover:bg-primary-700">حفظ التعديل</button>
                        <button type="button" onclick="cancelReviewEdit(${reviewId})" class="rounded-lg border border-slate-200 px-4 py-2 text-xs font-black text-slate-600 transition hover:bg-slate-50">إلغاء</button>
                    </div>
                </div>
            `;
        }

        function setReviewEditRating(reviewId, rating) {
            const box = document.getElementById(`reviewEditBox-${reviewId}`);
            if (box) box.dataset.rating = String(rating);
            document.querySelectorAll(`#reviewEditStars-${reviewId} [data-edit-rating]`).forEach(button => {
                button.classList.toggle('text-yellow-400', Number(button.dataset.editRating) <= rating);
                button.classList.toggle('text-gray-300', Number(button.dataset.editRating) > rating);
            });
        }

        function cancelReviewEdit(reviewId) {
            const box = document.getElementById(`reviewEditBox-${reviewId}`);
            if (!box) return;
            box.classList.add('hidden');
            box.innerHTML = '';
        }

        async function updateReview(reviewId, rating) {
            const box = document.getElementById(`reviewEditBox-${reviewId}`);
            rating = Number(box && box.dataset.rating);
            const comment = String(document.getElementById(`reviewEditComment-${reviewId}`)?.value || '').trim();
            if (!rating || rating < 1 || rating > 5) {
                showToast('يرجى اختيار تقييم صحيح', 'error');
                return;
            }
            if (!comment) {
                showToast('اكتب نص التقييم قبل الحفظ', 'error');
                return;
            }
            const token = window.AppState ? window.AppState.getToken() : localStorage.getItem('spider_token');
            try {
                const res = await fetch(`${API_URL}/reviews/${reviewId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ rating, comment })
                });
                const data = await res.json();
                showToast(data.message || (res.ok ? 'تم تعديل التقييم' : 'تعذر تعديل التقييم'), res.ok ? 'success' : 'error');
                if (res.ok) {
                    cancelReviewEdit(reviewId);
                    fetchReviews();
                    fetchProductDetails();
                }
            } catch (error) {
                showToast('تعذر الاتصال بالسيرفر', 'error');
            }
        }

        async function deleteReview(reviewId) {
            if (!window.confirm('هل تريد حذف هذا التقييم؟')) return;
            const token = window.AppState ? window.AppState.getToken() : localStorage.getItem('spider_token');
            try {
                const res = await fetch(`${API_URL}/reviews/${reviewId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json().catch(() => ({}));
                showToast(data.message || (res.ok ? 'تم حذف التقييم' : 'تعذر حذف التقييم'), res.ok ? 'success' : 'error');
                if (res.ok) {
                    fetchReviews();
                    fetchProductDetails();
                }
            } catch (error) {
                showToast('تعذر الاتصال بالسيرفر', 'error');
            }
        }

        function changeQty(change) {
            let maxStock = parseInt(currentProduct.stock_quantity);
            if (isNaN(maxStock) || maxStock <= 0) maxStock = 10;

            let newQty = selectedQuantity + change;
            
            if (newQty >= 1 && newQty <= maxStock) {
                selectedQuantity = newQty;
                document.getElementById('qtyDisplay').textContent = selectedQuantity;
            } else if (newQty > maxStock) {
                showToast("لقد وصلت للحد الأقصى المتاح في المخزن!", "error");
            }
        }

        // ==========================================
        // الإضافة المباشرة للباك اند (Hybrid Model)
        // ==========================================
        async function addToCartFromDetails(button) {
            const token = window.AppState ? window.AppState.getToken() : (localStorage.getItem('spider_token') || localStorage.getItem('token'));
            if (!token) { 
                addGuestCartItem(currentProduct.id, selectedQuantity);
                showToast(`تم إضافة عدد (${selectedQuantity}) لسلة الزائر`);
                if (typeof updateGlobalCartCount === 'function') updateGlobalCartCount();
                return; 
            }
            
            if (button) button.disabled = true;

            try {
                // إرسال الطلب للسيرفر مباشرة بدون حفظ محلي
                const res = await fetch(`${API_URL}/cart`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ product_id: parseInt(currentProduct.id), quantity: selectedQuantity })
                });

                if (res.ok || res.status === 200 || res.status === 201) {
                    // تحديث الأيقونة اللي في الناف بار فوراً من السيرفر
                    if (typeof updateGlobalCartCount === 'function') updateGlobalCartCount();
                    
                    showToast(`تم إضافة عدد (${selectedQuantity}) للسلة بنجاح!`);
                    
                    // تصفير العداد في الشاشة بعد الإضافة بنجاح
                    selectedQuantity = 1; 
                    document.getElementById('qtyDisplay').textContent = selectedQuantity;
                } else {
                    const data = await res.json();
                    showToast(data.message || 'حدث خطأ أثناء الإضافة', 'error');
                }
            } catch (err) {
                showToast('خطأ في الاتصال بالخادم 🔌', 'error');
            } finally {
                if (button) button.disabled = false;
            }
        }

        async function addToWishlist() {
            const token = window.AppState ? window.AppState.getToken() : (localStorage.getItem('spider_token') || localStorage.getItem('token'));
            if (!token) {
                showToast('يجب تسجيل الدخول لإضافة المنتج لقائمة الأمنيات', 'error');
                return;
            }
            try {
                const res = await fetch(`${API_URL}/wishlist`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ product_id: Number(currentProduct.id) })
                });
                const data = await res.json();
                showToast(data.message || (res.ok ? 'تمت الإضافة لقائمة الأمنيات' : 'تعذر إضافة المنتج'), res.ok ? 'success' : 'error');
            } catch (error) {
                showToast('تعذر الاتصال بالسيرفر', 'error');
            }
        }

        async function fetchWishlistState() {
            const token = window.AppState ? window.AppState.getToken() : (localStorage.getItem('spider_token') || localStorage.getItem('token'));
            if (!token) {
                wishlistProductIds = new Set();
                return;
            }
            try {
                const res = await fetch(`${API_URL}/wishlist`, { headers: { Authorization: `Bearer ${token}` } });
                const data = await res.json().catch(() => ({}));
                const items = Array.isArray(data.data) ? data.data : [];
                wishlistProductIds = new Set(items.map(item => Number(item.id || item.product_id)).filter(Boolean));
            } catch (error) {
                wishlistProductIds = new Set();
            }
        }

        function updateProductWishlistButton(inWishlist) {
            const button = document.getElementById('productWishlistBtn');
            if (!button) return;
            button.dataset.inWishlist = inWishlist ? '1' : '0';
            button.classList.toggle('bg-error-50', inWishlist);
            button.classList.toggle('bg-white', !inWishlist);
            const icon = button.querySelector('i');
            if (icon) icon.className = inWishlist ? 'fas fa-heart' : 'far fa-heart';
        }

        async function toggleProductWishlist(button) {
            const token = window.AppState ? window.AppState.getToken() : (localStorage.getItem('spider_token') || localStorage.getItem('token'));
            if (!token) {
                showToast('يجب تسجيل الدخول لاستخدام قائمة الأمنيات', 'error');
                return;
            }
            if (!button || button.dataset.busy === '1') return;
            button.dataset.busy = '1';
            const productId = Number(currentProduct.id);
            const isActive = button.dataset.inWishlist === '1' || wishlistProductIds.has(productId);
            try {
                const res = await fetch(`${API_URL}${isActive ? '/wishlist/remove' : '/wishlist'}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ product_id: productId })
                });
                const data = await res.json().catch(() => ({}));
                if (res.ok || data.success) {
                    if (isActive) wishlistProductIds.delete(productId);
                    else wishlistProductIds.add(productId);
                    updateProductWishlistButton(!isActive);
                }
                showToast(data.message || (res.ok ? (isActive ? 'تمت الإزالة من قائمة الأمنيات' : 'تمت الإضافة لقائمة الأمنيات') : 'تعذر تحديث قائمة الأمنيات'), res.ok ? 'success' : 'error');
            } catch (error) {
                showToast('تعذر الاتصال بالسيرفر', 'error');
            } finally {
                button.dataset.busy = '0';
            }
        }

        function addGuestCartItem(id, quantity) {
            const productId = Number(id);
            if (!productId) return;
            if (window.AppState) {
                window.AppState.addCartItem(productId, quantity);
                return;
            }
            let cart = [];
            try { cart = JSON.parse(localStorage.getItem('spider_cart') || '[]'); } catch (error) { cart = []; }
            const existing = cart.find(item => Number(item.id || item.product_id) === productId);
            if (existing) existing.quantity = Number(existing.quantity || 0) + quantity;
            else cart.push({ id: productId, product_id: productId, quantity });
            localStorage.setItem('spider_cart', JSON.stringify(cart));
        }

        function showError(msg) {
            document.getElementById('productContainer').innerHTML = `<div class="text-center py-12 w-full"><i class="fas fa-exclamation-triangle text-error-500 text-5xl mb-4"></i><h2 class="text-2xl font-bold text-gray-800">${escapeHTML(msg)}</h2></div>`;
        }

        function showToast(message, type = 'success') {
            if (window.AppUI) return window.AppUI.toast(message, type);
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const isSuccess = type === 'success';
            
            toast.className = `pointer-events-auto relative overflow-hidden bg-white/95 backdrop-blur-md border-r-4 ${isSuccess ? 'border-success-500' : 'border-error-500'} shadow-[0_8px_30px_rgb(0,0,0,0.12)] rounded-xl w-[min(22rem,calc(100vw-2rem))] transform transition-all duration-500 translate-x-full opacity-0 flex p-4 items-center gap-4`;
            
            toast.innerHTML = `
                <div class="flex-shrink-0 w-10 h-10 rounded-full flex items-center justify-center ${isSuccess ? 'bg-success-100 text-success-600' : 'bg-error-100 text-error-600'}">
                    <i class="fas ${isSuccess ? 'fa-check' : 'fa-exclamation'} text-lg"></i>
                </div>
                <div class="flex-1">
                    <h4 class="font-bold text-gray-800 text-sm">${isSuccess ? 'تم بنجاح' : 'تنبيه'}</h4>
                    <p class="text-xs text-gray-500 font-medium mt-0.5 leading-relaxed">${escapeHTML(message)}</p>
                </div>
                <button type="button" class="flex-shrink-0 text-gray-400 hover:text-gray-700" onclick="this.parentElement.remove()">
                    <i class="fas fa-times"></i>
                </button>
                <div class="absolute bottom-0 left-0 w-full h-1 bg-gray-100">
                    <div class="h-full ${isSuccess ? 'bg-success-500' : 'bg-error-500'} animate-progress"></div>
                </div>
            `;
            
            container.appendChild(toast);
            requestAnimationFrame(() => setTimeout(() => toast.classList.remove('translate-x-full', 'opacity-0'), 10));
            setTimeout(() => { toast.classList.add('translate-x-full', 'opacity-0'); setTimeout(() => toast.remove(), 500); }, 3000);
        }

        window.submitReview = submitReview;
        window.submitReply = submitReply;
        window.startReviewEdit = startReviewEdit;
        window.setReviewEditRating = setReviewEditRating;
        window.cancelReviewEdit = cancelReviewEdit;
        window.updateReview = updateReview;
        window.deleteReview = deleteReview;
        window.changeQty = changeQty;
        window.addToCartFromDetails = addToCartFromDetails;
        window.addToWishlist = addToWishlist;
        window.toggleProductWishlist = toggleProductWishlist;
        window.addEventListener('load', fetchProductDetails);
    })();
</script>
</body>
</html>
