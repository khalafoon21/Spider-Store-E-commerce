<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Store | تفاصيل المنتج</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#ECFEFF', 500: '#06B6D4', 600: '#0891B2', 700: '#0E7490' },
                        secondary: { 50: '#FFFBEB', 500: '#F59E0B' },
                        success: { 500: '#22C55E' },
                        error: { 500: '#EF4444' }
                    }
                }
            }
        }
    </script>
    <style> 
        body { background-color: #F9FAFB; } 
        .smooth-transition { transition: all 0.2s ease-out; } 
        .star-hover:hover ~ i { color: #D1D5DB !important; } /* تأثير النجوم */
    </style>
</head>
<body class="font-sans text-gray-800 antialiased flex flex-col min-h-screen">

    <script src="../../components/main-navbar.js"></script>

    <main class="container mx-auto px-4 lg:px-8 py-12 flex-1">
        <a href="../../index.html" class="inline-flex items-center text-gray-500 hover:text-primary-600 mb-8 transition-colors font-medium">
            <i class="fas fa-arrow-right ml-2"></i> العودة للمتجر
        </a>

        <div id="productContainer" class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden min-h-[400px] flex items-center justify-center mb-12">
            <div class="text-center py-12 text-gray-500">
                <i class="fas fa-spinner fa-spin text-4xl mb-3"></i>
                <p class="text-lg">جاري تحميل تفاصيل المنتج...</p>
            </div>
        </div>

        <div id="reviewsSection" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8 hidden">
            <h2 class="text-2xl font-bold text-gray-900 mb-6 border-b pb-4">تقييمات العملاء</h2>

            <div id="addReviewContainer" class="mb-8 hidden bg-gray-50 p-6 rounded-xl border border-gray-200">
                <h3 class="font-bold text-gray-800 mb-4">أضف تقييمك للمنتج</h3>
                <div id="reviewMsg" class="hidden px-4 py-2 rounded-md mb-4 text-sm font-bold text-white"></div>
                
                <div class="flex items-center gap-1 mb-4 flex-row-reverse justify-end" id="starRating">
                    <i class="fas fa-star text-3xl text-gray-300 cursor-pointer peer hover:text-yellow-400 transition" data-val="5"></i>
                    <i class="fas fa-star text-3xl text-gray-300 cursor-pointer peer hover:text-yellow-400 transition" data-val="4"></i>
                    <i class="fas fa-star text-3xl text-gray-300 cursor-pointer peer hover:text-yellow-400 transition" data-val="3"></i>
                    <i class="fas fa-star text-3xl text-gray-300 cursor-pointer peer hover:text-yellow-400 transition" data-val="2"></i>
                    <i class="fas fa-star text-3xl text-gray-300 cursor-pointer peer hover:text-yellow-400 transition" data-val="1"></i>
                </div>

                <textarea id="reviewComment" rows="3" placeholder="اكتب رأيك ومميزات أو عيوب المنتج..." class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-primary-500 outline-none mb-4"></textarea>
                <button onclick="submitReview()" id="submitReviewBtn" class="bg-secondary-500 hover:bg-yellow-500 text-white font-bold py-2 px-6 rounded-md shadow-sm transition-colors">
                    نشر التقييم
                </button>
            </div>

            <div id="reviewsList" class="space-y-6">
                </div>
        </div>
    </main>

    <script>
        const API_URL = 'http://127.0.0.1:3000/api';
        let currentProduct = null;
        let selectedQuantity = 1;
        let userRating = 0;
        let currentUserRole = null; // عشان نعرف هو أدمن ولا يوزر

        // 1. استخراج البيانات من الرابط والتوكن
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        function decodeTokenRole() {
            const token = localStorage.getItem('spider_token');
            if (!token) return null;
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                return payload.role;
            } catch(e) { return null; }
        }

        // =================== قسم تفاصيل المنتج =================== //
        async function fetchProductDetails() {
            if (!productId) { showError('لم يتم العثور على المنتج.'); return; }
            try {
                const response = await fetch(`${API_URL}/products`);
                const data = await response.json();
                if (response.ok || data.success) {
                    const products = data.data || data.products || [];
                    currentProduct = products.find(p => p.id == productId);
                    
                    if (currentProduct) {
                        renderProduct(currentProduct);
                        document.getElementById('reviewsSection').classList.remove('hidden');
                        fetchReviews(); // نجيب التقييمات بعد ما المنتج يحمل
                        setupReviewForm();
                    } else {
                        showError('هذا المنتج غير موجود أو تم حذفه.');
                    }
                }
            } catch (error) { showError('تأكد من تشغيل سيرفر الباك اند 🔌'); }
        }

        function renderProduct(product) {
            const container = document.getElementById('productContainer');
            const imageUrl = (product.image_url && product.image_url.trim() !== '') ? `http://127.0.0.1:3000${product.image_url}` : 'https://via.placeholder.com/600?text=No+Image';
            const isAvailable = product.stock_quantity > 0;

            container.innerHTML = `
                <div class="flex flex-col md:flex-row w-full">
                    <div class="md:w-1/2 bg-white flex items-center justify-center p-8 border-b md:border-b-0 md:border-l border-gray-100">
                        <img src="${imageUrl}" alt="${product.title}" class="max-w-full max-h-[500px] object-contain hover:scale-105 transition-transform duration-300">
                    </div>
                    <div class="md:w-1/2 p-8 lg:p-12 flex flex-col justify-center bg-gray-50">
                        ${isAvailable ? 
                            `<span class="inline-block bg-success-50 text-success-600 text-sm font-bold px-3 py-1 rounded-full mb-4 w-fit border border-success-200">متاح في المخزن</span>` : 
                            `<span class="inline-block bg-error-50 text-error-600 text-sm font-bold px-3 py-1 rounded-full mb-4 w-fit border border-error-200">نفذت الكمية</span>`
                        }
                        <h1 class="text-3xl lg:text-4xl font-bold text-gray-900 mb-4">${product.title}</h1>
                        <p class="text-4xl font-bold text-primary-600 mb-6">${product.price} <span class="text-lg text-gray-500 font-normal">ج.م</span></p>
                        
                        <div class="prose prose-sm text-gray-600 mb-8">
                            <h3 class="text-lg font-bold text-gray-800 mb-2 border-b pb-2">وصف المنتج:</h3>
                            <p class="whitespace-pre-line leading-relaxed">${product.description || 'لا يوجد وصف متاح لهذا المنتج حتى الآن.'}</p>
                        </div>
                        
                        ${isAvailable ? `
                            <div class="flex flex-col sm:flex-row gap-4 mt-auto border-t pt-8 border-gray-200">
                                <div class="flex items-center justify-between border border-gray-300 rounded-md w-full sm:w-32 bg-white">
                                    <button onclick="changeQty(1)" class="w-10 h-12 text-gray-600 hover:text-primary-600"><i class="fas fa-plus"></i></button>
                                    <span id="qtyDisplay" class="font-bold text-lg">1</span>
                                    <button onclick="changeQty(-1)" class="w-10 h-12 text-gray-600 hover:text-error-500"><i class="fas fa-minus"></i></button>
                                </div>
                                <button onclick="addToCartFromDetails()" class="flex-1 bg-primary-500 hover:bg-primary-600 text-white font-bold py-3 px-6 rounded-md transition-colors text-lg flex items-center justify-center gap-2">
                                    <i class="fas fa-cart-plus"></i> إضافة للسلة
                                </button>
                            </div>
                        ` : `
                            <div class="mt-auto border-t pt-8 border-gray-200">
                                <button disabled class="w-full bg-gray-300 text-gray-500 font-bold py-3 px-6 rounded-md cursor-not-allowed flex items-center justify-center gap-2 text-lg">
                                    <i class="fas fa-box-open"></i> المنتج غير متاح حالياً
                                </button>
                            </div>
                        `}
                    </div>
                </div>
            `;
        }

        // =================== قسم التقييمات (الجديد) =================== //
        function setupReviewForm() {
            currentUserRole = decodeTokenRole();
            if (currentUserRole) {
                document.getElementById('addReviewContainer').classList.remove('hidden');
            }

            // نظام تلوين النجوم
            const stars = document.querySelectorAll('#starRating i');
            stars.forEach(star => {
                star.addEventListener('click', (e) => {
                    userRating = parseInt(e.target.getAttribute('data-val'));
                    stars.forEach(s => {
                        const val = parseInt(s.getAttribute('data-val'));
                        s.className = val <= userRating ? 'fas fa-star text-3xl text-yellow-400 cursor-pointer peer' : 'fas fa-star text-3xl text-gray-300 cursor-pointer peer hover:text-yellow-400 transition';
                    });
                });
            });
        }

        async function fetchReviews() {
            const list = document.getElementById('reviewsList');
            try {
                const res = await fetch(`${API_URL}/reviews?product_id=${productId}`);
                const data = await res.json();
                if (data.success) {
                    renderReviews(data.data || []);
                }
            } catch (e) {
                list.innerHTML = '<p class="text-error-500">حدث خطأ في تحميل التقييمات.</p>';
            }
        }

        function renderReviews(reviews) {
            const list = document.getElementById('reviewsList');
            if (reviews.length === 0) {
                list.innerHTML = '<div class="text-center py-8 text-gray-500"><i class="far fa-comment-dots text-4xl mb-2"></i><p>لا توجد تقييمات حتى الآن. كن أول من يقيّم هذا المنتج!</p></div>';
                return;
            }

            let html = '';
            reviews.forEach(rev => {
                // رسم النجوم حسب التقييم
                let starsHtml = '';
                for(let i=1; i<=5; i++) {
                    starsHtml += `<i class="fas fa-star ${i <= rev.rating ? 'text-yellow-400' : 'text-gray-300'} text-sm"></i>`;
                }

                // رسم رد الأدمن لو موجود
                let replyHtml = '';
                if (rev.reply) {
                    replyHtml = `
                        <div class="mt-4 bg-primary-50 p-4 rounded-md border border-primary-100 mr-8">
                            <p class="text-xs font-bold text-primary-700 mb-1"><i class="fas fa-store"></i> رد الإدارة:</p>
                            <p class="text-sm text-gray-700">${rev.reply}</p>
                        </div>
                    `;
                } else if (currentUserRole === 'admin' || currentUserRole === 'seller') {
                    // لو مفيش رد واليوزر أدمن، نطلعله زرار الرد
                    replyHtml = `
                        <div class="mt-3 mr-8" id="replyBox-${rev.id}">
                            <textarea id="replyInput-${rev.id}" rows="1" placeholder="اكتب ردك هنا..." class="w-full px-3 py-1.5 border border-gray-300 rounded text-sm mb-2 outline-none focus:ring-1 focus:ring-primary-500"></textarea>
                            <button onclick="submitReply(${rev.id})" class="text-xs bg-gray-800 text-white px-3 py-1 rounded hover:bg-gray-700">إرسال الرد</button>
                        </div>
                    `;
                }

                html += `
                    <div class="border-b border-gray-100 pb-6 last:border-0">
                        <div class="flex justify-between items-start mb-2">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center text-gray-600 font-bold">
                                    <i class="fas fa-user"></i>
                                </div>
                                <div>
                                    <h4 class="font-bold text-gray-800 text-sm">${rev.customer_name}</h4>
                                    <div class="flex gap-1 mt-1">${starsHtml}</div>
                                </div>
                            </div>
                            <span class="text-xs text-gray-400">${new Date(rev.created_at).toLocaleDateString('ar-EG')}</span>
                        </div>
                        <p class="text-gray-600 text-sm mt-3 leading-relaxed pl-12">${rev.comment}</p>
                        ${replyHtml}
                    </div>
                `;
            });
            list.innerHTML = html;
        }

        async function submitReview() {
            const token = localStorage.getItem('spider_token');
            const comment = document.getElementById('reviewComment').value;
            const msgBox = document.getElementById('reviewMsg');
            const btn = document.getElementById('submitReviewBtn');

            if (userRating === 0) {
                msgBox.textContent = 'برجاء اختيار عدد النجوم أولاً!';
                msgBox.className = 'block px-4 py-2 rounded-md mb-4 text-sm font-bold text-white bg-error-500';
                return;
            }

            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري النشر...';

            try {
                const res = await fetch(`${API_URL}/reviews`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ product_id: productId, rating: userRating, comment: comment })
                });
                const data = await res.json();

                if (res.ok || data.success) {
                    msgBox.textContent = 'شكراً لك! تم إضافة تقييمك بنجاح.';
                    msgBox.className = 'block px-4 py-2 rounded-md mb-4 text-sm font-bold text-white bg-success-500';
                    document.getElementById('reviewComment').value = '';
                    fetchReviews(); // نحدث التقييمات فوراً
                } else {
                    msgBox.textContent = data.message || 'حدث خطأ، ربما قمت بالتقييم مسبقاً.';
                    msgBox.className = 'block px-4 py-2 rounded-md mb-4 text-sm font-bold text-white bg-error-500';
                }
            } catch (e) {
                msgBox.textContent = 'خطأ في الاتصال بالسيرفر.';
                msgBox.className = 'block px-4 py-2 rounded-md mb-4 text-sm font-bold text-white bg-error-500';
            } finally {
                btn.disabled = false; btn.innerHTML = 'نشر التقييم';
            }
        }

        async function submitReply(reviewId) {
            const token = localStorage.getItem('spider_token');
            const replyText = document.getElementById(`replyInput-${reviewId}`).value;
            if(!replyText.trim()) return;

            try {
                const res = await fetch(`${API_URL}/reviews/reply`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ review_id: reviewId, reply: replyText })
                });
                if (res.ok) fetchReviews(); // تحديث فوري
            } catch (e) { alert('خطأ في إرسال الرد'); }
        }

        // =================== دوال أخرى =================== //
        function changeQty(change) {
            let newQty = selectedQuantity + change;
            if (newQty >= 1 && newQty <= (currentProduct.stock_quantity || 10)) {
                selectedQuantity = newQty;
                document.getElementById('qtyDisplay').textContent = selectedQuantity;
            }
        }

        function addToCartFromDetails() {
            const token = localStorage.getItem('spider_token');
            if (!token) {
                showToast('يجب تسجيل الدخول أولاً!', 'error');
                setTimeout(() => window.location.href = '../auth/login.html', 1500);
                return;
            }
            let cart = JSON.parse(localStorage.getItem('spider_cart')) || [];
            const existingItem = cart.find(item => item.id == currentProduct.id);
            const maxStock = currentProduct.stock_quantity || 0;
            
            if (existingItem) {
                existingItem.quantity = Math.min(existingItem.quantity + selectedQuantity, maxStock);
            } else {
                cart.push({ id: currentProduct.id, quantity: Math.min(selectedQuantity, maxStock) });
            }
            localStorage.setItem('spider_cart', JSON.stringify(cart));
            if (typeof updateGlobalCartCount === 'function') updateGlobalCartCount();
            showToast(`تم التحديث (الحد الأقصى للمخزون: ${maxStock})`, 'success');
            selectedQuantity = 1; document.getElementById('qtyDisplay').textContent = selectedQuantity;
        }

        function showToast(msg, type = 'success') { /* ... */ }
        function showError(msg) { /* ... */ }

        // تم التعديل واستخدام addEventListener كما في الـ TODO 🚀
        window.addEventListener('load', () => {
            fetchProductDetails();
        });
    </script>
</body>
</html>
