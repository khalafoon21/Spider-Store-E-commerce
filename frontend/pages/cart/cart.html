<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Store | سلة المشتريات</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#ECFEFF', 500: '#06B6D4', 600: '#0891B2', 700: '#0E7490' },
                        secondary: { 50: '#FFFBEB', 500: '#F59E0B' },
                        error: { 500: '#EF4444' },
                        success: { 500: '#22C55E' }
                    }
                }
            }
        }
    </script>
    <style> body { background-color: #F9FAFB; } .smooth-transition { transition: all 0.2s ease-out; } </style>
</head>
<body class="font-sans text-gray-800 antialiased flex flex-col min-h-screen">

    <nav class="bg-primary-600 text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 lg:px-8 py-3 flex items-center justify-between">
            <a href="../../index.html" class="text-2xl font-bold tracking-wider hover:text-secondary-500 smooth-transition">
                Spider<span class="text-secondary-500">Store</span>
            </a>
            <div class="flex items-center gap-6">
                <a href="#" onclick="logout()" class="hover:text-secondary-500 smooth-transition text-sm font-medium"><i class="fas fa-sign-out-alt ml-1"></i> تسجيل الخروج</a>
                <a href="cart.html" class="relative text-secondary-500 flex items-center">
                    <i class="fas fa-shopping-cart text-xl"></i>
                </a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 lg:px-8 py-12 flex-1">
        <h1 class="text-3xl font-bold text-gray-900 mb-8">سلة المشتريات</h1>

        <div class="flex flex-col lg:flex-row gap-8">
            <div class="lg:w-2/3 bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                <div id="cartItemsContainer" class="space-y-6">
                    <div class="text-center py-8 text-gray-500">
                        <i class="fas fa-spinner fa-spin text-3xl mb-2"></i>
                        <p>جاري تحميل السلة...</p>
                    </div>
                </div>
            </div>

            <div id="orderSummary" class="lg:w-1/3 bg-white rounded-xl shadow-sm border border-gray-100 p-6 h-fit hidden">
                <h2 class="text-xl font-bold text-gray-900 mb-6">ملخص الطلب</h2>
                
                <div class="flex justify-between mb-4 text-gray-600">
                    <span>المجموع الفرعي:</span>
                    <span id="subtotal" class="font-bold text-gray-900">0 ج.م</span>
                </div>
                <div class="flex justify-between mb-4 text-gray-600">
                    <span>مصاريف الشحن:</span>
                    <span class="font-bold text-gray-900">50 ج.م</span>
                </div>
                
                <hr class="my-4 border-gray-200">
                
                <div class="flex justify-between mb-6 text-lg">
                    <span class="font-bold text-gray-900">الإجمالي الكلي:</span>
                    <span id="total" class="font-bold text-primary-600">0 ج.م</span>
                </div>

                <button onclick="goToCheckout()" class="w-full bg-secondary-500 hover:bg-yellow-500 text-white font-bold py-3 px-4 rounded-md shadow-sm smooth-transition text-lg">
                    إتمام الطلب
                </button>
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'http://127.0.0.1:3000/api';
        let productsCache = []; // هنخزن هنا بيانات المنتجات عشان منطلبهاش كل شوية

        // 1. التحقق من الدخول أول حاجة
        function checkAuth() {
            const token = localStorage.getItem('spider_token');
            if (!token) {
                window.location.href = '../auth/login.html';
                return false;
            }
            return true;
        }

        // 2. تحميل بيانات المنتجات من الباك اند وبناء السلة
        async function initCart() {
            if (!checkAuth()) return;

            try {
                // نجيب المنتجات عشان نعرف الأسماء والصور
                const res = await fetch(`${API_URL}/products?t=${new Date().getTime()}`);
                const data = await res.json();
                productsCache = data.data || data.products || [];
                
                renderCart();
            } catch (error) {
                document.getElementById('cartItemsContainer').innerHTML = '<p class="text-center text-error-500">حدث خطأ في تحميل السلة.</p>';
            }
        }

        // 3. رسم السلة بناءً على اللي متخزن في LocalStorage
        function renderCart() {
            let cart = JSON.parse(localStorage.getItem('spider_cart')) || [];
            const container = document.getElementById('cartItemsContainer');
            const summary = document.getElementById('orderSummary');

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <i class="fas fa-shopping-basket text-6xl text-gray-200 mb-4"></i>
                        <p class="text-gray-500 text-lg mb-6">سلة المشتريات فارغة جداً!</p>
                        <a href="../../index.html" class="bg-primary-50 text-primary-600 px-6 py-2 rounded-full font-semibold hover:bg-primary-500 hover:text-white smooth-transition">تصفح المنتجات</a>
                    </div>
                `;
                summary.classList.add('hidden');
                return;
            }

            let html = '';
            let subtotalPrice = 0;

            cart.forEach((cartItem) => {
                // ندور على تفاصيل المنتج في الكاش اللي جبناه من الباك اند
                const product = productsCache.find(p => p.id === cartItem.id);
                
                if (product) {
                    const itemTotal = product.price * cartItem.quantity;
                    subtotalPrice += itemTotal;
                    
                    const imageUrl = (product.image_url && product.image_url.trim() !== '') ? `http://127.0.0.1:3000${product.image_url}` : 'https://via.placeholder.com/150?text=No+Image';

                    html += `
                        <div class="flex items-center gap-4 border-b border-gray-100 pb-6 last:border-0 last:pb-0">
                            <img src="${imageUrl}" alt="${product.title}" class="w-24 h-24 object-cover rounded-md bg-gray-50 border border-gray-200">
                            
                            <div class="flex-1">
                                <h3 class="font-bold text-gray-800 text-lg line-clamp-1">${product.title}</h3>
                                <p class="text-primary-600 font-bold mt-1">${product.price} ج.م</p>
                            </div>
                            
                            <div class="flex items-center gap-3 bg-gray-50 px-3 py-1 rounded-full border border-gray-200">
                                <button onclick="updateQuantity(${cartItem.id}, 1)" class="w-6 h-6 flex items-center justify-center text-gray-600 hover:text-primary-600"><i class="fas fa-plus text-xs"></i></button>
                                <span class="font-bold w-4 text-center text-sm">${cartItem.quantity}</span>
                                <button onclick="updateQuantity(${cartItem.id}, -1)" class="w-6 h-6 flex items-center justify-center text-gray-600 hover:text-error-500"><i class="fas fa-minus text-xs"></i></button>
                            </div>
                            
                            <button onclick="removeItem(${cartItem.id})" class="text-gray-400 hover:text-error-500 p-2 smooth-transition ml-2 text-lg">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    `;
                }
            });

            container.innerHTML = html;
            summary.classList.remove('hidden');
            
            // تحديث الأرقام
            document.getElementById('subtotal').textContent = `${subtotalPrice} ج.م`;
            document.getElementById('total').textContent = `${subtotalPrice + 50} ج.م`; // 50 شحن
        }

        // 4. تغيير الكمية (زيادة أو نقصان)
        function updateQuantity(id, change) {
            let cart = JSON.parse(localStorage.getItem('spider_cart')) || [];
            const itemIndex = cart.findIndex(item => item.id === id);
            
            if (itemIndex > -1) {
                cart[itemIndex].quantity += change;
                // لو الكمية بقت صفر، امسح المنتج
                if (cart[itemIndex].quantity <= 0) {
                    cart.splice(itemIndex, 1);
                }
                localStorage.setItem('spider_cart', JSON.stringify(cart));
                renderCart(); // ارسم السلة من جديد
            }
        }

        // 5. مسح منتج خالص
        function removeItem(id) {
            let cart = JSON.parse(localStorage.getItem('spider_cart')) || [];
            cart = cart.filter(item => item.id !== id);
            localStorage.setItem('spider_cart', JSON.stringify(cart));
            renderCart();
        }

        // 6. تسجيل الخروج
        function logout() {
            localStorage.removeItem('spider_token');
            localStorage.removeItem('spider_cart');
            window.location.href = '../../index.html';
        }

        // 7. زرار إتمام الطلب (هنعملها الخطوة الجاية)
        function goToCheckout() {
    window.location.href = '../orders/checkout.html';
        }

        // التشغيل التلقائي
        window.onload = initCart;
    </script>
</body>
</html>
