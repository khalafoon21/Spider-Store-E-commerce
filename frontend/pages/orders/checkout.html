<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Store | إتمام الطلب</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#ECFEFF', 500: '#06B6D4', 600: '#0891B2', 700: '#0E7490' },
                        secondary: { 50: '#FFFBEB', 500: '#F59E0B' },
                        success: { 500: '#22C55E' },
                        error: { 500: '#EF4444' }
                    }
                }
            }
        }
    </script>
    <style> body { background-color: #F9FAFB; } .smooth-transition { transition: all 0.2s ease-out; } </style>
</head>
<body class="font-sans text-gray-800 antialiased flex flex-col min-h-screen">

    <nav class="bg-primary-600 text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 lg:px-8 py-3 flex items-center justify-between">
            <a href="../../index.html" class="text-2xl font-bold tracking-wider">
                Spider<span class="text-secondary-500">Store</span>
            </a>
            <a href="../cart/cart.html" class="hover:text-secondary-500 smooth-transition text-sm font-medium">
                <i class="fas fa-arrow-right ml-1"></i> العودة للسلة
            </a>
        </div>
    </nav>

    <main class="container mx-auto px-4 lg:px-8 py-12 flex-1">
        <h1 class="text-3xl font-bold text-gray-900 mb-8">إتمام الطلب</h1>

        <div id="errorMessage" class="hidden bg-error-500 text-white px-4 py-3 rounded-md mb-6 font-medium text-center"></div>

        <div class="flex flex-col lg:flex-row gap-8">
            
            <div class="lg:w-2/3 bg-white rounded-xl shadow-sm border border-gray-100 p-6 h-fit">
                <h2 class="text-xl font-bold text-gray-900 mb-6 border-b pb-4">بيانات الشحن</h2>
                
                <form id="checkoutForm" onsubmit="placeOrder(event)">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">الاسم بالكامل</label>
                            <input type="text" id="fullName" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-primary-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">رقم الهاتف</label>
                            <input type="tel" id="phone" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-primary-500 outline-none" dir="ltr">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">العنوان بالتفصيل</label>
                        <textarea id="address" required rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-primary-500 outline-none" placeholder="المدينة, الشارع, رقم العمارة..."></textarea>
                    </div>

                    <div class="mt-8 border-t pt-6">
                        <button type="submit" id="submitBtn" class="w-full bg-success-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-md shadow-sm smooth-transition text-lg flex justify-center items-center gap-2">
                            <i class="fas fa-check-circle"></i> تأكيد الطلب
                        </button>
                    </div>
                </form>
            </div>

            <div class="lg:w-1/3 bg-gray-50 rounded-xl shadow-inner border border-gray-200 p-6 h-fit">
                <h2 class="text-xl font-bold text-gray-900 mb-6">ملخص نهائي</h2>
                
                <div id="checkoutItems" class="space-y-4 mb-6 text-sm">
                    </div>
                
                <hr class="border-gray-300 my-4">
                
                <div class="flex justify-between font-bold text-lg text-gray-900">
                    <span>الإجمالي المطلوب:</span>
                    <span id="finalTotal">0 ج.م</span>
                </div>
                <p class="text-xs text-gray-500 mt-2 text-center">*الدفع عند الاستلام</p>
            </div>

        </div>
    </main>

    <script>
        const API_URL = 'http://127.0.0.1:3000/api';
        let cartData = [];
        let finalAmount = 0;

        // 1. التأكد من تسجيل الدخول ووجود منتجات في السلة
        async function initCheckout() {
            const token = localStorage.getItem('spider_token');
            if (!token) {
                window.location.href = '../auth/login.html';
                return;
            }

            cartData = JSON.parse(localStorage.getItem('spider_cart')) || [];
            if (cartData.length === 0) {
                alert('سلتك فارغة!');
                window.location.href = '../../index.html';
                return;
            }

            // هنجيب أسعار المنتجات الحقيقية من السيرفر (عشان أمان أكتر)
            try {
                const res = await fetch(`${API_URL}/products`);
                const data = await res.json();
                const allProducts = data.data || data.products || [];

                let summaryHtml = '';
                let subtotal = 0;

                cartData.forEach(cartItem => {
                    const product = allProducts.find(p => p.id === cartItem.id);
                    if (product) {
                        subtotal += (product.price * cartItem.quantity);
                        summaryHtml += `
                            <div class="flex justify-between text-gray-700 border-b border-gray-200 pb-2">
                                <span>${cartItem.quantity}x ${product.title}</span>
                                <span class="font-semibold">${product.price * cartItem.quantity} ج</span>
                            </div>
                        `;
                    }
                });

                document.getElementById('checkoutItems').innerHTML = summaryHtml;
                finalAmount = subtotal + 50; // 50 مصاريف شحن
                document.getElementById('finalTotal').textContent = `${finalAmount} ج.م`;

            } catch (error) {
                console.error("خطأ في جلب البيانات:", error);
            }
        }

        // 2. إرسال الطلب للباك اند
        // 2. إرسال الطلب للباك اند (بعد مزامنة السلة)
        async function placeOrder(event) {
            event.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const errorDiv = document.getElementById('errorMessage');
            const token = localStorage.getItem('spider_token');

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري تجهيز الطلب...';
            btn.disabled = true;
            errorDiv.classList.add('hidden');

            try {
                // السحر هنا: 1. نبعت المنتجات للداتا بيز الأول
                // بنعمل Loop يبعت كل منتج لراوت السلة بتاعك
                const syncPromises = cartData.map(item => {
                    return fetch(`${API_URL}/cart`, { // ⚠️ تأكد إن راوت إضافة السلة في الباك اند اسمه /api/cart
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ product_id: item.id, quantity: item.quantity })
                    });
                });

                // نستنى لحد ما كل المنتجات تدخل الداتا بيز بنجاح
                await Promise.all(syncPromises);

                // 2. دلوقتي ناكد الطلب وإحنا مطمنين إن السلة في الداتا بيز مليانة!
                const orderPayload = {
                    shipping_address: document.getElementById('address').value,
                    phone: document.getElementById('phone').value // لو الباك اند بيحتاجه
                };

                const response = await fetch(`${API_URL}/orders/checkout`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify(orderPayload)
                });

                const data = await response.json();

                if (response.ok && data.success !== false) {
                    // نفضي السلة من المتصفح عشان الطلب اتأكد
                    localStorage.removeItem('spider_cart');
                    
                    alert('🎉 مبروك! تم تسجيل طلبك بنجاح. هنتواصل معاك قريباً.');
                    window.location.href = '../../index.html';
                } else {
                    errorDiv.textContent = data.message || 'حدث خطأ أثناء تسجيل الطلب';
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                console.error(error);
                errorDiv.textContent = 'خطأ في الاتصال بالسيرفر. تأكد من تشغيل الباك اند.';
                errorDiv.classList.remove('hidden');
            } finally {
                btn.innerHTML = '<i class="fas fa-check-circle"></i> تأكيد الطلب';
                btn.disabled = false;
            }
        }

        window.addEventListener('load', initCheckout);
    </script>
</body>
</html>
