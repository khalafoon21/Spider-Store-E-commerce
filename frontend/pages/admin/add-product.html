<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Store | إضافة منتج جديد</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { background-color: #F3F4F6; font-family: 'Cairo', sans-serif; } </style>
</head>
<body id="admin-layout" class="text-gray-800 antialiased flex flex-col md:flex-row min-h-screen">

    <main class="flex-1 p-4 md:p-8 md:mr-64 w-full overflow-hidden">
        <header class="mb-8">
            <h1 class="text-2xl md:text-3xl font-bold text-gray-800">إضافة منتج جديد</h1>
            <p class="text-gray-500 mt-2">أدخل تفاصيل المنتج وارفع الصور ليظهر فوراً في المتجر.</p>
        </header>

        <div id="messageBox" class="hidden px-6 py-3 rounded-md mb-6 font-bold text-center transition-all"></div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 md:p-8 max-w-4xl">
            <form id="addProductForm" onsubmit="handleAddProduct(event)">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">اسم المنتج <span class="text-red-500">*</span></label>
                        <input type="text" id="title" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-cyan-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">السعر الأساسي (ج.م) <span class="text-red-500">*</span></label>
                        <input type="number" id="price" required min="1" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-cyan-500 outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">نسبة الخصم (%)</label>
                        <input type="number" id="discount" min="0" max="100" placeholder="اختياري" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-cyan-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">الكمية المتاحة (Stock) <span class="text-red-500">*</span></label>
                        <input type="number" id="stock" required min="0" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-cyan-500 outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">العلامة التجارية (Brand)</label>
                        <input type="text" id="brand" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-cyan-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">القسم (Category) <span class="text-red-500">*</span></label>
                        <select id="category_id" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-cyan-500 outline-none bg-white">
                            <option value="" disabled selected>جاري تحميل الأقسام...</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6 bg-gray-50 p-4 rounded-lg border border-gray-200">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">الصورة الأساسية <span class="text-red-500">*</span></label>
                        <input type="file" id="main_image" accept="image/*" required class="w-full px-4 py-2 border border-gray-300 rounded-md bg-white">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">صور إضافية (اختياري للسلايدر)</label>
                        <input type="file" id="additional_images" accept="image/*" multiple class="w-full px-4 py-2 border border-gray-300 rounded-md bg-white">
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-bold text-gray-700 mb-2">الكلمات الدلالية (Tags)</label>
                    <input type="text" id="tags" placeholder="مثال: ألعاب, بلايستيشن" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-cyan-500 outline-none">
                </div>

                <div class="mb-8">
                    <label class="block text-sm font-bold text-gray-700 mb-2">وصف المنتج</label>
                    <textarea id="description" rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-cyan-500 outline-none"></textarea>
                </div>

                <button type="submit" id="submitBtn" class="w-full md:w-auto bg-cyan-500 hover:bg-cyan-600 text-white font-bold py-3 px-8 rounded-md shadow-sm transition-all flex items-center justify-center gap-2">
                    <i class="fas fa-save"></i> حفظ ونشر المنتج
                </button>
            </form>
        </div>
    </main>

    <script src="../../components/admin-sidebar.js"></script>
    <script>
        if(typeof loadAdminSidebar === 'function') loadAdminSidebar('add-product');
        const API_URL = 'http://127.0.0.1:3000/api';

        // دالة جلب الأقسام
        async function fetchCategoriesForSelect() {
            try {
                const response = await fetch(`${API_URL}/categories`);
                const data = await response.json();
                const selectElement = document.getElementById('category_id');
                
                if (data.success && data.data.length > 0) {
                    selectElement.innerHTML = '<option value="" disabled selected>اختر القسم...</option>';
                    data.data.forEach(cat => {
                        selectElement.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
                    });
                } else {
                    selectElement.innerHTML = '<option value="" disabled selected>لا توجد أقسام (قم بإضافتها أولاً)</option>';
                }
            } catch (error) {
                document.getElementById('category_id').innerHTML = '<option value="" disabled selected>خطأ في تحميل الأقسام</option>';
            }
        }

        window.addEventListener('load', fetchCategoriesForSelect);

        async function handleAddProduct(event) {
            event.preventDefault();
            const btn = document.getElementById('submitBtn');
            const msgBox = document.getElementById('messageBox');
            const token = localStorage.getItem('spider_token') || localStorage.getItem('token');

            const formData = new FormData();
            formData.append('title', document.getElementById('title').value);
            formData.append('price', document.getElementById('price').value);
            formData.append('discount', document.getElementById('discount').value || 0);
            formData.append('stock_quantity', document.getElementById('stock').value);
            formData.append('brand', document.getElementById('brand').value);
            formData.append('category_id', document.getElementById('category_id').value);
            formData.append('tags', document.getElementById('tags').value);
            formData.append('description', document.getElementById('description').value);

            // 💡 السحر هنا: هنبعت الصورة الأساسية والإضافية تحت اسم 'images' 
            // الكنترولر بتاعنا بيفهم إن أول صورة في الـ array هي الـ main_image
            const mainImage = document.getElementById('main_image').files[0];
            if (mainImage) {
                formData.append('images', mainImage); 
            }

            const additionalImages = document.getElementById('additional_images').files;
            for (let i = 0; i < additionalImages.length; i++) {
                formData.append('images', additionalImages[i]);
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الرفع والحفظ...';
            btn.disabled = true;
            msgBox.classList.add('hidden');

            try {
                const response = await fetch(`${API_URL}/products`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData 
                });

                const data = await response.json();

                if (response.ok || data.success) {
                    msgBox.className = 'px-6 py-3 rounded-md mb-6 font-bold text-center bg-green-500 text-white block';
                    msgBox.innerHTML = '<i class="fas fa-check-circle"></i> تم إضافة المنتج بنجاح!';
                    document.getElementById('addProductForm').reset(); 
                    document.getElementById('category_id').value = ''; 
                    
                    // إخفاء رسالة النجاح بعد 4 ثواني
                    setTimeout(() => msgBox.classList.add('hidden'), 4000);
                } else {
                    msgBox.className = 'px-6 py-3 rounded-md mb-6 font-bold text-center bg-red-500 text-white block';
                    msgBox.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${data.message}`;
                }
            } catch (error) {
                msgBox.className = 'px-6 py-3 rounded-md mb-6 font-bold text-center bg-red-500 text-white block';
                msgBox.innerHTML = '<i class="fas fa-wifi"></i> خطأ في الاتصال بالسيرفر';
            } finally {
                btn.innerHTML = '<i class="fas fa-save"></i> حفظ ونشر المنتج';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
