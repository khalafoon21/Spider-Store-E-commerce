<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Store | إضافة منتج جديد</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: {
                        primary: {
                            50: '#ECFEFF',
                            100: '#CFFAFE',
                            500: '#06B6D4',
                            600: '#0891B2',
                            700: '#0E7490'
                        },
                        secondary: { 500: '#F59E0B' },
                        success: {
                            50: '#F0FDF4',
                            100: '#DCFCE7',
                            500: '#22C55E',
                            600: '#16A34A',
                            700: '#15803D'
                        },
                        error: {
                            50: '#FEF2F2',
                            100: '#FEE2E2',
                            500: '#EF4444',
                            600: '#DC2626',
                            700: '#B91C1C'
                        },
                        warning: {
                            50: '#FFFBEB',
                            100: '#FEF3C7',
                            500: '#F59E0B',
                            600: '#D97706',
                            700: '#B45309'
                        },
                        info: {
                            50: '#EFF6FF',
                            500: '#3B82F6',
                            700: '#1D4ED8'
                        }
                    }
                }
            }
        };
    </script>

    <style>
        body {
            background-color: #F8FAFC;
        }

        @keyframes shrinkProgress {
            from { width: 100%; }
            to { width: 0%; }
        }

        .animate-progress {
            animation: shrinkProgress 3s linear forwards;
        }

        .custom-scrollbar::-webkit-scrollbar {
            height: 8px;
            width: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 999px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 999px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

<body id="admin-layout" class="min-h-screen overflow-x-hidden bg-slate-50 font-sans text-slate-800 antialiased">

    <main class="min-h-screen w-full overflow-x-hidden px-3 pb-6 pt-28 sm:px-4 sm:pt-28 md:mr-64 md:w-[calc(100%-16rem)] md:pt-6 lg:px-6 lg:py-8">

        <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-3 pointer-events-none" aria-live="polite"></div>

        <header class="mb-5 scroll-mt-28 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm sm:p-5">
            <div class="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
                <div>
                    <p class="mb-2 text-sm font-black text-primary-600">Admin Panel</p>
                    <h1 class="text-2xl font-black text-slate-950 sm:text-3xl">إضافة منتج جديد</h1>
                    <p class="mt-2 max-w-2xl text-sm font-semibold leading-7 text-slate-500">
                        أدخل تفاصيل المنتج وارفع الصور ليظهر في المتجر بعد الحفظ.
                    </p>
                </div>

                <a href="manage-products.html" class="inline-flex h-11 w-full items-center justify-center gap-2 rounded-xl border border-slate-200 bg-white px-4 text-sm font-black text-slate-700 transition hover:border-primary-200 hover:bg-primary-50 hover:text-primary-700 sm:w-auto">
                    <i class="fas fa-box"></i>
                    إدارة المنتجات
                </a>
            </div>
        </header>

        <section class="mx-auto w-full max-w-5xl rounded-2xl border border-slate-200 bg-white p-4 shadow-sm sm:p-5 lg:p-6">
            <form id="addProductForm" onsubmit="handleAddProduct(event)" class="space-y-6">

                <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
                    <div>
                        <label for="title" class="mb-2 block text-sm font-black text-slate-700">
                            اسم المنتج <span class="text-error-500">*</span>
                        </label>
                        <input
                            type="text"
                            id="title"
                            required
                            placeholder="مثال: AirPods Pro 2"
                            class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-semibold outline-none transition focus:border-primary-500 focus:bg-white focus:ring-4 focus:ring-primary-50"
                        >
                    </div>

                    <div>
                        <label for="price" class="mb-2 block text-sm font-black text-slate-700">
                            السعر الأساسي ج.م <span class="text-error-500">*</span>
                        </label>
                        <input
                            type="number"
                            id="price"
                            required
                            min="1"
                            step="0.01"
                            placeholder="مثال: 500"
                            class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-semibold outline-none transition focus:border-primary-500 focus:bg-white focus:ring-4 focus:ring-primary-50"
                        >
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
                    <div>
                        <label for="discount" class="mb-2 block text-sm font-black text-slate-700">
                            نسبة الخصم %
                            <span class="text-xs font-semibold text-slate-400">اختياري</span>
                        </label>
                        <input
                            type="number"
                            id="discount"
                            min="0"
                            max="100"
                            placeholder="مثال: 15"
                            class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-semibold outline-none transition focus:border-primary-500 focus:bg-white focus:ring-4 focus:ring-primary-50"
                        >
                    </div>

                    <div>
                        <label for="stock" class="mb-2 block text-sm font-black text-slate-700">
                            الكمية المتاحة <span class="text-error-500">*</span>
                        </label>
                        <input
                            type="number"
                            id="stock"
                            required
                            min="0"
                            placeholder="مثال: 20"
                            class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-semibold outline-none transition focus:border-primary-500 focus:bg-white focus:ring-4 focus:ring-primary-50"
                        >
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
                    <div>
                        <label for="brand" class="mb-2 block text-sm font-black text-slate-700">
                            العلامة التجارية
                            <span class="text-xs font-semibold text-slate-400">اختياري</span>
                        </label>
                        <input
                            type="text"
                            id="brand"
                            placeholder="مثال: Apple"
                            class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-semibold outline-none transition focus:border-primary-500 focus:bg-white focus:ring-4 focus:ring-primary-50"
                        >
                    </div>

                    <div>
                        <label for="category_id" class="mb-2 block text-sm font-black text-slate-700">
                            القسم <span class="text-error-500">*</span>
                        </label>

                        <div class="relative">
                            <select
                                id="category_id"
                                required
                                class="w-full appearance-none rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 pl-10 text-sm font-semibold outline-none transition focus:border-primary-500 focus:bg-white focus:ring-4 focus:ring-primary-50"
                            >
                                <option value="" disabled selected>جاري تحميل الأقسام...</option>
                            </select>

                            <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center px-4 text-slate-400">
                                <i class="fas fa-chevron-down text-sm"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <section class="rounded-2xl border border-primary-100 bg-primary-50/50 p-4 sm:p-5">
                    <div class="mb-4 flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
                        <div>
                            <h2 class="text-lg font-black text-slate-950">صور المنتج</h2>
                            <p class="mt-1 text-xs font-semibold leading-6 text-slate-500">
                                الحد الأقصى 8 صور إجمالي، والحجم الكلي لا يتجاوز 10MB.
                            </p>
                        </div>

                        <span id="imagesCounter" class="inline-flex w-fit items-center gap-2 rounded-full bg-white px-3 py-1 text-xs font-black text-primary-600 shadow-sm">
                            <i class="fas fa-images"></i>
                            0 / 8
                        </span>
                    </div>

                    <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
                        <div>
                            <label for="main_image" class="mb-2 block text-sm font-black text-slate-700">
                                الصورة الأساسية <span class="text-error-500">*</span>
                            </label>

                            <input
                                type="file"
                                id="main_image"
                                accept="image/*"
                                required
                                class="w-full cursor-pointer rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-semibold file:ml-4 file:rounded-lg file:border-0 file:bg-primary-50 file:px-4 file:py-2 file:text-sm file:font-black file:text-primary-700 hover:file:bg-primary-100"
                            >

                            <div id="mainImagePreview" class="mt-3"></div>
                        </div>

                        <div>
                            <label for="additional_images" class="mb-2 block text-sm font-black text-slate-700">
                                صور إضافية
                                <span class="text-xs font-semibold text-slate-500">اختياري</span>
                            </label>

                            <input
                                type="file"
                                id="additional_images"
                                accept="image/*"
                                multiple
                                class="w-full cursor-pointer rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-semibold file:ml-4 file:rounded-lg file:border-0 file:bg-slate-100 file:px-4 file:py-2 file:text-sm file:font-black file:text-slate-700 hover:file:bg-slate-200"
                            >

                            <div id="additionalImagesPreview" class="mt-3 grid grid-cols-2 gap-2 sm:grid-cols-3"></div>
                        </div>
                    </div>
                </section>

                <div>
                    <label for="tags" class="mb-2 block text-sm font-black text-slate-700">
                        الكلمات الدلالية
                        <span class="text-xs font-semibold text-slate-400">مفصولة بفاصلة</span>
                    </label>
                    <input
                        type="text"
                        id="tags"
                        list="tagsList"
                        placeholder="مثال: ألعاب, بلايستيشن, أجهزة ذكية"
                        class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-semibold outline-none transition focus:border-primary-500 focus:bg-white focus:ring-4 focus:ring-primary-50"
                    >
                    <datalist id="tagsList"></datalist>
                </div>

                <div>
                    <label for="description" class="mb-2 block text-sm font-black text-slate-700">
                        وصف المنتج
                    </label>
                    <textarea
                        id="description"
                        rows="5"
                        placeholder="اكتب تفاصيل ومواصفات المنتج هنا..."
                        class="w-full resize-y rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-semibold leading-7 outline-none transition focus:border-primary-500 focus:bg-white focus:ring-4 focus:ring-primary-50"
                    ></textarea>
                </div>

                <div class="flex flex-col gap-3 border-t border-slate-200 pt-5 sm:flex-row sm:items-center sm:justify-between">
                    <p class="text-xs font-semibold leading-6 text-slate-500">
                        بعد الحفظ، المنتج سيظهر حسب حالة الموافقة الموجودة في النظام.
                    </p>

                    <button
                        type="submit"
                        id="submitBtn"
                        class="inline-flex h-12 w-full items-center justify-center gap-2 rounded-xl bg-primary-600 px-8 text-base font-black text-white shadow-lg shadow-cyan-100 transition hover:bg-primary-700 disabled:cursor-not-allowed disabled:opacity-60 sm:w-auto"
                    >
                        <i class="fas fa-plus-circle"></i>
                        حفظ ونشر المنتج
                    </button>
                </div>
            </form>
        </section>
    </main>

    <script src="../../components/app-state.js"></script>
    <script src="../../components/admin-sidebar.js"></script>

    <script>
    (() => {
        const API_URL = '/api';
        const MAX_IMAGES = 8;
        const MAX_TOTAL_SIZE = 10 * 1024 * 1024;

        let mainImageFile = null;
        let additionalImageFiles = [];

        if (typeof window.loadAdminSidebar === 'function') {
            window.loadAdminSidebar('add-product');
        }

        const escapeHTML = value => String(value || '').replace(/[&<>'"]/g, tag => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            "'": '&#39;',
            '"': '&quot;'
        }[tag]));

        function getToken() {
            if (window.AppState && typeof window.AppState.getToken === 'function') {
                return window.AppState.getToken();
            }

            return localStorage.getItem('spider_token') || localStorage.getItem('token');
        }

        function showToast(message, type = 'success') {
            if (window.AppUI && typeof window.AppUI.toast === 'function') {
                return window.AppUI.toast(message, type);
            }

            const container = document.getElementById('toast-container');
            if (!container) return;

            const toast = document.createElement('div');
            const isSuccess = type === 'success';

            toast.className = `pointer-events-auto relative overflow-hidden rounded-xl border-r-4 bg-white/95 p-4 shadow-xl transition-all duration-500 ${
                isSuccess ? 'border-success-500' : 'border-error-500'
            }`;

            toast.innerHTML = `
                <p class="text-sm font-bold ${isSuccess ? 'text-slate-800' : 'text-error-600'}">${escapeHTML(message)}</p>
                <div class="absolute bottom-0 left-0 h-1 w-full bg-slate-100">
                    <div class="h-full ${isSuccess ? 'bg-success-500' : 'bg-error-500'} animate-progress"></div>
                </div>
            `;

            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function fetchJson(url, options = {}) {
            const response = await fetch(url, options);
            const data = await response.json().catch(() => ({}));
            return { response, data };
        }

        async function fetchCategoriesForSelect() {
            const selectElement = document.getElementById('category_id');
            if (!selectElement) return;

            try {
                const { response, data } = await fetchJson(`${API_URL}/categories`);

                if (!response.ok || data.success === false) {
                    throw new Error(data.message || data.error || 'تعذر تحميل الأقسام');
                }

                const categories = Array.isArray(data.data) ? data.data : [];

                if (categories.length > 0) {
                    selectElement.innerHTML = '<option value="" disabled selected>اختر القسم المناسب...</option>';

                    categories.forEach(category => {
                        selectElement.innerHTML += `
                            <option value="${Number(category.id)}">${escapeHTML(category.name)}</option>
                        `;
                    });
                } else {
                    selectElement.innerHTML = '<option value="" disabled selected>لا توجد أقسام، قم بإضافتها أولاً</option>';
                }
            } catch (error) {
                console.error('Categories load error:', error);
                selectElement.innerHTML = '<option value="" disabled selected>خطأ في تحميل الأقسام</option>';
                showToast(error.message || 'حدث خطأ أثناء تحميل الأقسام', 'error');
            }
        }

        async function fetchTagsForSelect() {
            try {
                const { response, data } = await fetchJson(`${API_URL}/tags`);

                if (!response.ok || data.success === false) return;

                const tags = Array.isArray(data.data) ? data.data : [];
                const list = document.getElementById('tagsList');

                if (!list) return;

                list.innerHTML = tags
                    .map(tag => `<option value="${escapeHTML(tag.name)}"></option>`)
                    .join('');
            } catch (error) {}
        }

        function getAllSelectedImages() {
            return [
                ...(mainImageFile ? [mainImageFile] : []),
                ...additionalImageFiles
            ];
        }

        function getTotalImagesSize() {
            return getAllSelectedImages().reduce((total, file) => total + Number(file.size || 0), 0);
        }

        function updateImagesCounter() {
            const counter = document.getElementById('imagesCounter');
            if (!counter) return;

            const count = getAllSelectedImages().length;
            const totalMb = (getTotalImagesSize() / 1024 / 1024).toFixed(1);

            counter.innerHTML = `
                <i class="fas fa-images"></i>
                ${count} / ${MAX_IMAGES}
                <span class="text-slate-400">- ${totalMb}MB</span>
            `;
        }

        function validateImageFiles() {
            const files = getAllSelectedImages();

            if (files.length > MAX_IMAGES) {
                showToast(`الحد الأقصى ${MAX_IMAGES} صور فقط`, 'error');
                return false;
            }

            if (getTotalImagesSize() > MAX_TOTAL_SIZE) {
                showToast('حجم الصور الكلي أكبر من 10MB. قلل عدد الصور أو ضغطها.', 'error');
                return false;
            }

            const invalidFile = files.find(file => !String(file.type || '').startsWith('image/'));

            if (invalidFile) {
                showToast('مسموح برفع الصور فقط', 'error');
                return false;
            }

            return true;
        }

        function createPreviewCard(file, index, type) {
            const url = URL.createObjectURL(file);

            return `
                <div class="relative overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm">
                    <img src="${url}" alt="Preview" class="h-28 w-full object-cover">
                    <button
                        type="button"
                        onclick="window.removeSelectedImage('${type}', ${index})"
                        class="absolute right-2 top-2 grid h-8 w-8 place-items-center rounded-full bg-error-500 text-white shadow-md transition hover:bg-error-600"
                        aria-label="Remove image"
                    >
                        <i class="fas fa-times text-xs"></i>
                    </button>
                    <div class="p-2">
                        <p class="truncate text-xs font-bold text-slate-700">${escapeHTML(file.name)}</p>
                        <p class="text-[11px] font-semibold text-slate-400">${(file.size / 1024 / 1024).toFixed(2)}MB</p>
                    </div>
                </div>
            `;
        }

        function renderImagePreviews() {
            const mainPreview = document.getElementById('mainImagePreview');
            const additionalPreview = document.getElementById('additionalImagesPreview');

            if (mainPreview) {
                mainPreview.innerHTML = mainImageFile
                    ? createPreviewCard(mainImageFile, 0, 'main')
                    : '';
            }

            if (additionalPreview) {
                additionalPreview.innerHTML = additionalImageFiles.length
                    ? additionalImageFiles.map((file, index) => createPreviewCard(file, index, 'additional')).join('')
                    : '';
            }

            updateImagesCounter();
        }

        function resetFileInputs() {
            const mainInput = document.getElementById('main_image');
            const additionalInput = document.getElementById('additional_images');

            if (mainInput) mainInput.value = '';
            if (additionalInput) additionalInput.value = '';
        }

        function wireImageInputs() {
            const mainInput = document.getElementById('main_image');
            const additionalInput = document.getElementById('additional_images');

            if (mainInput) {
                mainInput.addEventListener('change', event => {
                    const file = event.target.files && event.target.files[0];

                    if (!file) {
                        mainImageFile = null;
                        renderImagePreviews();
                        return;
                    }

                    mainImageFile = file;

                    if (!validateImageFiles()) {
                        mainImageFile = null;
                        mainInput.value = '';
                    }

                    renderImagePreviews();
                });
            }

            if (additionalInput) {
                additionalInput.addEventListener('change', event => {
                    const incoming = Array.from(event.target.files || []);

                    additionalImageFiles = [...additionalImageFiles, ...incoming];

                    if (getAllSelectedImages().length > MAX_IMAGES) {
                        additionalImageFiles = additionalImageFiles.slice(0, Math.max(0, MAX_IMAGES - (mainImageFile ? 1 : 0)));
                        showToast(`تم اختيار أول ${MAX_IMAGES} صور فقط`, 'error');
                    }

                    if (!validateImageFiles()) {
                        additionalImageFiles = [];
                        additionalInput.value = '';
                    }

                    renderImagePreviews();
                });
            }
        }

        function removeSelectedImage(type, index) {
            if (type === 'main') {
                mainImageFile = null;
                const input = document.getElementById('main_image');
                if (input) input.value = '';
            }

            if (type === 'additional') {
                additionalImageFiles = additionalImageFiles.filter((_, fileIndex) => Number(fileIndex) !== Number(index));
                const input = document.getElementById('additional_images');
                if (input) input.value = '';
            }

            renderImagePreviews();
        }

        function setSubmitLoading(isLoading) {
            const button = document.getElementById('submitBtn');
            if (!button) return;

            if (isLoading) {
                button.dataset.originalHtml = button.innerHTML;
                button.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> جاري الرفع والحفظ...';
                button.disabled = true;
                return;
            }

            button.innerHTML = button.dataset.originalHtml || '<i class="fas fa-plus-circle"></i> حفظ ونشر المنتج';
            button.disabled = false;
        }

        async function handleAddProduct(event) {
            event.preventDefault();

            const token = getToken();

            if (!token) {
                showToast('يرجى تسجيل الدخول أولاً', 'error');
                setTimeout(() => {
                    window.location.href = '../auth/login.html';
                }, 1200);
                return;
            }

            if (!mainImageFile) {
                showToast('الصورة الأساسية مطلوبة', 'error');
                return;
            }

            if (!validateImageFiles()) return;

            const formData = new FormData();

            formData.append('title', document.getElementById('title').value.trim());
            formData.append('price', document.getElementById('price').value);
            formData.append('discount', document.getElementById('discount').value || 0);
            formData.append('stock_quantity', document.getElementById('stock').value);
            formData.append('brand', document.getElementById('brand').value.trim());
            formData.append('category_id', document.getElementById('category_id').value);
            formData.append('tags', document.getElementById('tags').value.trim());
            formData.append('description', document.getElementById('description').value.trim());

            formData.append('images', mainImageFile);

            additionalImageFiles.forEach(file => {
                formData.append('images', file);
            });

            setSubmitLoading(true);

            try {
                const { response, data } = await fetchJson(`${API_URL}/products`, {
                    method: 'POST',
                    headers: {
                        Authorization: `Bearer ${token}`
                    },
                    body: formData
                });

                if (response.ok && data.success !== false) {
                    showToast('تم إضافة المنتج إلى المتجر بنجاح', 'success');

                    document.getElementById('addProductForm').reset();
                    mainImageFile = null;
                    additionalImageFiles = [];
                    resetFileInputs();
                    renderImagePreviews();
                    fetchTagsForSelect();
                } else {
                    throw new Error(data.message || data.error || 'حدث خطأ أثناء إضافة المنتج');
                }
            } catch (error) {
                console.error('Add product error:', error);
                showToast(error.message || 'خطأ في الاتصال بالسيرفر', 'error');
            } finally {
                setSubmitLoading(false);
            }
        }

        window.handleAddProduct = handleAddProduct;
        window.removeSelectedImage = removeSelectedImage;

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                fetchCategoriesForSelect();
                fetchTagsForSelect();
                wireImageInputs();
                renderImagePreviews();
            }, { once: true });
        } else {
            fetchCategoriesForSelect();
            fetchTagsForSelect();
            wireImageInputs();
            renderImagePreviews();
        }
    })();
    </script>
</body>
</html>
