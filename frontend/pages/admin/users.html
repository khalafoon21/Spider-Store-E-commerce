<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Store | إدارة المستخدمين</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#ECFEFF', 500: '#06B6D4', 600: '#0891B2', 700: '#0E7490' },
                        secondary: { 500: '#F59E0B' },
                        success: { 500: '#22C55E' },
                        error: { 500: '#EF4444' }
                    }
                }
            }
        }
    </script>
    <style> body { background-color: #F3F4F6; } </style>
</head>
<body id="admin-layout" class="font-sans text-gray-800 antialiased flex flex-col md:flex-row min-h-screen">

    <main class="flex-1 p-4 md:p-8 md:mr-64 w-full overflow-hidden">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-gray-800">إدارة المستخدمين</h1>
                <p class="text-gray-500 mt-2">تحكم في صلاحيات الأعضاء (مستخدم عادي، بائع، أدمن).</p>
            </div>
            <div id="toast" class="hidden bg-success-500 text-white px-6 py-2 rounded-full shadow-md transition-opacity font-bold text-sm md:text-base w-full md:w-auto text-center">
                <i class="fas fa-check-circle ml-1"></i> تم تحديث الصلاحية بنجاح
            </div>
        </header>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 w-full">
            <div class="overflow-x-auto w-full">
                <table class="w-full text-right border-collapse min-w-[600px]">
                    <thead class="bg-gray-50 border-b border-gray-200 text-gray-600 text-sm md:text-base">
                        <tr>
                            <th class="p-3 md:p-4 whitespace-nowrap">ID</th>
                            <th class="p-3 md:p-4 whitespace-nowrap">الاسم</th>
                            <th class="p-3 md:p-4 whitespace-nowrap">البريد الإلكتروني</th>
                            <th class="p-3 md:p-4 whitespace-nowrap">الدور الحالي</th>
                            <th class="p-3 md:p-4 whitespace-nowrap">تعديل الصلاحية</th>
                        </tr>
                    </thead>
                    <tbody id="usersContainer" class="divide-y divide-gray-100 text-sm md:text-base">
                        <tr>
                            <td colspan="5" class="p-8 text-center text-gray-500">
                                <i class="fas fa-spinner fa-spin text-3xl mb-2"></i> جاري تحميل المستخدمين...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="../../components/admin-sidebar.js"></script>

    <script>
        loadAdminSidebar('users'); // تفعيل زرار إدارة المستخدمين

        const API_URL = 'http://127.0.0.1:3000/api';

        async function fetchUsers() {
            const token = localStorage.getItem('spider_token');
            if (!token) window.location.href = '../auth/login.html';

            try {
                const response = await fetch(`${API_URL}/admin/users`, { 
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (response.ok || data.success) {
                    renderUsers(data.data || data.users || []);
                } else {
                    document.getElementById('usersContainer').innerHTML = `<tr><td colspan="5" class="text-center text-error-500 p-8 font-bold">خطأ: ${data.message}</td></tr>`;
                }
            } catch (error) {
                document.getElementById('usersContainer').innerHTML = '<tr><td colspan="5" class="text-center text-error-500 p-8 font-bold">خطأ في الاتصال بالسيرفر</td></tr>';
            }
        }

        function renderUsers(users) {
            const container = document.getElementById('usersContainer');

            if (users.length === 0) {
                container.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-gray-500">لا يوجد مستخدمين.</td></tr>`;
                return;
            }

            let html = '';
            users.forEach(user => {
                let roleBadge = '';
                if(user.role === 'admin') roleBadge = '<span class="bg-red-100 text-red-700 px-2 py-1 rounded text-xs font-bold">مدير (Admin)</span>';
                else if(user.role === 'seller') roleBadge = '<span class="bg-blue-100 text-blue-700 px-2 py-1 rounded text-xs font-bold">بائع (Seller)</span>';
                else roleBadge = '<span class="bg-gray-100 text-gray-700 px-2 py-1 rounded text-xs font-bold">مستخدم (Customer)</span>';

                // التعديل الأول هنا: استخدام customer بدل user
                const isCustomer = (user.role === 'customer' || user.role === 'user') ? 'selected' : '';
                const isSeller = user.role === 'seller' ? 'selected' : '';
                const isAdmin = user.role === 'admin' ? 'selected' : '';

                html += `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="p-3 md:p-4 font-bold text-gray-800">#${user.id}</td>
                        <td class="p-3 md:p-4 font-semibold text-gray-800">${user.first_name || user.username || 'بدون اسم'}</td>
                        <td class="p-3 md:p-4 text-gray-600">${user.email}</td>
                        <td class="p-3 md:p-4">${roleBadge}</td>
                        <td class="p-3 md:p-4">
                            <div class="flex flex-col sm:flex-row items-start sm:items-center gap-2">
                                <select id="role-${user.id}" class="border border-gray-300 rounded px-2 md:px-3 py-1.5 outline-none focus:border-primary-500 bg-white text-xs md:text-sm font-medium w-full sm:w-auto">
                                    <option value="customer" ${isCustomer}>مستخدم</option>
                                    <option value="seller" ${isSeller}>بائع</option>
                                    <option value="admin" ${isAdmin}>مدير</option>
                                </select>
                                <button onclick="updateUserRole(${user.id})" class="bg-primary-500 hover:bg-primary-600 text-white px-3 md:px-4 py-1.5 rounded shadow-sm transition text-xs md:text-sm font-bold w-full sm:w-auto">
                                    تحديث
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });

            container.innerHTML = html;
        }

        async function updateUserRole(userId) {
            const token = localStorage.getItem('spider_token');
            const newRole = document.getElementById(`role-${userId}`).value;

            try {
                const response = await fetch(`${API_URL}/admin/users/role`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    // التعديل التاني هنا: استخدام new_role بدل role
                    body: JSON.stringify({ user_id: userId, new_role: newRole })
                });

                const data = await response.json();

                if (response.ok || data.success) {
                    showToast();
                    fetchUsers(); 
                } else {
                    alert('خطأ: ' + (data.message || 'غير مصرح لك'));
                }
            } catch (error) {
                alert('خطأ في الاتصال بالسيرفر');
            }
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        function logout() {
            localStorage.removeItem('spider_token');
            window.location.href = '../../index.html';
        }

        window.onload = fetchUsers;
    </script>
</body>
</html>
