<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Store | إدارة الأقسام</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { background-color: #F3F4F6; font-family: 'Cairo', sans-serif; } </style>
</head>
<body id="admin-layout" class="text-gray-800 antialiased flex flex-col md:flex-row min-h-screen">

    <main class="flex-1 p-4 md:p-8 md:mr-64 w-full overflow-hidden">
        <header class="mb-8">
            <h1 class="text-2xl md:text-3xl font-bold text-gray-800">إدارة الأقسام</h1>
        </header>

        <div id="messageBox" class="hidden px-6 py-3 rounded-md mb-6 font-bold text-center transition-all"></div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 h-fit">
                <h2 class="text-xl font-bold mb-4 border-b pb-2">إضافة قسم جديد</h2>
                <form id="addCategoryForm" onsubmit="handleAddCategory(event)">
                    <div class="mb-4">
                        <label class="block text-sm font-bold text-gray-700 mb-2">اسم القسم <span class="text-red-500">*</span></label>
                        <input type="text" id="name" required class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-cyan-500 outline-none">
                    </div>
                    <div class="mb-6">
                        <label class="block text-sm font-bold text-gray-700 mb-2">كود الأيقونة (FontAwesome)</label>
                        <div class="flex gap-4 items-center">
                            <input type="text" id="icon" value="fa-tags" oninput="updateIconPreview('icon', 'iconPreview')" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-cyan-500 outline-none text-left" dir="ltr" placeholder="مثال: fa-laptop">
                            <div class="w-12 h-12 bg-gray-100 rounded-md flex items-center justify-center text-xl text-cyan-600 shadow-inner flex-shrink-0">
                                <i id="iconPreview" class="fas fa-tags"></i>
                            </div>
                        </div>
                        <a href="https://fontawesome.com/search?o=r&m=free" target="_blank" class="text-xs text-blue-500 hover:underline mt-2 inline-block">ابحث عن أيقونات هنا</a>
                    </div>
                    <button type="submit" id="submitBtn" class="w-full bg-cyan-500 hover:bg-cyan-600 text-white font-bold py-3 px-4 rounded-md shadow-sm transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-plus"></i> حفظ القسم
                    </button>
                </form>
            </div>

            <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden h-fit">
                <table class="w-full text-right border-collapse">
                    <thead class="bg-gray-50 border-b border-gray-200 text-gray-600">
                        <tr>
                            <th class="p-4 w-16 text-center">الأيقونة</th>
                            <th class="p-4">اسم القسم</th>
                            <th class="p-4 text-center">إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="categoriesTableBody" class="divide-y divide-gray-100">
                        <tr><td colspan="3" class="p-8 text-center text-gray-500"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="editModal" class="fixed inset-0 bg-black/50 hidden z-50 p-4 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white rounded-xl p-6 w-full max-w-md shadow-2xl transform transition-all">
            <h2 class="text-xl font-bold mb-4 border-b pb-2 text-gray-800">تعديل القسم</h2>
            <form id="editCategoryForm">
                <input type="hidden" id="editId">
                <div class="mb-4">
                    <label class="block mb-2 font-bold text-sm text-gray-700">اسم القسم</label>
                    <input id="editName" class="w-full border border-gray-300 rounded-md px-3 py-2 outline-none focus:ring-2 focus:ring-cyan-500" required />
                </div>
                <div class="mb-6">
                    <label class="block mb-2 font-bold text-sm text-gray-700">كود الأيقونة</label>
                    <div class="flex gap-4 items-center">
                        <input id="editIcon" oninput="updateIconPreview('editIcon', 'editIconPreview')" class="w-full border border-gray-300 rounded-md px-3 py-2 outline-none focus:ring-2 focus:ring-cyan-500 text-left" dir="ltr" />
                        <div class="w-12 h-12 bg-gray-100 rounded-md flex items-center justify-center text-xl text-cyan-600 shadow-inner flex-shrink-0">
                            <i id="editIconPreview" class="fas fa-tags"></i>
                        </div>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button type="submit" class="flex-1 bg-cyan-600 hover:bg-cyan-700 text-white py-2 rounded-md font-bold transition">حفظ التعديلات</button>
                    <button type="button" onclick="closeEditModal()" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 py-2 rounded-md font-bold transition">إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../components/admin-sidebar.js"></script>
    <script>
        if(typeof loadAdminSidebar === 'function') loadAdminSidebar('add-category');
        const API_URL = 'http://127.0.0.1:3000/api';
        let categoriesCache = [];

        function updateIconPreview(inputId, previewId) {
            let val = document.getElementById(inputId).value.trim();
            if(!val.startsWith('fa-')) val = 'fa-' + val; // ضمان وجود البادئة
            document.getElementById(previewId).className = `fas ${val}`;
        }

        function showMessage(msg, type = 'success') {
            const box = document.getElementById('messageBox');
            box.className = `px-6 py-3 rounded-md mb-6 font-bold text-center block ${type === 'success' ? 'bg-green-500 text-white' : 'bg-red-500 text-white'}`;
            box.innerHTML = type === 'success' ? `<i class="fas fa-check-circle"></i> ${msg}` : `<i class="fas fa-exclamation-triangle"></i> ${msg}`;
            setTimeout(() => box.classList.add('hidden'), 4000);
        }

        async function fetchCategories() {
            try {
                const res = await fetch(`${API_URL}/categories`);
                const data = await res.json();
                if (data.success) {
                    categoriesCache = data.data || [];
                    renderCategories();
                }
            } catch (e) {
                document.getElementById('categoriesTableBody').innerHTML = `<tr><td colspan="3" class="text-center p-8 text-red-500 font-bold"><i class="fas fa-wifi"></i> خطأ في الاتصال بالخادم</td></tr>`;
            }
        }

        function renderCategories() {
            const tbody = document.getElementById('categoriesTableBody');
            if (!categoriesCache.length) {
                tbody.innerHTML = `<tr><td colspan="3" class="p-8 text-center text-gray-500 font-bold">لا توجد أقسام حالياً.</td></tr>`;
                return;
            }
            tbody.innerHTML = categoriesCache.map(cat => {
                let safeIcon = cat.icon || 'fa-tags';
                if(!safeIcon.startsWith('fa-')) safeIcon = 'fa-' + safeIcon;

                return `
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="p-4 text-cyan-600 text-xl text-center"><i class="fas ${safeIcon}"></i></td>
                    <td class="p-4 font-bold text-gray-800">${cat.name}</td>
                    <td class="p-4 text-center">
                        <button onclick="openEditModal(${cat.id})" class="text-blue-500 hover:bg-blue-100 p-2 rounded-md mx-1 transition"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteCategory(${cat.id})" class="text-red-500 hover:bg-red-100 p-2 rounded-md mx-1 transition"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `}).join('');
        }

        // إضافة قسم
        async function handleAddCategory(event) {
            event.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';

            const token = localStorage.getItem('spider_token');
            let iconVal = document.getElementById('icon').value.trim();
            if(iconVal && !iconVal.startsWith('fa-')) iconVal = 'fa-' + iconVal;

            const data = { name: document.getElementById('name').value, icon: iconVal };
            
            try {
                const response = await fetch(`${API_URL}/categories`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                
                if (response.ok || result.success) {
                    showMessage('تم إضافة القسم بنجاح!');
                    document.getElementById('addCategoryForm').reset();
                    updateIconPreview('icon', 'iconPreview');
                    fetchCategories();
                } else {
                    showMessage(result.message || 'فشل الإضافة', 'error');
                }
            } catch (error) { showMessage('خطأ في الاتصال', 'error'); }
            finally { btn.disabled = false; btn.innerHTML = '<i class="fas fa-plus"></i> حفظ القسم'; }
        }

        // تعديل قسم
        function openEditModal(id) {
            const cat = categoriesCache.find(c => c.id === id);
            if (!cat) return;
            document.getElementById('editId').value = cat.id;
            document.getElementById('editName').value = cat.name;
            let iconVal = cat.icon || 'fa-tags';
            if(!iconVal.startsWith('fa-')) iconVal = 'fa-' + iconVal;
            document.getElementById('editIcon').value = iconVal;
            updateIconPreview('editIcon', 'editIconPreview');
            document.getElementById('editModal').classList.remove('hidden');
        }

        function closeEditModal() { document.getElementById('editModal').classList.add('hidden'); }

        document.getElementById('editCategoryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const token = localStorage.getItem('spider_token');
            let iconVal = document.getElementById('editIcon').value.trim();
            if(iconVal && !iconVal.startsWith('fa-')) iconVal = 'fa-' + iconVal;

            const data = { name: document.getElementById('editName').value, icon: iconVal };

            try {
                const response = await fetch(`${API_URL}/categories/${id}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                
                if (response.ok || result.success) {
                    showMessage('تم تحديث القسم بنجاح!');
                    closeEditModal();
                    fetchCategories();
                } else {
                    showMessage(result.message || 'فشل التحديث', 'error');
                }
            } catch (error) { showMessage('خطأ في الاتصال', 'error'); }
        });

        // حذف قسم
        async function deleteCategory(id) {
            if (!confirm('هل أنت متأكد من حذف هذا القسم؟\nتنبيه: لا يمكن حذف قسم يحتوي على منتجات.')) return;
            const token = localStorage.getItem('spider_token');
            try {
                const response = await fetch(`${API_URL}/categories/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await response.json();

                if (response.ok || result.success) {
                    showMessage('تم حذف القسم بنجاح!');
                    fetchCategories();
                } else {
                    showMessage(result.message || 'فشل الحذف', 'error');
                }
            } catch (error) { showMessage('خطأ في الاتصال', 'error'); }
        }

        window.addEventListener('load', fetchCategories);
    </script>
</body>
</html>
