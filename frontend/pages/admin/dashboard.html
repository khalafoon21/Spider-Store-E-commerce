<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Store | إدارة الطلبات</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#ECFEFF', 500: '#06B6D4', 600: '#0891B2', 700: '#0E7490' },
                        secondary: { 500: '#F59E0B' },
                        success: { 500: '#22C55E' },
                        error: { 500: '#EF4444' }
                    }
                }
            }
        }
    </script>
    <style> body { background-color: #F3F4F6; } </style>
</head>
<body id="admin-layout" class="font-sans text-gray-800 antialiased flex flex-col md:flex-row min-h-screen">

    <main class="flex-1 p-4 md:p-8 md:mr-64 w-full overflow-hidden">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
            <h1 class="text-2xl md:text-3xl font-bold text-gray-800">إدارة الطلبات</h1>
            <div id="toast" class="hidden bg-success-500 text-white px-6 py-2 rounded-full shadow-md transition-opacity font-bold text-sm md:text-base w-full md:w-auto text-center">
                <i class="fas fa-check-circle ml-1"></i> تم تحديث الحالة بنجاح
            </div>
        </header>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 w-full">
            <div class="overflow-x-auto w-full">
                <table class="w-full text-right border-collapse min-w-[600px]">
                    <thead class="bg-gray-50 border-b border-gray-200 text-gray-600 text-sm md:text-base">
                        <tr>
                            <th class="p-3 md:p-4 whitespace-nowrap">رقم الطلب</th>
                            <th class="p-3 md:p-4 whitespace-nowrap">التاريخ</th>
                            <th class="p-3 md:p-4 whitespace-nowrap">عنوان الشحن</th>
                            <th class="p-3 md:p-4 whitespace-nowrap">الإجمالي</th>
                            <th class="p-3 md:p-4 whitespace-nowrap">تحديث الحالة</th>
                        </tr>
                    </thead>
                    <tbody id="adminOrdersContainer" class="divide-y divide-gray-100 text-sm md:text-base">
                        <tr>
                            <td colspan="5" class="p-8 text-center text-gray-500">
                                <i class="fas fa-spinner fa-spin text-3xl mb-2"></i> جاري تحميل الطلبات...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="../../components/admin-sidebar.js"></script>

    <script>
        // السطر ده بيرسم القائمة وينور زرار "إدارة الطلبات"
        loadAdminSidebar('dashboard');

        const API_URL = 'http://127.0.0.1:3000/api';

        async function fetchAllOrders() {
            const token = localStorage.getItem('spider_token');
            if (!token) {
                window.location.href = '../auth/login.html';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/orders/all`, { 
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (response.ok || data.success) {
                    renderAdminOrders(data.data || []);
                } else {
                    document.getElementById('adminOrdersContainer').innerHTML = `<tr><td colspan="5" class="text-center text-error-500 p-8 font-bold"><i class="fas fa-lock text-2xl mb-2 block"></i> خطأ: ${data.message || 'لست بصلاحية أدمن'}</td></tr>`;
                }
            } catch (error) {
                document.getElementById('adminOrdersContainer').innerHTML = '<tr><td colspan="5" class="text-center text-error-500 p-8 font-bold">خطأ في الاتصال بالسيرفر</td></tr>';
            }
        }

        function renderAdminOrders(orders) {
            const container = document.getElementById('adminOrdersContainer');

            if (orders.length === 0) {
                container.innerHTML = `<tr><td colspan="5" class="p-12 text-center text-gray-500"><i class="fas fa-box-open text-4xl mb-3"></i><br>لا توجد طلبات في المتجر حالياً.</td></tr>`;
                return;
            }

            let html = '';
            orders.forEach(order => {
                const orderDate = new Date(order.created_at).toLocaleDateString('ar-EG');
                
                const isPending = order.status === 'Pending' ? 'selected' : '';
                const isProcessing = order.status === 'Processing' ? 'selected' : '';
                const isShipped = order.status === 'Shipped' ? 'selected' : '';
                const isDelivered = order.status === 'Delivered' ? 'selected' : '';

                html += `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="p-3 md:p-4 font-bold text-gray-800">#${order.id}</td>
                        <td class="p-3 md:p-4 text-gray-600">${orderDate}</td>
                        <td class="p-3 md:p-4 text-gray-600 max-w-[150px] md:max-w-xs truncate" title="${order.shipping_address}">${order.shipping_address}</td>
                        <td class="p-3 md:p-4 font-bold text-primary-600">${order.total_amount || 0} ج.م</td>
                        <td class="p-3 md:p-4">
                            <div class="flex flex-col sm:flex-row items-start sm:items-center gap-2">
                                <select id="status-${order.id}" class="border border-gray-300 rounded px-2 md:px-3 py-1.5 outline-none focus:border-primary-500 bg-white text-xs md:text-sm font-medium w-full sm:w-auto">
                                    <option value="Pending" ${isPending}>قيد المراجعة</option>
                                    <option value="Processing" ${isProcessing}>جاري التجهيز</option>
                                    <option value="Shipped" ${isShipped}>تم الشحن</option>
                                    <option value="Delivered" ${isDelivered}>تم التوصيل</option>
                                </select>
                                <button onclick="updateStatus(${order.id})" class="bg-primary-500 hover:bg-primary-600 text-white px-3 md:px-4 py-1.5 rounded shadow-sm transition text-xs md:text-sm font-bold w-full sm:w-auto">
                                    حفظ
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });

            container.innerHTML = html;
        }

        async function updateStatus(orderId) {
            const token = localStorage.getItem('spider_token');
            const newStatus = document.getElementById(`status-${orderId}`).value;

            try {
                const response = await fetch(`${API_URL}/orders/update-status`, {
                    method: 'POST', 
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify({ order_id: orderId, status: newStatus })
                });

                const data = await response.json();

                if (response.ok || data.success) {
                    showToast();
                } else {
                    alert('خطأ: ' + (data.message || 'غير مصرح لك'));
                }
            } catch (error) {
                alert('خطأ في الاتصال بالسيرفر');
            }
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        function logout() {
            localStorage.removeItem('spider_token');
            window.location.href = '../../index.html';
        }

        window.onload = fetchAllOrders;
    </script>
</body>
</html>
