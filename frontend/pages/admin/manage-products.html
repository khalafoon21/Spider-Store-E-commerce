<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Store | لوحة التحكم - إدارة المنتجات</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#ECFEFF', 100: '#CFFAFE', 500: '#06B6D4', 600: '#0891B2', 700: '#0E7490' },
                        secondary: { 500: '#F59E0B' },
                        success: { 50: '#F0FDF4', 500: '#22C55E', 700: '#15803D' },
                        error: { 50: '#FEF2F2', 500: '#EF4444', 700: '#B91C1C' },
                        warning: { 50: '#FFFBEB', 500: '#F59E0B', 700: '#B45309' },
                        info: { 50: '#EFF6FF', 500: '#3B82F6', 700: '#1D4ED8' }
                    }
                }
            }
        }
    </script>
    <style> 
        body { background-color: #F8FAFC; } 
        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body id="admin-layout" class="font-sans text-gray-800 antialiased flex flex-col md:flex-row min-h-screen">

    <main class="flex-1 p-4 md:p-8 md:mr-64 w-full overflow-hidden transition-all duration-300 relative custom-scrollbar">
        
        <div id="toast" class="absolute top-4 left-1/2 transform -translate-x-1/2 z-50 flex items-center gap-2 px-6 py-3 rounded-lg shadow-lg font-bold text-sm md:text-base transition-all duration-300 opacity-0 pointer-events-none -translate-y-4">
            <i id="toastIcon" class="fas"></i>
            <span id="toastMessage">رسالة الإشعار هنا</span>
        </div>

        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 border-b border-gray-200 pb-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-extrabold text-gray-900">إدارة المنتجات</h1>
                <p class="text-gray-500 mt-1 text-sm md:text-base">تعديل وحذف ومتابعة حالة مخزون المنتجات.</p>
            </div>
            <div class="flex gap-3">
                <a href="add-product.html" class="bg-primary-600 text-white hover:bg-primary-700 px-4 py-2 rounded-lg font-semibold transition flex items-center gap-2 shadow-sm">
                    <i class="fas fa-plus"></i> منتج جديد
                </a>
                <button onclick="fetchProducts()" class="bg-primary-50 text-primary-600 hover:bg-primary-100 px-4 py-2 rounded-lg font-semibold transition flex items-center gap-2">
                    <i class="fas fa-sync-alt"></i> تحديث
                </button>
            </div>
        </header>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 w-full overflow-hidden">
            <div class="overflow-x-auto w-full custom-scrollbar">
                <table class="w-full text-right border-collapse min-w-[900px]">
                    <thead class="bg-gray-50 border-b border-gray-200 text-gray-600 text-sm font-bold uppercase tracking-wider">
                        <tr>
                            <th class="p-5 whitespace-nowrap w-20">الصورة</th>
                            <th class="p-5 whitespace-nowrap">اسم المنتج</th>
                            <th class="p-5 whitespace-nowrap">القسم</th>
                            <th class="p-5 whitespace-nowrap">السعر</th>
                            <th class="p-5 whitespace-nowrap">المخزون</th>
                            <th class="p-5 whitespace-nowrap text-center">الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="productsContainer" class="divide-y divide-gray-100 text-sm md:text-base">
                        <tr>
                            <td colspan="6" class="p-12 text-center text-primary-600">
                                <i class="fas fa-circle-notch fa-spin text-4xl mb-3"></i>
                                <p class="font-semibold">جاري تحميل المنتجات...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="deleteModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-2xl p-6 md:p-8 max-w-sm w-full mx-4 shadow-2xl transform scale-95 transition-transform duration-300" id="deleteModalContent">
            <div class="text-center mb-6">
                <div class="w-16 h-16 rounded-full bg-error-50 text-error-500 flex items-center justify-center text-3xl mx-auto mb-4">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
                <h3 class="text-xl font-bold text-gray-900 mb-2">تأكيد الحذف</h3>
                <p class="text-gray-500">هل أنت متأكد من رغبتك في حذف هذا المنتج نهائياً؟ لا يمكن التراجع عن هذا الإجراء.</p>
            </div>
            <div class="flex gap-3">
                <button id="confirmDeleteBtn" class="flex-1 bg-error-500 hover:bg-error-600 text-white font-bold py-2 px-4 rounded-lg transition">نعم، احذف</button>
                <button onclick="closeDeleteModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold py-2 px-4 rounded-lg transition">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="editModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-2xl p-6 md:p-8 max-w-3xl w-full mx-4 shadow-2xl transform scale-95 transition-transform duration-300 max-h-[90vh] overflow-y-auto custom-scrollbar" id="editModalContent">
            <h3 class="text-xl font-bold text-gray-900 mb-6">تعديل المنتج</h3>
            <form id="editProductForm" class="space-y-4">
                <input type="hidden" id="editProductId">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input id="editTitle" required class="w-full px-4 py-3 border border-gray-200 rounded-lg bg-gray-50 focus:bg-white outline-none focus:ring-2 focus:ring-primary-500" placeholder="اسم المنتج">
                    <input type="number" id="editPrice" required min="0" class="w-full px-4 py-3 border border-gray-200 rounded-lg bg-gray-50 focus:bg-white outline-none focus:ring-2 focus:ring-primary-500" placeholder="السعر">
                    <input type="number" id="editDiscount" min="0" max="100" class="w-full px-4 py-3 border border-gray-200 rounded-lg bg-gray-50 focus:bg-white outline-none focus:ring-2 focus:ring-primary-500" placeholder="الخصم">
                    <input type="number" id="editStock" required min="0" class="w-full px-4 py-3 border border-gray-200 rounded-lg bg-gray-50 focus:bg-white outline-none focus:ring-2 focus:ring-primary-500" placeholder="المخزون">
                    <input id="editBrand" class="w-full px-4 py-3 border border-gray-200 rounded-lg bg-gray-50 focus:bg-white outline-none focus:ring-2 focus:ring-primary-500" placeholder="العلامة التجارية">
                    <select id="editCategory" class="w-full px-4 py-3 border border-gray-200 rounded-lg bg-gray-50 focus:bg-white outline-none focus:ring-2 focus:ring-primary-500"></select>
                </div>
                <input id="editTags" class="w-full px-4 py-3 border border-gray-200 rounded-lg bg-gray-50 focus:bg-white outline-none focus:ring-2 focus:ring-primary-500" placeholder="الكلمات الدلالية">
                <textarea id="editDescription" rows="4" class="w-full px-4 py-3 border border-gray-200 rounded-lg bg-gray-50 focus:bg-white outline-none focus:ring-2 focus:ring-primary-500" placeholder="الوصف"></textarea>
                <input type="file" id="editImage" accept="image/*" class="w-full px-4 py-2 border border-gray-200 rounded-lg bg-gray-50">
                <div class="flex gap-3 pt-2">
                    <button type="submit" id="saveEditBtn" class="flex-1 bg-primary-600 hover:bg-primary-700 text-white font-bold py-3 rounded-lg transition">حفظ التعديل</button>
                    <button type="button" onclick="closeEditModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold py-3 rounded-lg transition">إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../components/admin-sidebar.js"></script>
    <script>
        if(typeof loadAdminSidebar === 'function') loadAdminSidebar('manage-products');
        const API_URL = 'http://127.0.0.1:3000/api';
        let productToDelete = null;
        let productsCache = [];
        let categoriesCache = [];

        const escapeHTML = str => String(str || '').replace(/[&<>'"]/g, tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag]));
        const safeNumber = value => Number.isFinite(Number(value)) ? Number(value) : 0;
        const buildImageUrl = imagePath => {
            const cleanPath = String(imagePath || '').trim();
            if (!cleanPath) return 'https://via.placeholder.com/150?text=No+Image';
            return /^https?:\/\//i.test(cleanPath) ? cleanPath : `http://127.0.0.1:3000${cleanPath.startsWith('/') ? cleanPath : `/${cleanPath}`}`;
        };

        function logout() {
            localStorage.removeItem('spider_token');
            window.location.href = '../auth/login.html';
        }

        function showToast(message, type = 'success') {
            if (window.AppUI) return window.AppUI.toast(message, type);
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toastIcon');
            const toastMessage = document.getElementById('toastMessage');

            toast.className = 'absolute top-4 left-1/2 transform -translate-x-1/2 z-50 flex items-center gap-2 px-6 py-3 rounded-lg shadow-lg font-bold text-sm md:text-base transition-all duration-300';
            toastIcon.className = 'fas text-lg';

            if (type === 'success') {
                toast.classList.add('bg-success-50', 'text-success-700', 'border', 'border-success-200');
                toastIcon.classList.add('fa-check-circle');
            } else if (type === 'error') {
                toast.classList.add('bg-error-50', 'text-error-700', 'border', 'border-error-200');
                toastIcon.classList.add('fa-exclamation-circle');
            }

            toastMessage.textContent = message;
            
            toast.classList.remove('opacity-0', 'pointer-events-none', '-translate-y-4');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'pointer-events-none', '-translate-y-4');
            }, 3000);
        }

        async function fetchProducts() {
            const container = document.getElementById('productsContainer');
            container.innerHTML = `<tr><td colspan="6" class="p-12 text-center text-primary-600"><i class="fas fa-circle-notch fa-spin text-4xl mb-3"></i><p class="font-semibold">جاري تحديث المنتجات...</p></td></tr>`;

            try {
                const token = localStorage.getItem('spider_token');
                const response = await fetch(`${API_URL}/admin/products`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await response.json();

                if (response.ok || data.success) {
                    productsCache = data.data || [];
                    renderProducts(productsCache);
                } else {
                    container.innerHTML = `<tr><td colspan="6" class="text-center text-error-500 p-12 bg-error-50 font-bold rounded-lg"><i class="fas fa-exclamation-circle text-3xl mb-3 block"></i> خطأ: ${data.message || 'فشل تحميل المنتجات'}</td></tr>`;
                }
            } catch (error) {
                container.innerHTML = `<tr><td colspan="6" class="text-center text-error-500 p-12 bg-error-50 font-bold rounded-lg"><i class="fas fa-wifi text-3xl mb-3 block"></i> حدث خطأ في الاتصال بالسيرفر</td></tr>`;
            }
        }

        function renderProducts(products) {
            const container = document.getElementById('productsContainer');

            if (products.length === 0) {
                container.innerHTML = `<tr><td colspan="6" class="p-16 text-center text-gray-400 bg-gray-50"><i class="fas fa-box-open text-5xl mb-4"></i><br><p class="text-lg font-semibold">لا توجد منتجات في المتجر حالياً.</p></td></tr>`;
                return;
            }

            let html = '';
            products.forEach(product => {
                const imageUrl = buildImageUrl(product.image_url);
                const stock = safeNumber(product.stock_quantity);
                const stockClass = stock > 10 ? 'text-success-600 bg-success-50' : (stock > 0 ? 'text-warning-600 bg-warning-50' : 'text-error-600 bg-error-50');
                const stockText = stock > 0 ? `${stock} قطعة` : 'نفذت الكمية';

                html += `
                    <tr class="hover:bg-gray-50 transition duration-150 group">
                        <td class="p-4">
                            <div class="w-16 h-16 rounded-lg bg-white border border-gray-200 overflow-hidden shadow-sm flex items-center justify-center">
                                <img src="${imageUrl}" alt="${escapeHTML(product.title)}" class="object-cover w-full h-full" onerror="this.src='https://via.placeholder.com/150?text=Error'">
                            </div>
                        </td>
                        <td class="p-5 font-bold text-gray-800">
                            ${escapeHTML(product.title)}
                            <span class="block text-xs text-gray-400 font-normal mt-1">#${safeNumber(product.id)} ${product.brand ? '| ' + escapeHTML(product.brand) : ''}</span>
                        </td>
                        <td class="p-5 text-gray-600 font-medium">
                            <span class="bg-gray-100 text-gray-600 px-2 py-1 rounded text-sm">${escapeHTML(product.category_name) || 'غير محدد'}</span>
                        </td>
                        <td class="p-5 font-extrabold text-primary-600">
                            ${safeNumber(product.price).toFixed(2)} <span class="text-xs font-semibold text-gray-500">ج.م</span>
                        </td>
                        <td class="p-5 font-bold">
                            <span class="px-3 py-1 rounded-full text-sm ${stockClass}">${stockText}</span>
                        </td>
                        <td class="p-5 text-center">
                            <div class="flex items-center justify-center gap-2">
                                <select onchange="updateProductMeta(${safeNumber(product.id)}, this.value, ${product.featured ? 1 : 0})" class="text-xs border border-gray-200 rounded-lg px-2 py-2 bg-white">
                                    <option value="approved" ${product.status === 'approved' ? 'selected' : ''}>معتمد</option>
                                    <option value="pending" ${product.status === 'pending' ? 'selected' : ''}>مراجعة</option>
                                    <option value="rejected" ${product.status === 'rejected' ? 'selected' : ''}>مرفوض</option>
                                </select>
                                <button onclick="updateProductMeta(${safeNumber(product.id)}, '${escapeHTML(product.status || 'approved')}', ${product.featured ? 0 : 1})" class="${product.featured ? 'text-secondary-500 bg-secondary-50' : 'text-gray-400 bg-gray-50'} hover:text-secondary-500 border border-gray-100 h-9 w-9 rounded-lg transition shadow-sm flex items-center justify-center" title="تمييز المنتج">
                                    <i class="fas fa-star"></i>
                                </button>
                                <button onclick="editProduct(${safeNumber(product.id)})" class="text-blue-500 hover:text-white hover:bg-blue-500 bg-blue-50 border border-blue-100 h-9 w-9 rounded-lg transition shadow-sm flex items-center justify-center" title="تعديل المنتج">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button onclick="openDeleteModal(${safeNumber(product.id)})" class="text-error-500 hover:text-white hover:bg-error-500 bg-error-50 border border-error-100 h-9 w-9 rounded-lg transition shadow-sm flex items-center justify-center" title="حذف المنتج">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });

            container.innerHTML = html;
        }

        // --- نظام الحذف المطور (Modal) ---
        function openDeleteModal(id) {
            productToDelete = id;
            const modal = document.getElementById('deleteModal');
            const modalContent = document.getElementById('deleteModalContent');
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        function closeDeleteModal() {
            productToDelete = null;
            const modal = document.getElementById('deleteModal');
            const modalContent = document.getElementById('deleteModalContent');
            
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
            if (!productToDelete) return;
            
            const token = localStorage.getItem('spider_token');
            const btn = document.getElementById('confirmDeleteBtn');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحذف...';
            btn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/products/${productToDelete}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (response.ok || data.success) {
                    showToast('تم حذف المنتج بنجاح', 'success');
                    fetchProducts();
                } else {
                    showToast(data.message || 'غير مصرح لك بالحذف', 'error');
                }
            } catch (error) {
                showToast('خطأ في الاتصال بالسيرفر', 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
                closeDeleteModal();
            }
        });

        // دالة التعديل (في حالة عمل صفحة edit-product.html لاحقاً)
        function oldEditProduct(id) {
            // مؤقتاً سيظهر إشعار حتى يتم إنشاء صفحة التعديل
            showToast('سيتم توجيهك لصفحة التعديل قريباً', 'info');
            // window.location.href = `edit-product.html?id=${id}`;
        }

        async function fetchCategoriesForEdit() {
            if (categoriesCache.length > 0) return categoriesCache;

            try {
                const response = await fetch(`${API_URL}/categories`);
                const data = await response.json();
                categoriesCache = data.data || [];
            } catch (error) {
                categoriesCache = [];
            }

            return categoriesCache;
        }

        async function populateCategorySelect(selectedId) {
            const select = document.getElementById('editCategory');
            const categories = await fetchCategoriesForEdit();

            select.innerHTML = '<option value="">غير محدد</option>' + categories.map(category => `
                <option value="${safeNumber(category.id)}" ${String(category.id) === String(selectedId) ? 'selected' : ''}>${escapeHTML(category.name)}</option>
            `).join('');
        }

        function editProduct(id) {
            const product = productsCache.find(item => Number(item.id) === Number(id));
            if (!product) {
                showToast('لم يتم العثور على المنتج', 'error');
                return;
            }

            document.getElementById('editProductId').value = product.id;
            document.getElementById('editTitle').value = product.title || '';
            document.getElementById('editPrice').value = safeNumber(product.price);
            document.getElementById('editDiscount').value = safeNumber(product.discount);
            document.getElementById('editStock').value = safeNumber(product.stock_quantity);
            document.getElementById('editBrand').value = product.brand || '';
            document.getElementById('editTags').value = product.tags || '';
            document.getElementById('editDescription').value = product.description || '';
            document.getElementById('editImage').value = '';
            populateCategorySelect(product.category_id);

            const modal = document.getElementById('editModal');
            const modalContent = document.getElementById('editModalContent');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        async function updateProductMeta(id, status, featured) {
            const product = productsCache.find(item => Number(item.id) === Number(id));
            if (!product) return;

            const token = localStorage.getItem('spider_token');
            const formData = new FormData();
            formData.append('title', product.title || '');
            formData.append('price', product.price || 0);
            formData.append('discount', product.discount || 0);
            formData.append('stock_quantity', product.stock_quantity || 0);
            formData.append('brand', product.brand || '');
            formData.append('category_id', product.category_id || '');
            formData.append('tags', product.tags || '');
            formData.append('description', product.description || '');
            formData.append('status', status || 'approved');
            formData.append('featured', featured ? 1 : 0);

            try {
                const response = await fetch(`${API_URL}/products/${id}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                const data = await response.json();
                showToast(data.message || (response.ok ? 'تم تحديث حالة المنتج' : 'تعذر تحديث حالة المنتج'), response.ok ? 'success' : 'error');
                await fetchProducts();
            } catch (error) {
                showToast('خطأ في الاتصال بالسيرفر', 'error');
            }
        }

        function closeEditModal() {
            const modal = document.getElementById('editModal');
            const modalContent = document.getElementById('editModalContent');
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        document.getElementById('editProductForm').addEventListener('submit', async (event) => {
            event.preventDefault();

            const id = document.getElementById('editProductId').value;
            const token = localStorage.getItem('spider_token');
            const btn = document.getElementById('saveEditBtn');
            const originalText = btn.innerHTML;
            const formData = new FormData();

            formData.append('title', document.getElementById('editTitle').value);
            formData.append('price', document.getElementById('editPrice').value);
            formData.append('discount', document.getElementById('editDiscount').value || 0);
            formData.append('stock_quantity', document.getElementById('editStock').value);
            formData.append('brand', document.getElementById('editBrand').value);
            formData.append('category_id', document.getElementById('editCategory').value);
            formData.append('tags', document.getElementById('editTags').value);
            formData.append('description', document.getElementById('editDescription').value);

            const image = document.getElementById('editImage').files[0];
            if (image) formData.append('image', image);

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';

            try {
                const response = await fetch(`${API_URL}/products/${id}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                const data = await response.json();

                if (response.ok || data.success) {
                    showToast('تم تحديث المنتج بنجاح', 'success');
                    closeEditModal();
                    await fetchProducts();
                } else {
                    showToast(data.message || 'فشل تحديث المنتج', 'error');
                }
            } catch (error) {
                showToast('خطأ في الاتصال بالسيرفر', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });

        window.onload = fetchProducts;
    </script>
</body>
</html>
