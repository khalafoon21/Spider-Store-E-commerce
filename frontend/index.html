<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Store | الرئيسية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#ECFEFF', 100: '#CFFAFE', 500: '#06B6D4', 600: '#0891B2', 700: '#0E7490' },
                        secondary: { 50: '#FFFBEB', 500: '#F59E0B' },
                        success: { 500: '#22C55E', 100: '#DCFCE7', 600: '#16A34A' },
                        error: { 500: '#EF4444', 100: '#FEE2E2', 600: '#DC2626' }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #F8FAFC; }
        .smooth-transition { transition: all 0.3s ease-in-out; }
        .fade-in { animation: fadeIn 0.6s ease-in-out; }

        @keyframes fadeIn { 
            from { opacity: 0.5; } 
            to   { opacity: 1; } 
        }

        @keyframes shrinkProgress { 
            from { width: 100%; } 
            to   { width: 0%; } 
        }
        .animate-progress { animation: shrinkProgress 3s linear forwards; }

        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 0.5rem;
        }
        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="font-sans text-gray-800 antialiased flex flex-col min-h-screen">

    <div id="navbar-container"></div>
    <script src="components/app-state.js"></script>
    <script src="components/ui-feedback.js"></script>
    <script src="components/main-navbar.js" defer></script>

    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-3 pointer-events-none" aria-live="polite"></div>

    <main class="mx-auto w-full max-w-[1440px] flex-1 px-3 py-4 sm:px-4 lg:px-6">
        
        <section id="heroContainer" class="relative mb-5 hidden overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm sm:mb-6 lg:mb-8">
            <div id="sliderContent" class="w-full fade-in min-h-[210px] sm:min-h-[280px] lg:min-h-[360px]"></div>
            <div class="absolute bottom-4 left-1/2 z-20 flex -translate-x-1/2 gap-2" id="sliderDots"></div>
        </section>

        <section class="mb-5 rounded-2xl border border-slate-200 bg-white p-3 shadow-sm sm:mb-6 sm:p-4">
            <div class="mb-3 flex items-center justify-between gap-3">
                <h2 class="flex items-center gap-2 text-base font-black text-slate-950 sm:text-lg">
                    <span class="grid h-9 w-9 place-items-center rounded-xl bg-cyan-50 text-primary-600"><i class="fas fa-th-large"></i></span>
                    الأقسام
                </h2>
                <a href="index.html" class="text-sm font-bold text-primary-600 hover:text-primary-700">الكل</a>
            </div>
            <nav id="categoriesList" class="flex gap-3 overflow-x-auto pb-1" aria-label="Ø£Ù‚Ø³Ø§Ù… Ø§Ù„Ù…Ù†ØªØ¬Ø§Øª">
                <div class="flex min-w-full gap-3">
                    <div class="skeleton h-20 w-28 shrink-0 rounded-2xl"></div>
                    <div class="skeleton h-20 w-28 shrink-0 rounded-2xl"></div>
                    <div class="skeleton h-20 w-28 shrink-0 rounded-2xl"></div>
                    <div class="skeleton h-20 w-28 shrink-0 rounded-2xl"></div>
                </div>
            </nav>
        </section>

        <aside class="hidden">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 sticky top-24">

            <section id="oldHeroContainer" class="hidden">

            <section id="latestSection" class="mb-8 sm:mb-10">

                <div class="mb-4 flex items-center justify-between gap-3 border-r-4 border-primary-500 pr-3 sm:mb-5">

                <a href="#" class="hover:text-primary-500 transition-colors"><i class="fab fa-facebook"></i></a>

    <script>
    (() => {
        'use strict';

        // الإعدادات
        const BASE_SERVER = '';
        const API_URL = '/api';
        const TOKEN_KEY = 'spider_token';   
        
        // جلب مسار الصفحة الحالي لمعرفة الفلتر
        const urlParams = new URLSearchParams(window.location.search);
        const currentCategoryId = urlParams.get('category');
        const searchQuery = urlParams.get('search');

        // حالة الـ Slider
        let banners = [];
        let currentSlide = 0;
        let sliderInterval = null;   

        // أدوات مساعدة
        const escapeHTML = str => String(str || '').replace(/[&<>'"]/g, tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag]));
        const safeNumber = value => Number.isFinite(Number(value)) ? Number(value) : 0;
        const safeId = value => encodeURIComponent(String(value || ''));
        const safeIconClass = value => String(value || 'fa-tags').split(/\s+/).filter(cls => /^fa[-\w]*$/.test(cls)).join(' ') || 'fa-tags';
        const safeColor = (value, fallback) => /^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(String(value || '')) ? value : fallback;
        const safeLink = value => {
            const link = String(value || '').trim();
            if (!link) return '#';
            if (/^(https?:\/\/|\.{0,2}\/|#|\?)/i.test(link) && !/^javascript:/i.test(link)) return escapeHTML(link);
            return '#';
        };
        const buildImageUrl = imagePath => {
            const cleanPath = String(imagePath || '').trim();
            if (!cleanPath) return 'https://via.placeholder.com/300?text=No+Image';
            return /^https?:\/\//i.test(cleanPath) ? cleanPath : `${BASE_SERVER}${cleanPath.startsWith('/') ? cleanPath : `/${cleanPath}`}`;
        };
        const getProductImage = product => {
            if (product.image_url || product.image) return product.image_url || product.image;
            if (Array.isArray(product.images_array) && product.images_array.length) return product.images_array[0];
            if (Array.isArray(product.images_list) && product.images_list.length) return product.images_list[0];
            if (typeof product.images === 'string' && product.images.trim()) {
                try {
                    const parsed = JSON.parse(product.images);
                    if (Array.isArray(parsed) && parsed.length) return parsed[0];
                } catch (error) {
                    return product.images.split(/[,\n]/).find(Boolean) || '';
                }
            }
            return '';
        };
        const calcFinalPrice = (price, discount) => {
            const basePrice = safeNumber(price);
            const discountValue = safeNumber(discount);
            return (discountValue > 0 && discountValue <= 100) ? (basePrice - (basePrice * discountValue / 100)).toFixed(0) : basePrice.toFixed(0);
        };

        function renderProductsSkeleton(containerId, count = 6) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = Array(count).fill(`
                <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
                    <div class="skeleton aspect-square w-full"></div>
                    <div class="flex flex-col gap-3 p-3 sm:p-4">
                        <div class="skeleton h-4 w-3/4"></div>
                        <div class="skeleton h-3 w-1/2"></div>
                        <div class="skeleton h-6 w-1/3 mt-2"></div>
                    </div>
                </div>
            `).join('');
        }

        async function initPage() {
            renderProductsSkeleton('productsGrid');
            renderProductsSkeleton('bestSellersGrid', 5);

            await Promise.allSettled([
                fetchBanners(),
                fetchCategories(),
                fetchProducts()
            ]);
        }

        // ==========================================
        //  الـ Slider
        // ==========================================
        async function fetchBanners() {
            try {
                const res = await fetch(`${API_URL}/banners`);
                const data = await res.json();
                if (data.success && data.data?.length > 0) {
                    banners = data.data;
                    document.getElementById('heroContainer').classList.remove('hidden');
                    renderSlider();
                    startSliderTimer();
                }
            } catch (err) { console.error('Banners fetch error', err); }
        }

        function renderSlider() {
            const container = document.getElementById('sliderContent');
            if (!banners[currentSlide]) return;
            const slide = banners[currentSlide];
            const bgColor = safeColor(slide.bg_color, '#ffffff');
            const textColor = safeColor(slide.text_color, '#1f2937');
            const buttonColor = safeColor(slide.button_color, '#0891b2');

            container.innerHTML = `
                <div class="relative grid min-h-[210px] w-full grid-cols-1 items-center gap-4 p-5 sm:min-h-[280px] sm:p-8 lg:min-h-[360px] lg:grid-cols-[1fr_0.9fr] lg:gap-10 lg:p-10" style="background-color: ${bgColor};">
                    <div class="absolute inset-0 bg-[radial-gradient(circle_at_20%_20%,rgba(255,255,255,0.45),transparent_32%)]"></div>
                    <div class="relative z-10 max-w-xl text-right" style="color: ${textColor};">
                        <p class="mb-2 text-xs font-black uppercase tracking-wide opacity-75 sm:text-sm">Spider Store</p>
                        <h2 class="mb-3 text-2xl font-black leading-tight sm:text-4xl lg:text-5xl">${escapeHTML(slide.title)}</h2>
                        <p class="mb-5 max-w-lg text-sm font-semibold leading-7 opacity-90 sm:text-base lg:text-lg">${escapeHTML(slide.description)}</p>
                        <a href="${safeLink(slide.link_url)}" class="inline-flex min-w-32 items-center justify-center rounded-full px-6 py-3 text-sm font-black text-white shadow-lg transition hover:-translate-y-0.5 sm:min-w-36 sm:px-8" style="background-color: ${buttonColor};">
                            ${escapeHTML(slide.button_text) || 'اكتشف الآن'}
                        </a>
                    </div>
                    <div class="relative z-10 flex h-40 w-full items-center justify-center overflow-hidden sm:h-56 lg:h-72 lg:justify-end">
                        <img src="${buildImageUrl(slide.image_url)}" class="max-h-full max-w-full object-contain drop-shadow-2xl" alt="${escapeHTML(slide.title) || 'Banner'}" onerror="this.src='https://via.placeholder.com/600x320?text=Banner'">
                    </div>
                </div>
            `;

            document.getElementById('sliderDots').innerHTML = banners.map((_, i) => `
                <button type="button" onclick="window.goToSlide(${i})" class="h-2.5 rounded-full border border-white/70 bg-white/60 shadow-sm ${i === currentSlide ? 'w-8 bg-primary-500 border-primary-500' : 'w-2.5'} smooth-transition" aria-label="Go to slide ${i + 1}"></button>
            `).join('');
        }

        function startSliderTimer() {
            if (sliderInterval) clearInterval(sliderInterval);
            sliderInterval = setInterval(() => window.goToSlide((currentSlide + 1) % banners.length), 5000);
        }

        window.goToSlide = function(index) {
            currentSlide = index;
            renderSlider();
            startSliderTimer(); 
        };

        // ==========================================
        //  الأقسام والمنتجات
        // ==========================================
        async function fetchCategories() {
            const list = document.getElementById('categoriesList');
            try {
                const res = await fetch(`${API_URL}/categories`);
                const data = await res.json();
                if (data.success && data.data?.length > 0) {
                    list.innerHTML = data.data.map(cat => {
                        const isActive = currentCategoryId == cat.id;
                        const activeClasses = isActive ? "bg-primary-500 text-white border-primary-500 shadow-md shadow-cyan-100" : "bg-slate-50 text-slate-700 border-slate-100 hover:bg-cyan-50 hover:text-primary-700 hover:border-primary-100";
                        const activeIconBg = isActive ? "bg-white/20 text-white" : "bg-white text-primary-600 shadow-sm group-hover:bg-white";
                        
                        return `
                        <a href="?category=${safeId(cat.id)}" class="group flex min-w-[112px] shrink-0 flex-col items-center justify-center gap-2 rounded-2xl border px-3 py-4 text-center transition-all sm:min-w-[136px] ${activeClasses}">
                            <span class="flex h-10 w-10 items-center justify-center rounded-xl transition-all ${activeIconBg}">
                                <i class="fas ${safeIconClass(cat.icon)}"></i>
                            </span>
                            <span class="line-clamp-1 text-sm font-black">${escapeHTML(cat.name)}</span>
                        </a>`;
                    }).join('');
                }
            } catch (err) { list.innerHTML = '<p class="text-sm text-error-500 p-2">تعذر تحميل الأقسام.</p>'; }
        }

        async function fetchProducts() {
            const grid = document.getElementById('productsGrid');
            const bestSellersGrid = document.getElementById('bestSellersGrid');
            const latestSection = document.getElementById('latestSection');
            const bestSellersSection = document.getElementById('bestSellersSection');
            
            try {
                let apiUrl = `${API_URL}/products`;
                const queryParams = [];
                if (currentCategoryId) queryParams.push(`category_id=${encodeURIComponent(currentCategoryId)}`);
                if (searchQuery) queryParams.push(`search=${encodeURIComponent(searchQuery)}`);
                if (queryParams.length > 0) apiUrl += `?${queryParams.join('&')}`;

                const res = await fetch(apiUrl);
                const data = await res.json();

                if (data.success && data.data?.length > 0) {
                    if (currentCategoryId || searchQuery) {
                        document.getElementById('latestTitle').innerText = 'نتائج البحث / التصنيف';
                        bestSellersSection.style.display = 'none'; 
                    }

                    renderProductCards(data.data, grid);

                    if (!currentCategoryId && !searchQuery && bestSellersGrid) {
                        renderProductCards(data.data.slice(0, 5), bestSellersGrid); 
                    }
                } else {
                    grid.innerHTML = '<p class="text-gray-500 col-span-full text-center py-8">لا توجد منتجات مطابقة.</p>';
                    if(bestSellersGrid) bestSellersGrid.innerHTML = '';
                }
            } catch (err) { 
                grid.innerHTML = '<p class="col-span-full text-center text-error-500 py-8">حدث خطأ في الاتصال.</p>';
                if(bestSellersGrid) bestSellersGrid.innerHTML = '';
            }
        }

        function renderProductCards(productsArray, container) {
            container.innerHTML = productsArray.map(product => {
                const productId = safeId(product.id);
                const price = safeNumber(product.price);
                const discount = safeNumber(product.discount);
                const hasDiscount = discount > 0;
                const ratingAverage = safeNumber(product.rating_average);
                const ratingCount = safeNumber(product.rating_count);
                const fullStars = Math.max(0, Math.min(5, Math.round(ratingAverage)));
                const stars = '<i class="fas fa-star"></i>'.repeat(fullStars) + '<i class="far fa-star text-gray-300"></i>'.repeat(5 - fullStars);

                return `
                <div class="group relative flex h-full flex-col overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm transition-all hover:-translate-y-0.5 hover:border-primary-100 hover:shadow-lg">
                    <div class="relative flex items-center justify-center bg-slate-50 p-3 sm:p-4">
                        ${hasDiscount ? `<span class="absolute top-3 left-3 bg-error-500 text-white text-xs font-bold px-3 py-1 rounded-full z-10">خصم ${discount}%</span>` : ''}
                        <button type="button" data-action="wishlist" data-product-id="${productId}" class="absolute right-2 top-2 z-10 grid h-9 w-9 place-items-center rounded-full border border-slate-200 bg-white/95 text-slate-500 shadow-sm transition hover:border-error-100 hover:bg-error-50 hover:text-error-500 sm:right-3 sm:top-3" aria-label="Add to wishlist">
                            <i class="far fa-heart pointer-events-none"></i>
                        </button>
                        <a href="pages/products/product.html?id=${productId}" class="w-full">
                            <img src="${buildImageUrl(getProductImage(product))}" class="aspect-square w-full object-contain transition-transform duration-500 group-hover:scale-105" alt="${escapeHTML(product.title)}" onerror="this.onerror=null;this.src='https://via.placeholder.com/300?text=No+Image'">
                        </a>
                    </div>
                    <div class="flex flex-1 flex-col p-3 sm:p-4">
                        <a href="pages/products/product.html?id=${productId}" class="transition-colors hover:text-primary-600">
                            <h3 class="mb-2 line-clamp-2 min-h-[2.75rem] text-sm font-black leading-6 text-slate-800 sm:text-base">${escapeHTML(product.title)}</h3>
                        </a>
                        <div class="mb-3 flex min-h-[1.25rem] items-center gap-1 text-[11px] text-secondary-500 sm:text-xs">
                            ${ratingCount ? `${stars} <span class="text-gray-600 font-bold mr-1">${ratingAverage.toFixed(1)}</span><span class="text-gray-400">(${ratingCount} تقييم)</span>` : '<span class="text-gray-400">لا توجد تقييمات بعد</span>'}
                        </div>
                        <div class="mt-auto flex items-center justify-between">
                            <div class="flex flex-col">
                                ${hasDiscount ? `<span class="text-gray-400 line-through text-xs">${price.toFixed(0)} ج.م</span>` : ''}
                                <span class="text-lg font-black text-primary-600 sm:text-xl">${calcFinalPrice(price, discount)} ج.م</span>
                            </div>
                            <button type="button" data-action="add-to-cart" data-product-id="${productId}" class="add-to-cart-btn z-20 flex h-10 w-10 items-center justify-center rounded-xl bg-primary-500 text-white shadow-lg shadow-cyan-100 transition-all hover:bg-primary-600 sm:h-11 sm:w-11">
                                <i class="fas fa-cart-plus pointer-events-none"></i>
                            </button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        window.toggleWishlist = async function(button, id) {
            const token = window.AppState ? window.AppState.getToken() : (localStorage.getItem(TOKEN_KEY) || localStorage.getItem('token'));
            if (!token) {
                showToast('Please login to use wishlist', 'error');
                return;
            }
            if (!button || button.dataset.busy === '1') return;
            button.dataset.busy = '1';
            try {
                const response = await fetch(`${API_URL}/wishlist`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ product_id: parseInt(id) })
                });
                const data = await response.json().catch(() => ({}));
                if (response.ok || data.success) {
                    button.classList.toggle('text-error-500', true);
                    button.classList.toggle('bg-error-50', true);
                    const icon = button.querySelector('i');
                    if (icon) icon.className = 'fas fa-heart pointer-events-none';
                    showToast(data.message || 'Added to wishlist');
                } else {
                    showToast(data.message || 'Could not update wishlist', 'error');
                }
            } catch (err) {
                console.error(err);
                showToast('Could not update wishlist', 'error');
            } finally {
                button.dataset.busy = '0';
            }
        };

        // ==========================================
        //  الإضافة المباشرة للباك اند (Hybrid Model)
        // ==========================================
        window.addToCart = async function(button, id) {
            const token = window.AppState ? window.AppState.getToken() : (localStorage.getItem(TOKEN_KEY) || localStorage.getItem('token')); 
            
            if (!token) {
                addGuestCartItem(id, 1);
                showToast("تمت إضافة المنتج لسلة الزائر");
                if (typeof window.updateGlobalCartCount === 'function') window.updateGlobalCartCount();
                return;
            }

            if (button) {
                button.dataset.busy = '1';
                button.style.opacity = '0.5';
                button.disabled = true;
            }

            try {
                const response = await fetch(`${API_URL}/cart`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify({ product_id: parseInt(id), quantity: 1 })
                });

                const data = await response.json();

                if (response.ok || data.success) {
                    showToast("تم إضافة المنتج للسلة بنجاح!");
                    // تحديث العداد من السيرفر مباشرة عبر دالة الناف بار المحدثة
                    if (typeof window.updateGlobalCartCount === 'function') {
                        window.updateGlobalCartCount();
                    }
                } else {
                    showToast(data.message || "حدث خطأ أثناء الإضافة", "error");
                }
            } catch (err) {
                console.error(err);
                showToast("خطأ في الاتصال بالخادم", "error");
            } finally {
                if (button) {
                    button.dataset.busy = '0';
                    button.style.opacity = '1';
                    button.disabled = false;
                }
            }
        };

        window.handleProductCardCartClick = function(event, button) {
            if (event) {
                event.preventDefault();
                event.stopPropagation();
                if (typeof event.stopImmediatePropagation === 'function') event.stopImmediatePropagation();
            }
            if (!button || button.dataset.busy === '1') return false;
            window.addToCart(button, button.dataset.productId);
            return false;
        };

        function addGuestCartItem(id, quantity) {
            const productId = Number(id);
            if (!productId) return;
            if (window.AppState) {
                window.AppState.addCartItem(productId, quantity);
                return;
            }
            let cart = [];
            try { cart = JSON.parse(localStorage.getItem('spider_cart') || '[]'); } catch (error) { cart = []; }
            const existing = cart.find(item => Number(item.id || item.product_id) === productId);
            if (existing) existing.quantity = Number(existing.quantity || 0) + quantity;
            else cart.push({ id: productId, product_id: productId, quantity });
            localStorage.setItem('spider_cart', JSON.stringify(cart));
        }

        document.addEventListener('click', event => {
            const button = event.target.closest('[data-action="wishlist"]');
            if (!button) return;
            event.preventDefault();
            event.stopPropagation();
            window.toggleWishlist(button, button.dataset.productId);
        });

        ['pointerdown', 'mousedown', 'touchstart', 'click'].forEach(eventName => {
            document.addEventListener(eventName, event => {
                const button = event.target.closest('[data-action="add-to-cart"]');
                if (!button) return;
                event.preventDefault();
                event.stopPropagation();
                if (typeof event.stopImmediatePropagation === 'function') event.stopImmediatePropagation();
                if (eventName === 'click') window.handleProductCardCartClick(event, button);
            }, true);
        });

        document.addEventListener('submit', event => {
            if (event.target && event.target.closest('#productsGrid, #bestSellersGrid')) {
                event.preventDefault();
                event.stopPropagation();
                if (typeof event.stopImmediatePropagation === 'function') event.stopImmediatePropagation();
            }
        }, true);

        document.addEventListener('click', event => {
            const button = event.target.closest('[data-action="add-to-cart"]');
            if (!button) return;
            event.preventDefault();
            event.stopPropagation();
            if (typeof event.stopImmediatePropagation === 'function') event.stopImmediatePropagation();
            window.handleProductCardCartClick(event, button);
        }, true);

        function showToast(message, type = 'success') {
            if (window.AppUI) return window.AppUI.toast(message, type);
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const isSuccess = type === 'success';
            
            toast.className = `pointer-events-auto relative overflow-hidden bg-white/95 backdrop-blur-md border-r-4 ${isSuccess ? 'border-success-500' : 'border-error-500'} shadow-[0_8px_30px_rgb(0,0,0,0.12)] rounded-xl w-80 transform transition-all duration-500 translate-x-full opacity-0 flex p-4 items-center gap-4`;
            
            toast.innerHTML = `
                <div class="flex-shrink-0 w-10 h-10 rounded-full flex items-center justify-center ${isSuccess ? 'bg-success-100 text-success-600' : 'bg-error-100 text-error-600'}">
                    <i class="fas ${isSuccess ? 'fa-check' : 'fa-exclamation'} text-lg"></i>
                </div>
                <div class="flex-1">
                    <h4 class="font-bold text-gray-800 text-sm">${isSuccess ? 'تم بنجاح' : 'تنبيه'}</h4>
                    <p class="text-xs text-gray-500 font-medium mt-0.5 leading-relaxed">${escapeHTML(message)}</p>
                </div>
                <button type="button" class="flex-shrink-0 text-gray-400 hover:text-gray-700" onclick="this.parentElement.remove()">
                    <i class="fas fa-times"></i>
                </button>
                <div class="absolute bottom-0 left-0 w-full h-1 bg-gray-100">
                    <div class="h-full ${isSuccess ? 'bg-success-500' : 'bg-error-500'} animate-progress"></div>
                </div>
            `;
            
            container.appendChild(toast);
            requestAnimationFrame(() => setTimeout(() => toast.classList.remove('translate-x-full', 'opacity-0'), 10));
            setTimeout(() => {
                toast.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        window.addEventListener('load', initPage);
    })();
    </script>
</body>
</html>
