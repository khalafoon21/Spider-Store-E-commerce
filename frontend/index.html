<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Store | الرئيسية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles/responsive.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#ECFEFF', 100: '#CFFAFE', 500: '#06B6D4', 600: '#0891B2', 700: '#0E7490' },
                        secondary: { 50: '#FFFBEB', 500: '#F59E0B' },
                        success: { 500: '#22C55E', 100: '#DCFCE7', 600: '#16A34A' },
                        error: { 500: '#EF4444', 100: '#FEE2E2', 600: '#DC2626' }
                    }
                }
            }
        }
    </script>
    
    <style>
        html, body { width: 100%; max-width: 100%; overflow-x: hidden; }
        body { background-color: #F8FAFC; }
        img, video, svg { max-width: 100%; height: auto; }
        .safe-text { overflow-wrap: anywhere; word-break: break-word; }
        button:disabled { cursor: not-allowed; }
        .smooth-transition { transition: all 0.3s ease-in-out; }
        .fade-in { animation: fadeIn 0.6s ease-in-out; }

        @keyframes fadeIn { 
            from { opacity: 0.5; } 
            to   { opacity: 1; } 
        }

        @keyframes shrinkProgress { 
            from { width: 100%; } 
            to   { width: 0%; } 
        }

        .animate-progress { animation: shrinkProgress 3s linear forwards; }

        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 0.5rem;
        }

        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>

<body class="font-sans text-gray-800 antialiased flex flex-col min-h-screen">

    <div id="navbar-container"></div>
    <script src="components/app-state.js"></script>
    <script src="components/ui-feedback.js"></script>
    <script src="components/main-navbar.js" defer></script>

    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-3 pointer-events-none" aria-live="polite"></div>

    <main class="mx-auto w-full max-w-[1440px] flex-1 px-3 py-4 sm:px-4 lg:px-6">
        
        <section id="heroContainer" class="relative mb-5 hidden overflow-hidden rounded-2xl border border-slate-200 bg-slate-900 shadow-sm sm:mb-6 lg:mb-8">
            <div id="sliderContent" class="w-full fade-in"></div>
            <div class="absolute bottom-4 left-1/2 z-20 flex -translate-x-1/2 gap-2" id="sliderDots"></div>
        </section>

        <section class="mb-5 rounded-2xl border border-slate-200 bg-white p-3 shadow-sm sm:mb-6 sm:p-4">
            <div class="mb-3 flex items-center justify-between gap-3">
                <h2 class="flex items-center gap-2 text-base font-black text-slate-950 sm:text-lg">
                    <span class="grid h-9 w-9 place-items-center rounded-xl bg-cyan-50 text-primary-600">
                        <i class="fas fa-th-large"></i>
                    </span>
                    الأقسام
                </h2>

                <button type="button" data-category-filter="" class="text-sm font-bold text-primary-600 hover:text-primary-700">
                    الكل
                </button>
            </div>

            <nav id="categoriesList" class="flex gap-3 overflow-x-auto pb-1" aria-label="أقسام المنتجات">
                <div class="flex min-w-full gap-3">
                    <div class="skeleton h-20 w-28 shrink-0 rounded-2xl"></div>
                    <div class="skeleton h-20 w-28 shrink-0 rounded-2xl"></div>
                    <div class="skeleton h-20 w-28 shrink-0 rounded-2xl"></div>
                    <div class="skeleton h-20 w-28 shrink-0 rounded-2xl"></div>
                </div>
            </nav>
        </section>

        <div class="flex-1">

        <section id="homepageFilters" class="mb-5 rounded-2xl border border-slate-200 bg-white p-3 shadow-sm sm:p-4">
            <div class="mb-3 flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
                <h2 class="flex items-center gap-2 text-base font-black text-slate-950 sm:text-lg">
                    <span class="grid h-9 w-9 place-items-center rounded-xl bg-slate-100 text-primary-600">
                        <i class="fas fa-filter"></i>
                    </span>
                    فلترة وترتيب المنتجات
                </h2>

                <span id="filteredProductsCount" class="inline-flex w-fit items-center gap-2 rounded-full bg-primary-50 px-4 py-2 text-sm font-black text-primary-700">
                    <i class="fas fa-box"></i>
                    0 منتج
                </span>
            </div>

            <div class="grid grid-cols-1 gap-3 md:grid-cols-2 xl:grid-cols-5">
                <label class="block">
                    <span class="mb-1 block text-xs font-black text-slate-400">الترتيب</span>
                    <select id="sortSelect" class="h-11 w-full rounded-xl border border-slate-200 bg-slate-50 px-3 text-sm font-bold text-slate-700 outline-none transition focus:border-primary-500 focus:bg-white focus:ring-4 focus:ring-primary-50">
                        <option value="newest">الأحدث</option>
                        <option value="price_asc">الأقل سعرًا</option>
                        <option value="price_desc">الأعلى سعرًا</option>
                        <option value="rating_desc">الأعلى تقييمًا</option>
                        <option value="discount_desc">أعلى خصم</option>
                        <option value="name_asc">الاسم أ-ي</option>
                    </select>
                </label>

                <label class="block">
                    <span class="mb-1 block text-xs font-black text-slate-400">السعر من</span>
                    <input id="minPriceInput" type="number" min="0" step="1" inputmode="numeric" placeholder="0" class="h-11 w-full rounded-xl border border-slate-200 bg-slate-50 px-3 text-sm font-bold text-slate-700 outline-none transition focus:border-primary-500 focus:bg-white focus:ring-4 focus:ring-primary-50">
                </label>

                <label class="block">
                    <span class="mb-1 block text-xs font-black text-slate-400">السعر إلى</span>
                    <input id="maxPriceInput" type="number" min="0" step="1" inputmode="numeric" placeholder="مثلاً 3000" class="h-11 w-full rounded-xl border border-slate-200 bg-slate-50 px-3 text-sm font-bold text-slate-700 outline-none transition focus:border-primary-500 focus:bg-white focus:ring-4 focus:ring-primary-50">
                </label>

                <label class="flex h-11 items-center gap-2 self-end rounded-xl border border-slate-200 bg-slate-50 px-3 text-sm font-black text-slate-700">
                    <input id="inStockOnly" type="checkbox" class="h-4 w-4 accent-cyan-600">
                    المتاح فقط
                </label>

                <button type="button" id="clearFiltersBtn" class="inline-flex h-11 items-center justify-center gap-2 self-end rounded-xl border border-slate-200 bg-white px-4 text-sm font-black text-slate-700 transition hover:border-error-100 hover:bg-error-50 hover:text-error-600">

                    مسح الفلاتر
                </button>
            </div>

            <p id="activeFiltersLabel" class="safe-text mt-3 hidden rounded-xl bg-slate-50 px-3 py-2 text-xs font-bold text-slate-500"></p>
        </section>
            <section id="latestSection" class="mb-8 sm:mb-10">
                <div class="mb-4 flex items-center justify-between gap-3 border-r-4 border-secondary-500 pr-3 sm:mb-5">
                    <h2 id="latestTitle" class="text-2xl font-bold text-gray-900">وصل حديثاً</h2>
                </div>
                <div id="productsGrid" class="xs-stack grid grid-cols-2 gap-3 sm:grid-cols-3 sm:gap-4 lg:grid-cols-4 xl:grid-cols-5"></div>
            </section>

            <section id="bestSellersSection">
                <div class="mb-4 flex items-center justify-between gap-3 border-r-4 border-primary-500 pr-3 sm:mb-5">
                    <h2 class="text-2xl font-bold text-gray-900">المنتجات المميزة</h2>
                </div>
                <div id="bestSellersGrid" class="xs-stack grid grid-cols-2 gap-3 sm:grid-cols-3 sm:gap-4 lg:grid-cols-4 xl:grid-cols-5"></div>
            </section>

        </div>
    </main>

    <footer class="bg-gray-900 text-white py-12 text-center mt-auto">
        <div class="container mx-auto px-4">
            <h2 class="text-2xl font-bold text-primary-500 mb-4">Spider Store</h2>
            <p class="text-gray-400 mb-8 max-w-md mx-auto">وجهتك الأولى لأفضل إكسسوارات الألعاب في مصر.</p>
            <div class="flex justify-center gap-6 mb-8 text-2xl">
                <a href="#" aria-label="Facebook" class="hover:text-primary-500 transition-colors"><i class="fab fa-facebook"></i></a>
                <a href="#" aria-label="Instagram" class="hover:text-primary-500 transition-colors"><i class="fab fa-instagram"></i></a>
                <a href="#" aria-label="WhatsApp" class="hover:text-primary-500 transition-colors"><i class="fab fa-whatsapp"></i></a>
            </div>
            <p class="text-gray-500 text-sm">© 2026 Spider Store. جميع الحقوق محفوظة.</p>
        </div>
    </footer>

    <script>
    (() => {
        'use strict';

        const BASE_SERVER = '';
        const API_URL = '/api';
        const TOKEN_KEY = 'spider_token';

        const urlParams = new URLSearchParams(window.location.search);
        let currentCategoryId = urlParams.get('category') || '';
        let searchQuery = urlParams.get('search') || '';
        let categoriesCache = [];
        let wishlistProductIds = new Set();
        let liveSearchTimer = null;
        let filterTimer = null;
        let currentSort = urlParams.get('sort') || 'newest';
        let minPriceFilter = urlParams.get('min_price') || '';
        let maxPriceFilter = urlParams.get('max_price') || '';
        let inStockOnly = urlParams.get('in_stock') === '1';
        let latestProductsCache = [];

        let banners = [];
        let currentSlide = 0;
        let sliderInterval = null;
        let productsRequestSeq = 0;

        const escapeHTML = str => String(str ?? '').replace(/[&<>'"]/g, tag => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            "'": '&#39;',
            '"': '&quot;'
        }[tag]));

        const safeNumber = value => Number.isFinite(Number(value)) ? Number(value) : 0;
        const safeId = value => encodeURIComponent(String(value ?? ''));

        const normalizeId = value => String(value ?? '').trim();
        const getPayloadId = value => /^\d+$/.test(normalizeId(value)) ? Number(normalizeId(value)) : normalizeId(value);
        const isSuccessResponse = (response, data) => response.ok && data.success !== false;

        const safeIconClass = value => String(value || 'fa-tags')
            .split(/\s+/)
            .filter(cls => /^fa[-\w]*$/.test(cls))
            .join(' ') || 'fa-tags';

        const isCategoryImageIcon = value => {
            const clean = String(value || '').trim();
            return clean.startsWith('/uploads/') || /\.(png|jpe?g|webp|svg)$/i.test(clean);
        };

        const safeColor = (value, fallback) => {
            return /^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(String(value || '')) ? value : fallback;
        };

        const safeLink = value => {
            const link = String(value || '').trim();
            if (!link) return '#';
            if (/^(https?:\/\/|\.{0,2}\/|#|\?)/i.test(link) && !/^javascript:/i.test(link)) return escapeHTML(link);
            return '#';
        };

        async function fetchJson(url, options = {}) {
            const response = await fetch(url, options);
            const text = await response.text();

            let data = {};

            try {
                data = text ? JSON.parse(text) : {};
            } catch (error) {
                console.error('[Non JSON Response]', { url, status: response.status, text });
            }

            return { response, data, text };
        }

        function extractList(data, keys = []) {
            if (Array.isArray(data)) return data;
            if (Array.isArray(data.data)) return data.data;

            for (const key of keys) {
                if (Array.isArray(data?.[key])) return data[key];
                if (Array.isArray(data?.data?.[key])) return data.data[key];
            }

            if (Array.isArray(data?.data?.data)) return data.data.data;
            if (Array.isArray(data?.result)) return data.result;
            return [];
        }

        const buildImageUrl = imagePath => {
            const cleanPath = String(imagePath || '').trim();
            if (!cleanPath) return '';
            return /^https?:\/\//i.test(cleanPath)
                ? cleanPath
                : `${BASE_SERVER}${cleanPath.startsWith('/') ? cleanPath : `/${cleanPath}`}`;
        };

        const renderCategoryIcon = (icon, name = '') => {
            const cleanIcon = String(icon || '').trim();

            if (isCategoryImageIcon(cleanIcon)) {
                return `
                    <img
                        src="${escapeHTML(buildImageUrl(cleanIcon))}"
                        class="h-7 w-7 object-contain"
                        alt="${escapeHTML(name || 'Category icon')}"
                        loading="lazy"
                        onerror="this.style.display='none'"
                    >
                `;
            }

            return `<i class="fas ${safeIconClass(cleanIcon)}"></i>`;
        };

        const getProductImage = product => {
            if (product.image_url || product.image) return product.image_url || product.image;
            if (Array.isArray(product.images_array) && product.images_array.length) return product.images_array[0];
            if (Array.isArray(product.images_list) && product.images_list.length) return product.images_list[0];

            if (typeof product.images === 'string' && product.images.trim()) {
                try {
                    const parsed = JSON.parse(product.images);
                    if (Array.isArray(parsed) && parsed.length) return parsed[0];
                } catch (error) {
                    return product.images.split(/[,\n]/).find(Boolean) || '';
                }
            }

            return '';
        };

        const calcFinalPrice = (price, discount) => {
            const basePrice = safeNumber(price);
            const discountValue = safeNumber(discount);

            return (discountValue > 0 && discountValue <= 100)
                ? (basePrice - (basePrice * discountValue / 100)).toFixed(0)
                : basePrice.toFixed(0);
        };

        const getFinalPriceNumber = product => Number(calcFinalPrice(product?.price, product?.discount));

        const getProductStock = product => safeNumber(
            product?.stock_quantity ??
            product?.stock ??
            product?.quantity ??
            product?.available_quantity
        );

        const isProductOutOfStock = product => {
            const stockStatus = String(product?.stock_status || product?.availability || '').toLowerCase();
            if (['out_of_stock', 'out-of-stock', 'sold_out', 'sold-out', 'unavailable'].includes(stockStatus)) return true;
            if (product?.in_stock === false || product?.available === false) return true;
            return getProductStock(product) <= 0;
        };

        function hasActiveProductFilters() {
            return Boolean(
                currentCategoryId ||
                searchQuery ||
                minPriceFilter ||
                maxPriceFilter ||
                inStockOnly ||
                currentSort !== 'newest'
            );
        }

        function applyProductFilters(products) {
            const min = minPriceFilter !== '' ? safeNumber(minPriceFilter) : null;
            const max = maxPriceFilter !== '' ? safeNumber(maxPriceFilter) : null;

            let output = products.filter(product => {
                const finalPrice = getFinalPriceNumber(product);
                if (min !== null && finalPrice < min) return false;
                if (max !== null && finalPrice > max) return false;
                if (inStockOnly && isProductOutOfStock(product)) return false;
                return true;
            });

            output = [...output].sort((a, b) => {
                const priceA = getFinalPriceNumber(a);
                const priceB = getFinalPriceNumber(b);
                const ratingA = safeNumber(a.rating_average);
                const ratingB = safeNumber(b.rating_average);
                const discountA = safeNumber(a.discount);
                const discountB = safeNumber(b.discount);
                const nameA = String(a.title || '').localeCompare(String(b.title || ''), 'ar');
                const dateA = new Date(a.created_at || a.createdAt || a.updated_at || 0).getTime() || 0;
                const dateB = new Date(b.created_at || b.createdAt || b.updated_at || 0).getTime() || 0;

                if (currentSort === 'price_asc') return priceA - priceB;
                if (currentSort === 'price_desc') return priceB - priceA;
                if (currentSort === 'rating_desc') return ratingB - ratingA;
                if (currentSort === 'discount_desc') return discountB - discountA;
                if (currentSort === 'name_asc') return nameA;
                return dateB - dateA;
            });

            return output;
        }

        function updateFilterSummary(filteredCount, totalCount) {
            const count = document.getElementById('filteredProductsCount');
            const label = document.getElementById('activeFiltersLabel');

            if (count) {
                count.innerHTML = '<i class="fas fa-box"></i> ' + filteredCount + ' من ' + totalCount + ' منتج';
            }

            if (!label) return;

            const parts = [];
            if (currentCategoryId) parts.push('تصنيف محدد');
            if (searchQuery) parts.push('بحث: ' + escapeHTML(searchQuery));
            if (minPriceFilter) parts.push('من ' + escapeHTML(minPriceFilter) + ' ج.م');
            if (maxPriceFilter) parts.push('إلى ' + escapeHTML(maxPriceFilter) + ' ج.م');
            if (inStockOnly) parts.push('المتاح فقط');
            if (currentSort !== 'newest') parts.push('ترتيب: ' + escapeHTML(getSortLabel(currentSort)));

            if (!parts.length) {
                label.classList.add('hidden');
                label.textContent = '';
                return;
            }

            label.classList.remove('hidden');
            label.innerHTML = 'الفلاتر النشطة: ' + parts.join(' · ');
        }

        function getSortLabel(value) {
            return {
                newest: 'الأحدث',
                price_asc: 'الأقل سعرًا',
                price_desc: 'الأعلى سعرًا',
                rating_desc: 'الأعلى تقييمًا',
                discount_desc: 'أعلى خصم',
                name_asc: 'الاسم أ-ي'
            }[value] || 'الأحدث';
        }

        function syncFilterControls() {
            const sort = document.getElementById('sortSelect');
            const min = document.getElementById('minPriceInput');
            const max = document.getElementById('maxPriceInput');
            const stock = document.getElementById('inStockOnly');

            if (sort) sort.value = currentSort;
            if (min) min.value = minPriceFilter;
            if (max) max.value = maxPriceFilter;
            if (stock) stock.checked = inStockOnly;
        }


        function renderProductsSkeleton(containerId, count = 6) {
            const container = document.getElementById(containerId);
            if (!container) return;

            container.innerHTML = Array(count).fill(`
                <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
                    <div class="skeleton aspect-square w-full"></div>
                    <div class="flex flex-col gap-3 p-3 sm:p-4">
                        <div class="skeleton h-4 w-3/4"></div>
                        <div class="skeleton h-3 w-1/2"></div>
                        <div class="skeleton h-6 w-1/3 mt-2"></div>
                    </div>
                </div>
            `).join('');
        }

        async function initPage() {
            syncFilterControls();
            wireHomepageFilterControls();
            renderProductsSkeleton('productsGrid');
            renderProductsSkeleton('bestSellersGrid', 5);

            await Promise.allSettled([
                fetchBanners(),
                fetchWishlistState(),
                fetchCategories()
            ]);

            await fetchProducts();
            wireHomepageLiveFilters();
        }

        async function fetchBanners() {
            const heroContainer = document.getElementById('heroContainer');

            try {
                const { response, data } = await fetchJson(`${API_URL}/banners`);
                const bannerList = isSuccessResponse(response, data)
                    ? extractList(data, ['banners'])
                    : [];

                banners = bannerList.filter(banner => banner && (banner.image_url || banner.image || banner.title || banner.description));

                if (!banners.length) {
                    if (heroContainer) heroContainer.classList.add('hidden');
                    return;
                }

                currentSlide = 0;

                if (heroContainer) heroContainer.classList.remove('hidden');

                renderSlider();
                startSliderTimer();
            } catch (err) {
                console.error('[Banners Fetch Error]', err);
                if (heroContainer) heroContainer.classList.add('hidden');
            }
        }

        function renderSlider() {
            const container = document.getElementById('sliderContent');
            const dotsContainer = document.getElementById('sliderDots');

            if (!container || !banners[currentSlide]) return;

            const slide = banners[currentSlide];

            const title = String(slide.title || '').trim();
            const description = String(slide.description || '').trim();
            const imageUrl = buildImageUrl(slide.image_url || slide.image || '');
            const buttonText = String(slide.button_text || '').trim() || 'اكتشف الآن';
            const buttonColor = safeColor(slide.button_color, '#06B6D4');
            const textColor = safeColor(slide.text_color, '#ffffff');
            const bgColor = safeColor(slide.bg_color, '#0f172a');
            const linkUrl = safeLink(slide.link_url);

            const hasText = Boolean(title || description || buttonText);
            const hasImage = Boolean(imageUrl);

            container.innerHTML = `
                <div
                    class="relative min-h-[240px] w-full overflow-hidden bg-slate-900 sm:min-h-[310px] lg:min-h-[390px]"
                    style="background-color:${bgColor};"
                >
                    ${
                        hasImage
                            ? `
                                <img
                                    src="${escapeHTML(imageUrl)}"
                                    class="absolute inset-0 h-full w-full object-cover"
                                    alt="${escapeHTML(title || 'Banner')}"
                                    loading="lazy"
                                    onerror="this.style.display='none'"
                                >
                            `
                            : ''
                    }

                    <div class="absolute inset-0 bg-gradient-to-r from-transparent via-black/25 to-black/70"></div>

                    ${
                        hasText
                            ? `
                                <div class="relative z-10 min-h-[240px] w-full p-5 sm:min-h-[310px] sm:p-8 lg:min-h-[390px] lg:p-12">
                                    <div class="absolute right-5 top-1/2 max-w-xl -translate-y-1/2 text-right sm:right-8 lg:right-12">
                                        ${
                                            title
                                                ? `
                                                    <h2 class="text-3xl font-black leading-tight sm:text-5xl lg:text-6xl" style="color:${textColor};">
                                                        ${escapeHTML(title)}
                                                    </h2>
                                                `
                                                : ''
                                        }

                                        ${
                                            description
                                                ? `
                                                    <p class="mt-4 max-w-lg text-sm font-bold leading-7 text-white/90 sm:text-lg sm:leading-8">
                                                        ${escapeHTML(description)}
                                                    </p>
                                                `
                                                : ''
                                        }

                                        ${
                                            buttonText
                                                ? `
                                                    <a
                                                        href="${linkUrl}"
                                                        class="mt-6 inline-flex min-w-36 items-center justify-center rounded-full px-7 py-3 text-sm font-black text-white shadow-xl transition hover:-translate-y-0.5 hover:shadow-2xl sm:px-9 sm:py-3.5 sm:text-base"
                                                        style="background-color:${buttonColor};"
                                                    >
                                                        ${escapeHTML(buttonText)}
                                                    </a>
                                                `
                                                : ''
                                        }
                                    </div>
                                </div>
                            `
                            : ''
                    }
                </div>
            `;

            if (dotsContainer) {
                dotsContainer.innerHTML = banners.length > 1
                    ? banners.map((_, i) => `
                        <button
                            type="button"
                            onclick="window.goToSlide(${i})"
                            class="h-2.5 rounded-full border border-white/70 bg-white/70 shadow-sm ${i === currentSlide ? 'w-8 bg-primary-500 border-primary-500' : 'w-2.5'} smooth-transition"
                            aria-label="Go to slide ${i + 1}"
                        ></button>
                    `).join('')
                    : '';
            }
        }

        function startSliderTimer() {
            if (sliderInterval) clearInterval(sliderInterval);

            if (banners.length <= 1) return;

            sliderInterval = setInterval(() => {
                window.goToSlide((currentSlide + 1) % banners.length);
            }, 5000);
        }

        window.goToSlide = function(index) {
            if (!banners.length) return;

            currentSlide = Number(index) || 0;

            if (currentSlide < 0) currentSlide = 0;
            if (currentSlide >= banners.length) currentSlide = 0;

            renderSlider();
            startSliderTimer(); 
        };

        async function fetchCategories() {
            const list = document.getElementById('categoriesList');

            try {
                const { response, data } = await fetchJson(`${API_URL}/categories`);

                categoriesCache = isSuccessResponse(response, data)
                    ? extractList(data, ['categories'])
                    : [];

                renderCategories();
            } catch (err) {
                console.error('[Categories Fetch Error]', err);
                categoriesCache = [];

                if (list) {
                    list.innerHTML = '<p class="text-sm text-error-500 p-2">تعذر تحميل الأقسام.</p>';
                }
            }
        }

        function renderCategories() {
            const list = document.getElementById('categoriesList');
            if (!list) return;

            const allActive = !currentCategoryId;
            const allClasses = allActive
                ? 'bg-primary-500 text-white border-primary-500 shadow-md shadow-cyan-100'
                : 'bg-slate-50 text-slate-700 border-slate-100 hover:bg-cyan-50 hover:text-primary-700 hover:border-primary-100';

            const allIconBg = allActive
                ? 'bg-white/20 text-white'
                : 'bg-white text-primary-600 shadow-sm group-hover:bg-white';

            const allItem = `
                <button
                    type="button"
                    data-category-filter=""
                    class="group flex min-w-[112px] shrink-0 flex-col items-center justify-center gap-2 rounded-2xl border px-3 py-4 text-center transition-all sm:min-w-[136px] ${allClasses}"
                >
                    <span class="flex h-10 w-10 items-center justify-center rounded-xl transition-all ${allIconBg}">
                        <i class="fas fa-layer-group"></i>
                    </span>
                    <span class="line-clamp-1 text-sm font-black">الكل</span>
                </button>
            `;

            const categoryItems = categoriesCache.map(cat => {
                const categoryId = String(cat.id || '');
                const isActive = currentCategoryId === categoryId;

                const activeClasses = isActive
                    ? 'bg-primary-500 text-white border-primary-500 shadow-md shadow-cyan-100'
                    : 'bg-slate-50 text-slate-700 border-slate-100 hover:bg-cyan-50 hover:text-primary-700 hover:border-primary-100';

                const activeIconBg = isActive
                    ? 'bg-white/20 text-white'
                    : 'bg-white text-primary-600 shadow-sm group-hover:bg-white';
                
                return `
                    <button
                        type="button"
                        data-category-filter="${safeId(categoryId)}"
                        class="group flex min-w-[112px] shrink-0 flex-col items-center justify-center gap-2 rounded-2xl border px-3 py-4 text-center transition-all sm:min-w-[136px] ${activeClasses}"
                    >
                        <span class="flex h-10 w-10 items-center justify-center rounded-xl transition-all ${activeIconBg}">
                            ${renderCategoryIcon(cat.icon, cat.name)}
                        </span>
                        <span class="line-clamp-1 text-sm font-black">${escapeHTML(cat.name)}</span>
                    </button>
                `;
            }).join('');

            list.innerHTML = allItem + categoryItems;
        }

        async function fetchProducts() {
            const grid = document.getElementById('productsGrid');
            const bestSellersGrid = document.getElementById('bestSellersGrid');
            const bestSellersSection = document.getElementById('bestSellersSection');
            const hasFilters = hasActiveProductFilters();
            const requestSeq = ++productsRequestSeq;

            if (document.getElementById('latestTitle')) {
                document.getElementById('latestTitle').innerText = hasFilters ? 'نتائج البحث / التصنيف' : 'أحدث المنتجات';
            }

            if (bestSellersSection) {
                bestSellersSection.style.display = hasFilters ? 'none' : '';
            }

            try {
                let apiUrl = `${API_URL}/products`;
                const queryParams = [];

                if (currentCategoryId) queryParams.push(`category_id=${encodeURIComponent(currentCategoryId)}`);
                if (searchQuery) queryParams.push(`search=${encodeURIComponent(searchQuery)}`);
                if (queryParams.length > 0) apiUrl += `?${queryParams.join('&')}`;

                const { response, data } = await fetchJson(apiUrl);

                if (requestSeq !== productsRequestSeq) return;

                if (!isSuccessResponse(response, data)) {
                    throw new Error(data.message || data.error || 'تعذر تحميل المنتجات');
                }

                const products = extractList(data, ['products']);
                latestProductsCache = products;
                const filteredProducts = applyProductFilters(products);
                updateFilterSummary(filteredProducts.length, products.length);

                if (filteredProducts.length) {
                    renderProductCards(filteredProducts, grid);
                } else if (grid) {
                    grid.innerHTML = '<p class="text-gray-500 col-span-full text-center py-8">لا توجد منتجات مطابقة للفلاتر الحالية.</p>';
                }

                if (!hasFilters && bestSellersGrid) {
                    await renderFeaturedProducts(bestSellersGrid);
                } else if (bestSellersGrid) {
                    bestSellersGrid.innerHTML = '';
                }
            } catch (err) {
                console.error('[Products Fetch Error]', err);

                if (requestSeq !== productsRequestSeq) return;

                if (grid) {
                    grid.innerHTML = '<p class="col-span-full text-center text-error-500 py-8">حدث خطأ في الاتصال.</p>';
                }

                if (bestSellersGrid) {
                    bestSellersGrid.innerHTML = '';
                }
            }
        }

        async function renderFeaturedProducts(container) {
            if (!container) return;
            const section = document.getElementById('bestSellersSection');

            try {
                const { response, data } = await fetchJson(`${API_URL}/products?featured=1`);
                const products = isSuccessResponse(response, data)
                    ? extractList(data, ['products'])
                    : [];

                if (!products.length) {
                    container.innerHTML = '';
                    if (section) section.style.display = 'none';
                    return;
                }

                if (section) section.style.display = '';
                renderProductCards(products.slice(0, 5), container);
            } catch (error) {
                console.error('[Featured Products Fetch Error]', error);
                container.innerHTML = '';
                if (section) section.style.display = 'none';
            }
        }

        function renderProductCards(productsArray, container) {
            if (!container) return;

            container.innerHTML = productsArray.map(product => {
                const rawProductId = normalizeId(product.id);
                const productId = safeId(rawProductId);
                const price = safeNumber(product.price);
                const discount = safeNumber(product.discount);
                const stock = getProductStock(product);
                const isOutOfStock = isProductOutOfStock(product);
                const hasDiscount = discount > 0;
                const ratingAverage = safeNumber(product.rating_average);
                const ratingCount = safeNumber(product.rating_count);
                const fullStars = Math.max(0, Math.min(5, Math.round(ratingAverage)));
                const stars = '<i class="fas fa-star"></i>'.repeat(fullStars) + '<i class="far fa-star text-gray-300"></i>'.repeat(5 - fullStars);
                const inWishlist = wishlistProductIds.has(rawProductId);

                const wishlistClasses = inWishlist
                    ? 'border-error-100 bg-error-50 text-error-500'
                    : 'border-slate-200 bg-white/95 text-slate-500 hover:border-error-100 hover:bg-error-50 hover:text-error-500';

                const wishlistIcon = inWishlist ? 'fas fa-heart' : 'far fa-heart';
                const productImage = buildImageUrl(getProductImage(product)) || 'https://via.placeholder.com/300?text=No+Image';
                const cartButtonClasses = isOutOfStock
                    ? 'cursor-not-allowed bg-slate-200 text-slate-500 shadow-none'
                    : 'bg-primary-500 text-white shadow-lg shadow-cyan-100 hover:bg-primary-600';

                return `
                    <div class="group relative flex h-full flex-col overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm transition-all hover:-translate-y-0.5 hover:border-primary-100 hover:shadow-lg">
                        <div class="relative flex items-center justify-center bg-slate-50 p-3 sm:p-4">
                            ${
                                hasDiscount
                                    ? `<span class="absolute top-3 left-3 bg-error-500 text-white text-xs font-bold px-3 py-1 rounded-full z-10">خصم ${discount}%</span>`
                                    : ''
                            }

                            ${
                                isOutOfStock
                                    ? '<span class="absolute right-3 top-3 z-10 rounded-full bg-slate-900/80 px-3 py-1 text-xs font-black text-white">نفدت الكمية</span>'
                                    : ''
                            }

                            <a href="pages/products/product.html?id=${productId}" class="w-full">
                                <img
                                    src="${escapeHTML(productImage)}"
                                    class="aspect-square w-full object-contain transition-transform duration-500 group-hover:scale-105"
                                    alt="${escapeHTML(product.title)}"
                                    loading="lazy"
                                    decoding="async"
                                    onerror="this.onerror=null;this.src='https://via.placeholder.com/300?text=No+Image'"
                                >
                            </a>
                        </div>

                        <div class="flex flex-1 flex-col p-3 sm:p-4">
                            <a href="pages/products/product.html?id=${productId}" class="transition-colors hover:text-primary-600">
                                <h3 class="safe-text product-card-title mb-2 line-clamp-3 min-h-[2.75rem] text-sm font-black leading-6 text-slate-800 sm:line-clamp-2 sm:text-base">
                                    ${escapeHTML(product.title)}
                                </h3>
                            </a>

                            <div class="mb-3 flex min-h-[1.25rem] items-center gap-1 text-[11px] text-secondary-500 sm:text-xs">
                                ${
                                    ratingCount
                                        ? `${stars} <span class="text-gray-600 font-bold mr-1">${ratingAverage.toFixed(1)}</span><span class="text-gray-400">(${ratingCount} تقييم)</span>`
                                        : '<span class="text-gray-400">لا توجد تقييمات بعد</span>'
                                }
                            </div>

                            <div class="mt-auto">
                                <div class="mb-3 flex flex-col">
                                    ${hasDiscount ? `<span class="text-gray-400 line-through text-xs">${price.toFixed(0)} ج.م</span>` : ''}
                                    <span class="text-lg font-black text-primary-600 sm:text-xl">${calcFinalPrice(price, discount)} ج.م</span>
                                </div>

                                <div class="grid grid-cols-2 gap-2">
                                    <button
                                        type="button"
                                        data-action="wishlist"
                                        data-product-id="${productId}"
                                        data-in-wishlist="${inWishlist ? '1' : '0'}"
                                        class="flex h-10 items-center justify-center gap-1.5 rounded-xl border px-2 text-sm font-black ${wishlistClasses} shadow-sm transition sm:h-11"
                                        aria-label="Wishlist"
                                    >
                                        <i class="${wishlistIcon} pointer-events-none"></i>
                                        <span class="hidden sm:inline">المفضلة</span>
                                    </button>

                                    <button
                                        type="button"
                                        data-action="add-to-cart"
                                        data-product-id="${productId}"
                                        data-stock="${stock}"
                                        data-out-of-stock="${isOutOfStock ? '1' : '0'}"
                                        class="add-to-cart-btn z-20 flex h-10 items-center justify-center gap-1.5 rounded-xl px-2 text-sm font-black transition-all sm:h-11 ${cartButtonClasses}"
                                    >
                                        <i class="fas ${isOutOfStock ? 'fa-ban' : 'fa-cart-plus'} pointer-events-none"></i>
                                        <span class="hidden sm:inline">${isOutOfStock ? 'نفدت' : 'السلة'}</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function fetchWishlistState() {
            const token = window.AppState
                ? window.AppState.getToken()
                : (localStorage.getItem(TOKEN_KEY) || localStorage.getItem('token'));

            if (!token) {
                wishlistProductIds = new Set();
                return;
            }

            try {
                const { response, data } = await fetchJson(`${API_URL}/wishlist`, {
                    headers: { Authorization: `Bearer ${token}` }
                });

                const items = isSuccessResponse(response, data)
                    ? extractList(data, ['wishlist', 'items', 'products'])
                    : [];

                wishlistProductIds = new Set(
                    items
                        .map(item => normalizeId(item.product_id ?? item.product?.id ?? item.id))
                        .filter(Boolean)
                );
            } catch (error) {
                console.error('[Wishlist State Error]', error);
                wishlistProductIds = new Set();
            }
        }

        function updateWishlistButtons(productId, inWishlist) {
            const normalizedProductId = normalizeId(productId);

            document.querySelectorAll('[data-action="wishlist"]').forEach(button => {
                if (decodeURIComponent(button.dataset.productId || '') !== normalizedProductId) return;

                button.dataset.inWishlist = inWishlist ? '1' : '0';

                button.classList.toggle('border-error-100', inWishlist);
                button.classList.toggle('bg-error-50', inWishlist);
                button.classList.toggle('text-error-500', inWishlist);

                button.classList.toggle('border-slate-200', !inWishlist);
                button.classList.toggle('bg-white/95', !inWishlist);
                button.classList.toggle('text-slate-500', !inWishlist);

                const icon = button.querySelector('i');
                if (icon) icon.className = `${inWishlist ? 'fas' : 'far'} fa-heart pointer-events-none`;
            });
        }

        window.toggleWishlist = async function(button, id) {
            const token = window.AppState
                ? window.AppState.getToken()
                : (localStorage.getItem(TOKEN_KEY) || localStorage.getItem('token'));

            if (!token) {
                showToast('يرجى تسجيل الدخول لاستخدام قائمة الأمنيات', 'error');
                return;
            }

            if (!button || button.dataset.busy === '1') return;

            button.dataset.busy = '1';
            button.disabled = true;

            const productId = decodeURIComponent(normalizeId(id));
            const isActive = button.dataset.inWishlist === '1' || wishlistProductIds.has(productId);

            try {
                const { response, data } = await fetchJson(`${API_URL}${isActive ? '/wishlist/remove' : '/wishlist'}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        Authorization: `Bearer ${token}`
                    },
                    body: JSON.stringify({ product_id: getPayloadId(productId) })
                });

                if (isSuccessResponse(response, data)) {
                    if (isActive) wishlistProductIds.delete(productId);
                    else wishlistProductIds.add(productId);

                    updateWishlistButtons(productId, !isActive);

                    showToast(data.message || (isActive ? 'تمت الإزالة من قائمة الأمنيات' : 'تمت الإضافة لقائمة الأمنيات'));
                } else {
                    showToast(data.message || 'تعذر تحديث قائمة الأمنيات', 'error');
                }
            } catch (err) {
                console.error('[Wishlist Toggle Error]', err);
                showToast('تعذر تحديث قائمة الأمنيات', 'error');
            } finally {
                button.dataset.busy = '0';
                button.disabled = false;
            }
        };



        function isOutOfStockCartError(response, data) {
            const message = String((data && data.message) || '') + ' ' + String((data && data.error) || '') + ' ' + String((data && data.code) || '');
            const clean = message.toLowerCase();
            return (
                response.status === 409 ||
                clean.includes('out of stock') ||
                clean.includes('sold out') ||
                clean.includes('stock') ||
                clean.includes('quantity') ||
                clean.includes('نفدت') ||
                clean.includes('نفذ') ||
                clean.includes('المخزون') ||
                clean.includes('الكمية') ||
                clean.includes('تحديث السلة')
            );
        }

        function markProductOutOfStock(productId) {
            const normalized = normalizeId(productId);

            document.querySelectorAll('[data-action="add-to-cart"]').forEach(button => {
                if (decodeURIComponent(button.dataset.productId || '') !== normalized) return;

                button.dataset.outOfStock = '1';
                button.dataset.stock = '0';
                button.className = 'add-to-cart-btn z-20 flex h-10 cursor-not-allowed items-center justify-center gap-1.5 rounded-xl bg-slate-200 px-2 text-sm font-black text-slate-500 shadow-none transition-all sm:h-11';
                button.innerHTML = '<i class="fas fa-ban pointer-events-none"></i><span class="hidden sm:inline">نفدت</span>';
            });
        }

        window.addToCart = async function(button, id) {
            const token = window.AppState
                ? window.AppState.getToken()
                : (localStorage.getItem(TOKEN_KEY) || localStorage.getItem('token'));

            const productId = decodeURIComponent(normalizeId(id));

            if (!productId) {
                showToast('رقم المنتج غير صحيح', 'error');
                return;
            }

            if (button?.dataset.busy === '1') return;

            if (button?.dataset.outOfStock === '1') {
                showToast('نفدت الكمية', 'error');
                markProductOutOfStock(productId);
                return;
            }

            if (!token) {
                addGuestCartItem(productId, 1);
                showToast('تمت إضافة المنتج لسلة الزائر');

                if (typeof window.updateGlobalCartCount === 'function') {
                    window.updateGlobalCartCount();
                }

                return;
            }

            if (button) {
                button.dataset.busy = '1';
                button.style.opacity = '0.5';
                button.disabled = true;
            }

            try {
                const { response, data } = await fetchJson(`${API_URL}/cart`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        Authorization: `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        product_id: getPayloadId(productId),
                        quantity: 1
                    })
                });

                if (isSuccessResponse(response, data)) {
                    showToast(data.message || 'تم إضافة المنتج للسلة بنجاح!');

                    if (typeof window.updateGlobalCartCount === 'function') {
                        window.updateGlobalCartCount();
                    }
                } else {
                    if (isOutOfStockCartError(response, data)) {
                        showToast('نفدت الكمية', 'error');
                        markProductOutOfStock(productId);
                    } else {
                        showToast(data.message || data.error || 'حدث خطأ أثناء الإضافة', 'error');
                    }
                }
            } catch (err) {
                console.error('[Cart Add Error]', err);
                showToast('خطأ في الاتصال بالخادم', 'error');
            } finally {
                if (button) {
                    button.dataset.busy = '0';
                    button.style.opacity = '1';
                    button.disabled = false;
                }
            }
        };

        window.handleProductCardCartClick = function(event, button) {
            if (event) {
                event.preventDefault();
                event.stopPropagation();

                if (typeof event.stopImmediatePropagation === 'function') {
                    event.stopImmediatePropagation();
                }
            }

            if (!button || button.dataset.busy === '1') return false;

            window.addToCart(button, button.dataset.productId);
            return false;
        };

        function addGuestCartItem(id, quantity) {
            const productId = normalizeId(id);

            if (!productId) return;

            if (window.AppState && typeof window.AppState.addCartItem === 'function') {
                window.AppState.addCartItem(getPayloadId(productId), quantity);
                return;
            }

            let cart = [];

            try {
                cart = JSON.parse(localStorage.getItem('spider_cart') || '[]');
            } catch (error) {
                cart = [];
            }

            const existing = cart.find(item => normalizeId(item.id ?? item.product_id) === productId);

            if (existing) {
                existing.quantity = Number(existing.quantity || 0) + quantity;
            } else {
                cart.push({
                    id: getPayloadId(productId),
                    product_id: getPayloadId(productId),
                    quantity
                });
            }

            localStorage.setItem('spider_cart', JSON.stringify(cart));
        }

        document.addEventListener('click', event => {
            const button = event.target.closest('[data-action="wishlist"]');
            if (!button) return;

            event.preventDefault();
            event.stopPropagation();

            window.toggleWishlist(button, button.dataset.productId);
        });

        document.addEventListener('click', event => {
            const button = event.target.closest('[data-action="add-to-cart"]');
            if (!button) return;

            event.preventDefault();
            event.stopPropagation();

            window.handleProductCardCartClick(event, button);
        });

        document.addEventListener('submit', event => {
            if (event.target && event.target.closest('#productsGrid, #bestSellersGrid')) {
                event.preventDefault();
                event.stopPropagation();

                if (typeof event.stopImmediatePropagation === 'function') {
                    event.stopImmediatePropagation();
                }
            }
        }, true);

        function updateHomeUrl() {
            const params = new URLSearchParams();

            if (currentCategoryId) params.set('category', currentCategoryId);
            if (searchQuery) params.set('search', searchQuery);
            if (currentSort && currentSort !== 'newest') params.set('sort', currentSort);
            if (minPriceFilter) params.set('min_price', minPriceFilter);
            if (maxPriceFilter) params.set('max_price', maxPriceFilter);
            if (inStockOnly) params.set('in_stock', '1');

            window.history.replaceState(
                {},
                '',
                params.toString() ? `index.html?${params.toString()}` : 'index.html'
            );
        }

        function runFilteredProducts() {
            syncFilterControls();
            updateHomeUrl();
            renderCategories();
            renderProductsSkeleton('productsGrid');
            fetchProducts();
        }



        function wireHomepageFilterControls() {
            const sort = document.getElementById('sortSelect');
            const min = document.getElementById('minPriceInput');
            const max = document.getElementById('maxPriceInput');
            const stock = document.getElementById('inStockOnly');
            const clear = document.getElementById('clearFiltersBtn');

            const runDebounced = () => {
                clearTimeout(filterTimer);
                filterTimer = setTimeout(runFilteredProducts, 250);
            };

            if (sort) {
                sort.addEventListener('change', () => {
                    currentSort = sort.value || 'newest';
                    runFilteredProducts();
                });
            }

            if (min) {
                min.addEventListener('input', () => {
                    minPriceFilter = min.value.trim();
                    runDebounced();
                });
            }

            if (max) {
                max.addEventListener('input', () => {
                    maxPriceFilter = max.value.trim();
                    runDebounced();
                });
            }

            if (stock) {
                stock.addEventListener('change', () => {
                    inStockOnly = stock.checked;
                    runFilteredProducts();
                });
            }

            if (clear) {
                clear.addEventListener('click', () => {
                    currentSort = 'newest';
                    minPriceFilter = '';
                    maxPriceFilter = '';
                    inStockOnly = false;
                    syncFilterControls();
                    runFilteredProducts();
                });
            }
        }

        function wireHomepageLiveFilters() {
            ['navbarSearchInput', 'navbarMobileSearchInput'].forEach(id => {
                const input = document.getElementById(id);
                if (input) input.value = searchQuery;
            });

            window.addEventListener('spider:live-search', event => {
                searchQuery = String((event.detail && event.detail.query) || '').trim();

                clearTimeout(liveSearchTimer);

                liveSearchTimer = setTimeout(runFilteredProducts, 250);
            });

            document.addEventListener('click', event => {
                const button = event.target.closest('[data-category-filter]');
                if (!button) return;

                event.preventDefault();

                const nextCategory = decodeURIComponent(button.dataset.categoryFilter || '');

                currentCategoryId = currentCategoryId === nextCategory ? '' : nextCategory;

                runFilteredProducts();
            });
        }

        function showToast(message, type = 'success') {
            if (window.AppUI) return window.AppUI.toast(message, type);

            const container = document.getElementById('toast-container');
            if (!container) return;

            const toast = document.createElement('div');
            const isSuccess = type === 'success';
            
            toast.className = `pointer-events-auto relative overflow-hidden bg-white/95 backdrop-blur-md border-r-4 ${isSuccess ? 'border-success-500' : 'border-error-500'} shadow-[0_8px_30px_rgb(0,0,0,0.12)] rounded-xl w-[min(22rem,calc(100vw-2rem))] transform transition-all duration-500 translate-x-full opacity-0 flex p-4 items-center gap-4`;
            
            toast.innerHTML = `
                <div class="flex-shrink-0 w-10 h-10 rounded-full flex items-center justify-center ${isSuccess ? 'bg-success-100 text-success-600' : 'bg-error-100 text-error-600'}">
                    <i class="fas ${isSuccess ? 'fa-check' : 'fa-exclamation'} text-lg"></i>
                </div>

                <div class="flex-1">
                    <h4 class="font-bold text-gray-800 text-sm">${isSuccess ? 'تم بنجاح' : 'تنبيه'}</h4>
                    <p class="safe-text text-xs text-gray-500 font-medium mt-0.5 leading-relaxed">${escapeHTML(message)}</p>
                </div>

                <button type="button" class="flex-shrink-0 text-gray-400 hover:text-gray-700" onclick="this.parentElement.remove()">
                    <i class="fas fa-times"></i>
                </button>

                <div class="absolute bottom-0 left-0 w-full h-1 bg-gray-100">
                    <div class="h-full ${isSuccess ? 'bg-success-500' : 'bg-error-500'} animate-progress"></div>
                </div>
            `;
            
            container.appendChild(toast);

            requestAnimationFrame(() => {
                setTimeout(() => {
                    toast.classList.remove('translate-x-full', 'opacity-0');
                }, 10);
            });

            setTimeout(() => {
                toast.classList.add('translate-x-full', 'opacity-0');

                setTimeout(() => {
                    toast.remove();
                }, 500);
            }, 3000);
        }

        window.addEventListener('load', initPage);
    })();
    </script>
</body>
</html>
