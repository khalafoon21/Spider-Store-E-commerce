<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Store | الرئيسية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Cairo', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#ECFEFF', 500: '#06B6D4', 600: '#0891B2', 700: '#0E7490' },
                        secondary: { 50: '#FFFBEB', 500: '#F59E0B' },
                        success: { 500: '#22C55E' },
                        error: { 500: '#EF4444' }
                    },
                    boxShadow: {
                        'sm': '0 1px 2px 0 rgba(0, 0, 0, 0.05)',
                        'md': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1)'
                    }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #F9FAFB; }
        .smooth-transition { transition: all 0.2s ease-out; }
    </style>
</head>
<body class="font-sans text-gray-800 antialiased flex flex-col min-h-screen">

    <header class="container mx-auto px-4 lg:px-8 mt-8">
        <div class="bg-primary-50 rounded-xl p-8 md:p-12 shadow-sm flex flex-col md:flex-row items-center justify-between relative overflow-hidden">
            <div class="mb-6 md:mb-0 z-10">
                <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-4">أفضل أجهزة التحكم الاحترافية</h1>
                <p class="text-gray-600 mb-6 max-w-md">اكتشف تشكيلتنا الجديدة من المنتجات وارفع مستوى لعبك للقمة مع أقوى العروض.</p>
                <button class="bg-primary-500 hover:bg-primary-600 text-white font-semibold py-2 px-6 rounded-md shadow-sm smooth-transition">
                    تسوق الآن
                </button>
            </div>
            <div class="text-primary-500 text-8xl opacity-20 absolute left-8 top-1/2 transform -translate-y-1/2 z-0">
                <i class="fas fa-gamepad"></i>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 lg:px-8 py-12 flex-1">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold text-gray-900 border-r-4 border-secondary-500 pr-3">وصل حديثاً</h2>
        </div>

        <div id="productsGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <div class="col-span-full text-center py-12 text-gray-500">
                <i class="fas fa-spinner fa-spin text-3xl mb-2"></i>
                <p>جاري جلب المنتجات من السيرفر...</p>
            </div>
        </div>
    </main>

    <script src="components/main-navbar.js"></script>

    <script>
        const API_URL = 'http://127.0.0.1:3000/api';

        // 2. جلب المنتجات من الباك اند
        async function fetchProducts(searchQuery = '') {
            const grid = document.getElementById('productsGrid');
            try {
                const noCache = `t=${new Date().getTime()}`;
                const url = searchQuery 
                    ? `${API_URL}/products?search=${searchQuery}&${noCache}` 
                    : `${API_URL}/products?${noCache}`;

                const response = await fetch(url);
                const data = await response.json();

                if (data.success) {
                    const productsArray = data.data || data.products || [];
                    displayProducts(productsArray);
                } else {
                    grid.innerHTML = `<p class="col-span-full text-center text-error-500">خطأ: ${data.message}</p>`;
                }
            } catch (error) {
                grid.innerHTML = `<p class="col-span-full text-center text-error-500 font-bold py-8">تأكد من تشغيل سيرفر الباك اند 🔌</p>`;
            }
        }

        // 3. رسم كروت المنتجات
        function displayProducts(products) {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = ''; 

            if (!products || products.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-12 text-gray-500 bg-white rounded-xl shadow-sm border border-gray-100">
                        <i class="fas fa-box-open text-5xl mb-3 text-gray-300"></i>
                        <p class="text-lg">لا توجد منتجات مطابقة لبحثك حالياً.</p>
                    </div>`;
                return;
            }

            products.forEach(product => {
                const imageUrl = (product.image_url && product.image_url.trim() !== '') 
                    ? `http://127.0.0.1:3000${product.image_url}` 
                    : 'https://via.placeholder.com/300?text=No+Image';
                
                const card = `
                    <div class="bg-white rounded-lg shadow-sm hover:shadow-md smooth-transition flex flex-col overflow-hidden group border border-gray-100 relative">
                        <a href="pages/products/product.html?id=${product.id}" class="block aspect-square bg-gray-50 overflow-hidden relative cursor-pointer">
                            <img src="${imageUrl}" alt="${product.title}" class="w-full h-full object-cover group-hover:scale-105 smooth-transition">
                            ${product.stock_quantity > 0 ? 
                                `<span class="absolute top-3 right-3 bg-success-500 text-white text-xs font-bold px-2.5 py-1 rounded shadow-sm">متوفر</span>` : 
                                `<span class="absolute top-3 right-3 bg-error-500 text-white text-xs font-bold px-2.5 py-1 rounded shadow-sm">نفذت</span>`
                            }
                        </a>
                        
                        <div class="p-4 flex flex-col flex-1">
                            <a href="pages/products/product.html?id=${product.id}" class="hover:text-primary-600 transition-colors">
                                <h3 class="text-gray-900 font-bold text-lg mb-1 line-clamp-1">${product.title}</h3>
                            </a>
                            <p class="text-sm text-gray-500 mb-4 line-clamp-2">${product.description || 'لا يوجد وصف متاح'}</p>
                            
                            <div class="mt-auto flex items-center justify-between pt-2 border-t border-gray-50">
                                <span class="text-primary-700 font-bold text-xl">${product.price} ج.م</span>
                                <button onclick="addToCart(${product.id})" class="bg-primary-50 text-primary-600 hover:bg-primary-500 hover:text-white rounded-full w-9 h-9 flex items-center justify-center smooth-transition shadow-sm z-10 relative">
                                    <i class="fas fa-plus"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        // 4. إضافة منتج للسلة
        function addToCart(productId) {
            const token = localStorage.getItem('spider_token');
            if (!token) {
                showToast('يجب تسجيل الدخول أولاً لإضافة منتجات!', 'error');
                setTimeout(() => window.location.href = 'pages/auth/login.html', 1500);
                return;
            }
            let cart = JSON.parse(localStorage.getItem('spider_cart')) || [];
            const existingItem = cart.find(item => item.id === productId);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ id: productId, quantity: 1 });
            }
            localStorage.setItem('spider_cart', JSON.stringify(cart));
            
            // ⚠️ السطر ده دلوقتي بينادي على دالة موجودة جوه الـ Component
            if (typeof updateGlobalCartCount === 'function') updateGlobalCartCount();
            
            showToast('تمت الإضافة للسلة بنجاح! 🛒', 'success');
        }

        // 5. نظام الإشعارات (Toast)
        function showToast(message, type = 'success') {
            const bgColor = type === 'success' ? 'bg-success-500' : 'bg-error-500';
            const toast = document.createElement('div');
            toast.className = `fixed bottom-6 left-1/2 transform -translate-x-1/2 ${bgColor} text-white px-6 py-3 rounded-full shadow-lg font-bold z-50 transition-all duration-300 translate-y-0 opacity-100 flex items-center gap-2`;
            toast.innerHTML = type === 'success' ? `<i class="fas fa-check-circle"></i> ${message}` : `<i class="fas fa-exclamation-circle"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        // 6. دالة البحث
        function searchProducts() {
            const searchInput = document.getElementById('searchInput');
            const query = searchInput ? searchInput.value : '';
            fetchProducts(query);
        }

        // 7. تشغيل الدوال الأساسية
        window.addEventListener('load', () => {
            fetchProducts();
        });
    </script>
</body>
</html>
